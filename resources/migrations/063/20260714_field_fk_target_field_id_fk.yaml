## Adds a real FK constraint and an index on metabase_field.fk_target_field_id. Nothing enforced
## this reference before, so dangling values (targets hard-deleted via database/table/field
## cascades) are nulled out first.

databaseChangeLog:
  - changeSet:
      id: v63.2026-07-14T00:00:00
      author: ranquild
      comment: Null out metabase_field.fk_target_field_id values that point to deleted fields
      changes:
        - sql:
            dbms: mysql,mariadb
            sql: >-
              UPDATE metabase_field AS a
              LEFT JOIN metabase_field AS b ON b.id = a.fk_target_field_id
              SET a.fk_target_field_id = NULL
              WHERE a.fk_target_field_id IS NOT NULL AND b.id IS NULL;
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE metabase_field
              SET fk_target_field_id = NULL
              WHERE fk_target_field_id IS NOT NULL
                AND fk_target_field_id NOT IN (SELECT id FROM metabase_field);
      rollback: # no change

  ## The index is created before the FK constraint below: MySQL/MariaDB require an index to back
  ## every FK and reuse an existing one, so this keeps rollback working (the FK is dropped before
  ## the index it would otherwise still need). Postgres doesn't auto-index FKs, which is what
  ## fks-are-indexed-test checks for.
  - changeSet:
      id: v63.2026-07-14T00:00:01
      author: ranquild
      comment: Index metabase_field.fk_target_field_id
      changes:
        - createIndex:
            tableName: metabase_field
            indexName: idx_field_fk_target_field_id
            columns:
              - column:
                  name: fk_target_field_id

  - changeSet:
      id: v63.2026-07-14T00:00:02
      author: ranquild
      comment: Add FK constraint on metabase_field.fk_target_field_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_field
            baseColumnNames: fk_target_field_id
            referencedTableName: metabase_field
            referencedColumnNames: id
            constraintName: fk_field_fk_target_ref_field_id
            onDelete: SET NULL
