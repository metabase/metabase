# SQL Server driver tests. See driver-postgres.yml for the template rationale.
name: Driver Tests - SQL Server

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: read

jobs:
  decide:
    uses: ./.github/workflows/_driver-decide.yml
    with:
      driver: sqlserver
      workflow-name: ${{ github.workflow }}
    secrets: inherit

  test:
    needs: decide
    if: >-
      !cancelled() &&
      needs.decide.result == 'success' &&
      needs.decide.outputs.conductor-status != 'skip' &&
      (needs.decide.outputs.should-run == 'true' || needs.decide.outputs.quarantine-conflict == 'true')
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        version:
          # - name: SQL Server 2017
          #   junit-name: be-tests-sqlserver-2017-ee
          #   image: mcr.microsoft.com/mssql/server:2017-latest
          - name: SQL Server 2022
            junit-name: be-tests-sqlserver-2022-ee
            image: mcr.microsoft.com/mssql/server:2022-latest
        job:
          - name: Driver Tests
            test-args: >-
              :only-tags [:mb/driver-tests]
              :exclude-tags [:mb/transforms-python-test]
          - name: Transforms Python Tests
            test-args: >-
              :only-tags [:mb/transforms-python-test]
            needs-python-runner: true
    env:
      CI: 'true'
      DRIVERS: sqlserver
      MB_SQLSERVER_TEST_HOST: localhost
      MB_SQLSERVER_TEST_PASSWORD: 'P@ssw0rd'
      MB_SQLSERVER_TEST_USER: SA
    services:
      sqlserver:
        image: ${{ matrix.version.image }}
        ports:
          - "1433:1433"
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: 'P@ssw0rd'
          MSSQL_MEMORY_LIMIT_MB: 1024
    name: ${{ matrix.version.name }} ${{ matrix.job.name }}
    steps:
      - name: Fail on quarantine conflict
        if: ${{ needs.decide.outputs.quarantine-conflict == 'true' }}
        run: |
          echo "::error::SQL Server driver is quarantined but you changed files in modules/drivers/sqlserver/"
          echo ""
          echo "Your changes will NOT be tested because the driver is currently quarantined."
          echo "To run SQL Server tests, add the label: break-quarantine-sqlserver"
          echo ""
          echo "If you merge without testing, you risk breaking the SQL Server driver!"
          exit 1
      - uses: actions/checkout@v6
      - name: Setup python-runner
        if: ${{ matrix.job.needs-python-runner == true }}
        uses: ./.github/actions/setup-python-runner
        with:
          metabase-automation-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - name: Test ${{ matrix.version.name }}
        id: test-driver
        uses: ./.github/actions/test-driver
        with:
          junit-name: ${{ matrix.version.junit-name }}
          test-args: ${{ matrix.job.test-args }}
          logs-artifact-suffix: ${{ matrix.version.name }}
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        continue-on-error: ${{ needs.decide.outputs.conductor-status == 'info' }}
        with:
          input-path: ./target/junit/
          output-name: be-tests-sqlserver
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.test-driver.outputs.test-outcome }}
      - name: Report result to conductor
        if: always()
        uses: ./.github/actions/conductor-report
        with:
          secret: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}
          status: ${{ needs.decide.outputs.conductor-status }}
          outcome: ${{ steps.test-driver.outputs.test-outcome || job.status }}
      - name: Cleanup python-runner
        if: ${{ always() && matrix.job.needs-python-runner == true }}
        uses: ./.github/actions/cleanup-python-runner
        with:
          upload-logs: ${{ steps.test-driver.outcome == 'failure' }}
          logs-artifact-suffix: ${{ matrix.job.name }} ${{ matrix.version.name }}

  result:
    name: result
    needs: [decide, test]
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Gate on driver test result
        env:
          DECIDE_RESULT: ${{ needs.decide.result }}
          TEST_RESULTS: ${{ needs.test.result }}
          CONDUCTOR_STATUS: ${{ needs.decide.outputs.conductor-status }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/conductor/gate-result.sh"
