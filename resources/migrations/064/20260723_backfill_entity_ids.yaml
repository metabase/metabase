              UPDATE transform_tag SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE transform_transform_tag SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
