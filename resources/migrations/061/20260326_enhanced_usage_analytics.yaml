## Enhanced usage analytics columns for view_log and query_execution

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml

  # ============================================================
  # view_log columns
  # ============================================================

  - changeSet:
      id: v61.2026-03-26T00:00:00
      author: bgrabow
      comment: Add auth_method column to view_log for tracking authentication method
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: auth_method
                  type: varchar(32)
                  remarks: Authentication method used (e.g. jwt, saml, api-key, public, guest, etc.)
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:01
      author: bgrabow
      comment: Add tenant_id column to view_log for multi-tenant analytics
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: tenant_id
                  type: int
                  remarks: Tenant ID of the user who generated this view
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:02
      author: bgrabow
      comment: Add embedding_hostname column to view_log for embedding analytics
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: embedding_hostname
                  type: varchar(512)
                  remarks: Hostname from Origin header, PII
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:03
      author: bgrabow
      comment: Add embedding_path column to view_log for embedding analytics
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: embedding_path
                  type: varchar(2048)
                  remarks: Path from Referer header (query params stripped), PII
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:04
      author: bgrabow
      comment: Add user_agent column to view_log for usage analytics
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: user_agent
                  type: varchar(512)
                  remarks: User-Agent header, PII
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:05
      author: bgrabow
      comment: Add ip_address column to view_log for usage analytics
      changes:
        - addColumn:
            tableName: view_log
            columns:
              - column:
                  name: ip_address
                  type: varchar(45)
                  remarks: Client IP address, PII
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-03-26T00:00:06
      author: bgrabow
      comment: Add index on view_log.tenant_id for tenant-scoped analytics queries
      changes:
        - createIndex:
            tableName: view_log
            indexName: idx_view_log_tenant_id
            columns:
              - column:
                  name: tenant_id

