name: Backend

on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}-backend
  cancel-in-progress: true

jobs:
  be-linter-clj-kondo:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    name: Clj-Kondo
    steps:
      - uses: actions/checkout@v4
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - name: Run clj-kondo
        run: ./bin/mage kondo

  be-linter-eastwood:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    name: Eastwood
    steps:
      - uses: actions/checkout@v4
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - run: clojure -X:dev:ee:ee-dev:drivers:drivers-dev:test:eastwood
        name: Run Eastwood linter

  be-linter-eastwood-test:
    # Master / release safety net: lint every backend test namespace.
    if: ${{ !inputs.skip && github.event_name == 'push' && (github.ref_name == 'master' || startsWith(github.ref_name, 'release-')) }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 30
    name: Eastwood (tests only)
    steps:
      - uses: actions/checkout@v4
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - run: clojure -X:dev:ee:ee-dev:drivers:drivers-dev:test:eastwood/test
        name: Run Eastwood linter on our backend tests

  be-linter-eastwood-test-changed:
    # PR / merge queue: lint only the test namespaces touched by the diff.
    if: ${{ !inputs.skip && (github.event_name == 'pull_request' || github.event_name == 'merge_group') }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 15
    name: Eastwood (changed tests only)
    steps:
      - uses: actions/checkout@v4
        with:
          # Enough history for `git merge-base` to find the divergence point on any reasonable PR.
          fetch-depth: 200
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - name: Compute changed test namespaces
        id: changed
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.merge_group.base_sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.event.merge_group.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${BASE_SHA:-}" ]; then
            echo "No base SHA available; skipping."
            echo "namespaces=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Pull the base commit so we can compute the merge-base; 200 matches the checkout depth.
          git fetch --no-tags --depth=200 origin "$BASE_SHA"
          # Diff from the merge-base, not the base ref tip, so unrelated changes that landed on the
          # base branch after this PR was last synced don't widen our scope. Fall back to BASE_SHA
          # if the merge-base is outside the fetched window.
          DIFF_BASE=$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "$BASE_SHA")
          FILES=$(git diff --name-only --diff-filter=AM "$DIFF_BASE" "$HEAD_SHA" \
                    -- 'test/**/*.clj' 'test/**/*.cljc' \
                       'enterprise/backend/test/**/*.clj' 'enterprise/backend/test/**/*.cljc')
          if [ -z "$FILES" ]; then
            echo "No backend test files changed; skipping lint."
            echo "namespaces=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # File paths flow into a subsequent shell command via the step output. Reject anything
          # outside the conservative character set we expect from Clojure source paths.
          if printf '%s\n' "$FILES" | grep -Eqv '^[A-Za-z0-9_./-]+$'; then
            echo "Refusing to lint: unexpected characters in changed file paths." >&2
            printf '%s\n' "$FILES" >&2
            exit 1
          fi
          NS=$(printf '%s\n' "$FILES" \
            | sed -E 's#^(test/|enterprise/backend/test/)##; s#\.cljc?$##; s#/#.#g; s#_#-#g' \
            | sort -u \
            | paste -sd' ' -)
          echo "Changed test namespaces: $NS"
          echo "namespaces=$NS" >> "$GITHUB_OUTPUT"
      - name: Run Eastwood on changed test namespaces
        if: steps.changed.outputs.namespaces != ''
        env:
          NAMESPACES: ${{ steps.changed.outputs.namespaces }}
        run: clojure -X:dev:ee:ee-dev:drivers:drivers-dev:test:eastwood/test :namespaces "[$NAMESPACES]"

  be-tests:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        java-version: [21]
        job:
          - name: Enterprise Tests
            edition: ee
            test-group-name: ee
            test-args: >-
              :only '"enterprise/backend/test"'
          - name: EE App DB Tests (Part 1)
            edition: ee
            test-group-name: ee-app-db-1
            test-args: >-
              :only '["test" ".clj-kondo/test"]'
              :partition/total 2
              :partition/index 0
          - name: EE App DB Tests (Part 2)
            edition: ee
            test-group-name: ee-app-db-2
            test-args: >-
              :only '["test" ".clj-kondo/test"]'
              :partition/total 2
              :partition/index 1
          - name: OSS App DB Tests (Part 1)
            edition: oss
            test-group-name: oss-app-db-1
            test-args: >-
              :only '["test" ".clj-kondo/test"]'
              :partition/total 2
              :partition/index 0
          - name: OSS App DB Tests (Part 2)
            edition: oss
            test-group-name: oss-app-db-2
            test-args: >-
              :only '["test" ".clj-kondo/test"]'
              :partition/total 2
              :partition/index 1
    name: "Java ${{ matrix.java-version }} ${{ matrix.job.name }}"
    env:
      # Only run old migrations tests on pushes to master or release branches. All other branches should skip tests
      # with the tag `mb/old-migrations-test`. `__ADDITIONAL_EXCLUDED_TAG__` is not used anywhere outside of splicing
      # it in to the command below.
      __ADDITIONAL_EXCLUDED_TAG__: >-
        ${{
          (
            github.event_name == 'push' &&
            (
              github.ref_name == 'master' ||
              startsWith(github.ref_name, 'release-')
            ) &&
            ''
          ) ||
          ':mb/old-migrations-test'
        }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
        with:
          java-version: "${{ matrix.java-version }}"
      - name: Build static-viz frontend
        run: bun run build-static-viz
        env:
          MB_EDITION: ${{ matrix.job.edition }}

      - name: "Test Java ${{ matrix.java-version }} ${{ matrix.job.name }}"
        id: run-java-tests
        run: >-
          clojure -X:dev:ci:test:${{ matrix.job.edition }}:${{ matrix.job.edition }}-dev
          :exclude-tags '[:mb/driver-tests ${{ env.__ADDITIONAL_EXCLUDED_TAG__ }}]'
          ${{ matrix.job.test-args }}
        # Trunk Quarantine controls the final state of the run in the CI!
        # Even if this step fails we let it pass, and then `trunk-io/analytics-uploader` determines
        # whether to fail or to pass the whole job, based on the quarantine list.
        continue-on-error: true

      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always() && (steps.run-java-tests.conclusion != 'skipped' || steps.run-java-tests-21.conclusion != 'skipped')
        with:
          input-path: ./target/junit/
          output-name: be-tests-java-${{ matrix.java-version }}-${{ matrix.job.edition }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.run-java-tests.outcome }}

      - name: Publish Test Report (JUnit)
        uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc # v1
        if: failure()
        with:
          path: "target/junit/**/*_test.xml"
          name: JUnit Test Report be-tests-java-${{ matrix.java-version }}-${{ matrix.job.edition }}
          reporter: java-junit
          list-suites: failed
          list-tests: failed
          fail-on-error: false

      - name: Upload Logs on Failure
        if: always() && !success()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-${{ matrix.java-version }}-${{ matrix.job.edition }}-${{ github.job }}-${{ matrix.job.test-group-name }}
          path: logs/test-log.json
          retention-days: 1

  # checks that all the namespaces we actually ship can be compiled, without any dependencies that we don't ship (such
  # as `:dev` dependencies). See #27009 for more context.
  be-check:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    strategy:
      matrix:
        java-version: [21]
    name: "Check Java ${{ matrix.java-version }}"
    steps:
      - uses: actions/checkout@v4
      - name: Prepare backend
        uses: ./.github/actions/prepare-backend
      # TODO -- we should probably also check WITHOUT ee -- do a check with only OSS namespaces on the classpath
      - name: Check namespaces
        run: clojure -M:ee:drivers:check

  be-cljfmt:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    name: Cljfmt
    steps:
      - uses: actions/checkout@v4
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - name: Run cljfmt
        run: ./bin/mage cljfmt-all --force-check

  be-tests-result:
    needs:
      - be-linter-eastwood
      - be-linter-eastwood-test
      - be-linter-eastwood-test-changed
      - be-linter-clj-kondo
      - be-cljfmt
      - be-check
      - be-tests
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      needs: ${{ toJson(needs) }}
    steps:
      - name: Check backend job status
        uses: actions/github-script@v7
        env:
          needs: ${{ toJson(needs) }}
        with:
          script: | # js
            const needs = JSON.parse(process.env.needs);
            const jobs = Object.entries(needs).map(
              ([jobName, jobValues]) => ({
                name: jobName,
                result: jobValues.result
              }));

            // are all jobs skipped or successful?
            if (jobs.every(job => (job.result === 'skipped' || job.result === 'success'))) {
              console.log('All jobs are skipped or successful');
              process.exit(0);
            }

            // otherwise, something failed
            console.log('Some backend jobs failed');
            jobs.forEach((job) => {
              if (job.result !== 'success') {
                console.log(`${job.name} - ${job.result}`);
              }
            });
            process.exit(1);
