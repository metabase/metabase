## Permanent staging table for the /api/ee/serialization/metadata/import endpoint.
##
## The import endpoint streams the JSON payload row-by-row into this table, then
## resolves portable references via JOINs and applies a split insert/update merge
## into `metabase_table`. Rows are scoped to a single import by being deleted at
## the start (and end) of the surrounding transaction; no `import_session_id` is
## needed because the entire import runs inside one transaction with at most one
## active import per app DB connection.

databaseChangeLog:
  - changeSet:
      id: v62.2026-05-04T00:00:01
      author: alexpolyankin
      comment: Create metabase_table_import staging table for /metadata/import
      changes:
        - createTable:
            tableName: metabase_table_import
            remarks: |
              Per-import staging area for table metadata received by
              POST /api/ee/serialization/metadata/import. Rows are inserted in
              bulk, joined against `metabase_database` to resolve `db_id`, and
              merged into `metabase_table`. Cleared inside the import transaction.
            columns:
              - column:
                  name: db_name
                  type: varchar(254)
                  remarks: Portable database identifier (the database's name).
                  constraints:
                    nullable: false
              - column:
                  name: table_schema
                  type: varchar(254)
                  remarks: Schema of the table; nullable to mirror metabase_table.schema.
              - column:
                  name: table_name
                  type: varchar(254)
                  remarks: Name of the table.
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: ${text.type}
                  remarks: Optional human-readable description.
