## Workspace and workspace_database tables for the /api/ee/workspace API

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml
  - changeSet:
      id: v62.2026-04-22T12:00:00
      author: eric
      comment: Create workspace table
      changes:
        - createTable:
            tableName: workspace
            remarks: A Workspace groups one or more databases with override connection details and per-database schema configuration
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(254)
                  remarks: Display name of the workspace
                  constraints:
                    nullable: false
              - column:
                  name: creator_id
                  type: int
                  remarks: The user who created this Workspace; null if that user was deleted
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this workspace was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this workspace was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:01
      author: eric
      comment: Create workspace_database table
      changes:
        - createTable:
            tableName: workspace_database
            remarks: Associates a Workspace with a Database, including override credentials and schema configuration
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: The workspace this row belongs to
                  constraints:
                    nullable: false
              - column:
                  name: database_id
                  type: int
                  remarks: The underlying metabase_database this row configures
                  constraints:
                    nullable: false
              - column:
                  name: database_details
                  type: ${text.type}
                  remarks: JSON-encoded override connection details (e.g. user, password) used for this workspace
                  constraints:
                    nullable: false
              - column:
                  name: output_schema
                  type: varchar(254)
                  remarks: Schema where workspace output tables are written
                  constraints:
                    nullable: false
              - column:
                  name: input_schemas
                  type: ${text.type}
                  remarks: JSON array of schema names that participate as inputs for this workspace
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: unprovisioned
                  remarks: Provisioning state of this workspace database (unprovisioned/provisioning/provisioned/unprovisioning)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this row was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this row was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:02
      author: eric
      comment: FK workspace.creator_id -> core_user.id (set null on delete so deleting a user doesn't cascade)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace
            baseColumnNames: creator_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_workspace_creator_id
            onDelete: SET NULL

  - changeSet:
      id: v62.2026-04-22T12:00:03
      author: eric
      comment: FK workspace_database.workspace_id -> workspace.id (cascade on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_database
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_database_workspace_id
            deleteCascade: true

  ## RESTRICT (not CASCADE) on workspace_database.database_id: deleting a metabase_database
  ## with active workspace_database rows must fail at the DB level so warehouse schemas/users
  ## aren't silently orphaned. An enterprise pre-delete hook on :model/Database does the
  ## cleanup (refuse with 409 for non-:unprovisioned rows, delete :unprovisioned rows
  ## explicitly); the FK is the last-line-of-defense for paths that skip the hook.

  - changeSet:
      id: v62.2026-04-22T12:00:04
      author: eric
      comment: FK workspace_database.database_id -> metabase_database.id (restrict on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_database
            baseColumnNames: database_id
            referencedTableName: metabase_database
            referencedColumnNames: id
            constraintName: fk_workspace_database_database_id
            onDelete: RESTRICT

  - changeSet:
      id: v62.2026-04-22T12:00:05
      author: eric
      comment: Unique constraint on workspace_database (workspace_id, database_id)
      changes:
        - addUniqueConstraint:
            tableName: workspace_database
            constraintName: idx_unique_workspace_database
            columnNames: workspace_id, database_id

  - changeSet:
      id: v62.2026-04-22T12:00:06
      author: eric
      comment: Index workspace_database.workspace_id for hydration lookups
      changes:
        - createIndex:
            tableName: workspace_database
            indexName: idx_workspace_database_workspace_id
            columns:
              - column:
                  name: workspace_id
