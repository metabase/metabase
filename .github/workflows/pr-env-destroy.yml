name: CI for PR Review ENV Destroy
run-name: Destroying Dynamic PR Environment for ${{ github.ref_name }} by @${{ github.actor }}

on:
  workflow_call:
    inputs:
      self_hosting:
        description: 'Self-hosting stack'
        required: false
        type: boolean
        default: false
      pr_number:
        description: 'PR number (required for manual dispatch)'
        required: false
        type: string

env:
  PR_NUMBER: ${{ inputs.pr_number || github.event.number }}

jobs:
  destroy_pr:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    name: PR Review ENV Destroy
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
      - name: Tailscale
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          oauth-client-id: ${{ secrets.PR_ENV_TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.PR_ENV_TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
          version: 1.50.1
          sha256sum: d9fe6b480fb5078f0aa57dace686898dda7e2a768884271159faa74846bfb576
      - name: Create OIDC Token
        id: create-oidc-token
        shell: bash
        run: |
          export OIDC_URL_WITH_AUDIENCE="$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${PR_ENV_K8S_AUDIENCE}"
          IDTOKEN=$(curl -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" -H "Accept: application/json; api-version=2.0" "$OIDC_URL_WITH_AUDIENCE" | jq -r .value)
          echo "::add-mask::${IDTOKEN}"
          echo "idToken=${IDTOKEN}" >>$GITHUB_OUTPUT
        env:
          PR_ENV_K8S_AUDIENCE: ${{ secrets.PR_ENV_K8S_AUDIENCE }}
      - name: Setup Kube Context
        uses: azure/k8s-set-context@0b53301dcc7ddd3f6d35f97fb67228ac4e5ab2fd # v2
        with:
          method: kubeconfig
          kubeconfig: |
            kind: Config
            apiVersion: v1
            current-context: default
            clusters:
            - name: default
              cluster:
                certificate-authority-data: ${{ secrets.PR_ENV_K8S_CERTIFICATE_AUTHORITY_DATA }}
                server: ${{ secrets.PR_ENV_K8S_SERVER }}
            users:
            - name: oidc-token
              user:
                token: ${{ steps.create-oidc-token.outputs.IDTOKEN }}
            contexts:
            - name: default
              context:
                cluster: default
                namespace: default
                user: oidc-token
      - name: Destroy PR Review ENV
        if: ${{ !inputs.self_hosting }}
        run: |
          kubectl delete metabase -n hosting-pr${{ env.PR_NUMBER }} hosting-pr${{ env.PR_NUMBER }}
          kubectl delete ns hosting-pr${{ env.PR_NUMBER }}
      - name: Setup Helm
        if: ${{ inputs.self_hosting }}
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: 'latest'
      - name: Destroy PR Review ENV (self-hosting)
        if: ${{ inputs.self_hosting }}
        run: |
          helm uninstall hosting-pr${{ env.PR_NUMBER }} --namespace hosting-pr${{ env.PR_NUMBER }} || true
          kubectl delete ns hosting-pr${{ env.PR_NUMBER }} || true
      - name: Setup psql client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: Drop app database if exists
        run: |
          PGPASSWORD="${PR_ENV_DB_PASSWORD}" \
          psql \
          -h "${PR_ENV_DB_HOST}" \
          -U "${PR_ENV_DB_USER}" \
          -d "${PR_ENV_DB_NAME}" \
          -c "DROP DATABASE IF EXISTS hosting_pr${{ env.PR_NUMBER }};"

        env:
          PR_ENV_DB_PASSWORD: ${{ secrets.PR_ENV_DB_PASSWORD }}
          PR_ENV_DB_HOST: ${{ secrets.PR_ENV_DB_HOST }}
          PR_ENV_DB_USER: ${{ secrets.PR_ENV_DB_USER }}
          PR_ENV_DB_NAME: ${{ secrets.PR_ENV_DB_NAME }}
