agent: claude

post_create:
  # Worktree setup (copies, symlinks, caches, bot.patch)
  # Uses the main repo's bin/mage since the worktree branch may not have this code yet.
  # Idempotent — skips if post-checkout hook already ran.
  #- bash -c 'MAIN=$(git rev-parse --git-common-dir | sed "s|/\\.git$||"); if [ ! -L "$PWD/bin/bb" ]; then "$MAIN/bin/mage" -nvoxland-setup-worktree --worktree "$PWD"; fi'
  # Dev environment (Docker, mise.local.toml, bot dirs)
  - ./bin/mage -nvoxland-dev-env --app-db {{APP_DB}} --bot {{BOT_NAME}}
  # Bot hooks (workmux-status hooks.json)
  - ./bin/mage -bot-setup --bot {{BOT_NAME}}

pre_remove:
  - ./bin/mage -nvoxland-dev-env --down

panes:
  - command: <agent>
    focus: true

  - command: mise x -- clj -M:dev:dev-start:drivers:drivers-dev:ee:ee-dev 2>&1 | tee .bot/autobot/backend-$(date +%Y%m%d-%H%M%S).log
    split: horizontal
    percentage: 30

  - command: mise x -- bun run build-hot 2>&1 | tee .bot/autobot/frontend-$(date +%Y%m%d-%H%M%S).log
    split: vertical

  - command: mise x -- ./bin/mage -bot-status .bot/autobot/llm-status.txt
    split: vertical
    size: 7
