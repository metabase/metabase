## Workspaces v2 PoC: generic entity remapping table. Maps a "real" entity id
## (card, transform, table, ...) to the workspace-local copy that should shadow
## it whenever a query or API call runs in that workspace's context.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-21T12:00:00
      author: ranquild
      comment: Create workspace_remapping table for workspace entity shadowing
      changes:
        - createTable:
            tableName: workspace_remapping
            remarks: Maps source entities to their workspace-local copies
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: Workspace this remapping belongs to
                  constraints:
                    nullable: false
              - column:
                  name: entity_type
                  type: varchar(32)
                  remarks: Entity type being remapped (card, transform, table)
                  constraints:
                    nullable: false
              - column:
                  name: source_entity_id
                  type: int
                  remarks: Id of the real entity outside the workspace. Equal to target_entity_id when the entity was created inside the workspace.
                  constraints:
                    nullable: false
              - column:
                  name: target_entity_id
                  type: int
                  remarks: Id of the workspace-local entity that shadows the source
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this remapping was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v64.2026-07-21T12:00:01
      author: ranquild
      comment: Unique remapping per (workspace, entity_type, source)
      ## Leading column is workspace_id so MySQL reuses this index for the FK below.
      changes:
        - addUniqueConstraint:
            tableName: workspace_remapping
            constraintName: idx_unique_workspace_remapping_source
            columnNames: workspace_id, entity_type, source_entity_id

  - changeSet:
      id: v64.2026-07-21T12:00:02
      author: ranquild
      comment: Add foreign key on workspace_remapping(workspace_id)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_remapping
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_remapping_workspace_id
            deleteCascade: true

  - changeSet:
      id: v64.2026-07-21T12:00:03
      author: ranquild
      comment: Drop the table_remapping table; superseded by workspace_remapping
      changes:
        - dropTable:
            tableName: table_remapping
