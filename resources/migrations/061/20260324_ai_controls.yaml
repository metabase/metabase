## AI controls

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml
  - changeSet:
      id: v61.gasgewas
      author: nvoxland
      comment: Create metabot_permissions table for AI feature permissions per group
      changes:
        - createTable:
            tableName: metabot_permissions
            remarks: A table to store AI/metabot permissions per permissions group
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: The ID of the permission
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: The ID of the associated permissions group
                  constraints:
                    nullable: false
                    referencedTableName: permissions_group
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_permissions_ref_permissions_group
                    deleteCascade: true
              - column:
                  name: perm_type
                  type: varchar(254)
                  remarks: The type of permission
                  constraints:
                    nullable: false
              - column:
                  name: perm_value
                  type: varchar(254)
                  remarks: The value of the permission
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.rr32dasd
      author: nvoxland
      comment: Add index on metabot_permissions.group_id
      changes:
        - createIndex:
            tableName: metabot_permissions
            indexName: idx_metabot_permissions_group_id
            columns:
              - column:
                  name: group_id

  - changeSet:
      id: v61.g24da211
      author: nvoxland
      comment: Add unique constraint on metabot_permissions group_id and perm_type
      changes:
        - addUniqueConstraint:
            tableName: metabot_permissions
            columnNames: group_id, perm_type
            constraintName: unique_metabot_permissions_group_id_perm_type

  - changeSet:
      id: v61.t42424d
      author: nvoxland
      comment: Create metabot_instance_limit table
      changes:
        - createTable:
            tableName: metabot_instance_limit
            remarks: Metabot usage limits at the instance or tenant level
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: int
                  remarks: The tenant ID, or null for instance-wide limit
                  constraints:
                    nullable: true
                    unique: true
                    referencedTableName: tenant
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_instance_limit_ref_tenant
                    deleteCascade: true
              - column:
                  name: max_usage
                  type: int
                  remarks: The maximum usage value, interpreted according to the metabot-limit-type setting. Null is unlimited

  - changeSet:
      id: v61.gr34fp
      author: nvoxland
      comment: Create metabot_group_limit table
      changes:
        - createTable:
            tableName: metabot_group_limit
            remarks: Metabot usage limits per group
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  constraints:
                    nullable: false
                    unique: true
                    referencedTableName: permissions_group
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_group_limit_ref_permissions_group
                    deleteCascade: true
              - column:
                  name: max_usage
                  type: int
                  remarks: The maximum usage value, interpreted according to the metabot-limit-type setting
                  constraints:
                    nullable: false
