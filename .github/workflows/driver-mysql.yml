name: MySQL/MariaDB Driver Test

on:
  workflow_call:
    inputs:
      variant:
        type: string
        required: true
        description: 'Database variant (mysql-latest, mysql-8, mariadb-10.2, mariadb-latest)'

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ inputs.variant == 'mysql-latest' && 20 || 60 }}
    services:
      mysql:
        image: ${{ inputs.variant == 'mysql-latest' && 'mysql:latest' || inputs.variant == 'mysql-8' && 'mysql:8.0' || inputs.variant == 'mariadb-10.2' && 'circleci/mariadb:10.2.23' || 'circleci/mariadb:latest' }}
        ports:
          - "3306:3306"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: circle_test
    env:
      CI: 'true'
      DRIVERS: mysql
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: circle_test
      MB_DB_USER: root
      MB_MYSQL_TEST_USER: root
      MB_MYSQL_SSL_TEST_SSL: ${{ inputs.variant == 'mysql-latest' && 'true' || 'false' }}
      MB_MYSQL_SSL_TEST_HOST: ${{ inputs.variant == 'mysql-latest' && secrets.MYSQL_RDS_SSL_INSTANCE_HOST || '' }}
      MB_MYSQL_SSL_TEST_ADDITIONAL_OPTIONS: ${{ inputs.variant == 'mysql-latest' && 'verifyServerCertificate=true' || '' }}
      MB_MYSQL_SSL_TEST_SSL_CERT: ${{ inputs.variant == 'mysql-latest' && secrets.MB_MYSQL_SSL_TEST_SSL_CERT || '' }}
      MB_MYSQL_SSL_TEST_USER: ${{ inputs.variant == 'mysql-latest' && 'metabase' || '' }}
      MB_MYSQL_SSL_TEST_PASSWORD: ${{ inputs.variant == 'mysql-latest' && secrets.MYSQL_RDS_SSL_INSTANCE_PASSWORD || '' }}
    name: ${{ inputs.variant == 'mysql-latest' && 'MySQL Latest' || inputs.variant == 'mysql-8' && 'MySQL 8.0' || inputs.variant == 'mariadb-10.2' && 'MariaDB 10.2' || 'MariaDB Latest' }}
    steps:
      - uses: actions/checkout@v4
      - name: Test ${{ inputs.variant }}
        uses: ./.github/actions/test-driver
        with:
          junit-name: ${{ inputs.variant == 'mysql-latest' && 'be-tests-mysql-latest-ee' || inputs.variant == 'mysql-8' && 'be-tests-mysql-8-0-ee' || inputs.variant == 'mariadb-10.2' && 'be-tests-mariadb-10-2-ee' || 'be-tests-mariadb-latest-ee' }}
          test-args: ${{ inputs.variant == 'mysql-latest' && ':only-tags [:mb/driver-tests]' || ':only-tags [:mb/driver-tests] :exclude-tags [:mb/old-migrations-test]' }}
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ inputs.variant }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
