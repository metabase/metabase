## Add ai_generated column to report_card for Metabot auto-saved questions

databaseChangeLog:

  - changeSet:
      id: v62.2026-06-03T00:00:00
      author: sloansparger
      comment: Add ai_generated flag to report_card for Metabot auto-saved questions
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: report_card
                columnName: ai_generated
      changes:
        - addColumn:
            tableName: report_card
            columns:
              - column:
                  name: ai_generated
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: Whether this card was generated by Metabot/AI rather than authored by a user
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: report_card
            columnName: ai_generated
