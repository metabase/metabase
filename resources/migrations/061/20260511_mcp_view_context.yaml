## Stores compact MCP iframe view context for follow-up NLQ across active Metabase MCP Apps.
## The rows are scoped to an MCP session and a per-iframe view instance id. Query payloads
## are stored separately in mcp_query_handle; context_json carries the resulting handles.

databaseChangeLog:
  - changeSet:
      id: v61.2026-05-11T00:00:00
      author: codex
      comment: Create mcp_view_context table for MCP iframe view context
      changes:
        - createTable:
            tableName: mcp_view_context
            remarks: Server-side store for compact MCP iframe view context referenced by MCP tool calls
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: Context row UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: mcp_session_id
                  type: varchar(36)
                  remarks: MCP session that owns this view context
                  constraints:
                    nullable: false
              - column:
                  name: core_session_id
                  type: varchar(254)
                  remarks: core_session.id when one has been materialized; cascade-deletes with the session
              - column:
                  name: view_instance_id
                  type: varchar(36)
                  remarks: UUID generated by each iframe instance
                  constraints:
                    nullable: false
              - column:
                  name: context_json
                  type: ${text.type}
                  remarks: Compact JSON context with query handles instead of raw query payloads
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this context row was first stored
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this context row was last updated
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: mcp_view_context

  - changeSet:
      id: v61.2026-05-11T00:00:01
      author: codex
      comment: Ensure one mcp_view_context row per session and iframe
      changes:
        - addUniqueConstraint:
            tableName: mcp_view_context
            columnNames: mcp_session_id, view_instance_id
            constraintName: uniq_mcp_view_context_session_view
      rollback:
        - dropUniqueConstraint:
            tableName: mcp_view_context
            constraintName: uniq_mcp_view_context_session_view

  - changeSet:
      id: v61.2026-05-11T00:00:02
      author: codex
      comment: Index mcp_view_context.mcp_session_id for reads and cleanup
      changes:
        - createIndex:
            tableName: mcp_view_context
            indexName: idx_mcp_view_context_mcp_session_id
            columns:
              - column:
                  name: mcp_session_id
      rollback:
        - dropIndex:
            tableName: mcp_view_context
            indexName: idx_mcp_view_context_mcp_session_id

  - changeSet:
      id: v61.2026-05-11T00:00:03
      author: codex
      comment: Index mcp_view_context.core_session_id for the FK
      changes:
        - createIndex:
            tableName: mcp_view_context
            indexName: idx_mcp_view_context_core_session_id
            columns:
              - column:
                  name: core_session_id
      rollback:
        - dropIndex:
            tableName: mcp_view_context
            indexName: idx_mcp_view_context_core_session_id

  - changeSet:
      id: v61.2026-05-11T00:00:04
      author: codex
      comment: FK from mcp_view_context.core_session_id to core_session, cascade on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: mcp_view_context
            baseColumnNames: core_session_id
            referencedTableName: core_session
            referencedColumnNames: id
            constraintName: fk_mcp_view_context_ref_core_session
            onDelete: CASCADE
