name: Build static-viz Escargot library

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "native/static-viz-escargot/**"
      - ".github/workflows/build-static-viz-escargot.yml"
  pull_request:
    paths:
      - "native/static-viz-escargot/**"
      - ".github/workflows/build-static-viz-escargot.yml"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-latest
            lib: libstaticviz.so
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            lib: libstaticviz.so
          - platform: macos-arm64
            runner: macos-latest
            lib: libstaticviz.dylib
          - platform: macos-amd64
            runner: macos-15-intel
            lib: libstaticviz.dylib
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y ninja-build
          else
            brew install ninja icu4c pkgconf
          fi
      - name: Build and smoke-test library
        run: ./native/static-viz-escargot/build.sh
      - name: Upload library
        uses: actions/upload-artifact@v4
        with:
          name: static-viz-escargot-${{ matrix.platform }}
          path: resources/static-viz-escargot/${{ matrix.platform }}/${{ matrix.lib }}
          if-no-files-found: error
