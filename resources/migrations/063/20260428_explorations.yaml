  - changeSet:
      id: v63.exppagetable
      author: johnswanson
      comment: Create exploration_page table — the persisted (block, card, dimension, query_type) page. Surrogate id is the page's identity; the (block, card, dim, query_type) columns are its mutable grouping/reconciliation key. Queries are reconciled to a page on (re)run so its id (and any comments/stars hanging off it) survives.
      changes:
        - createTable:
            tableName: exploration_page
            remarks: A page within a block — the queries for one (card, dimension, query_type), bundled under a stable id so comments/stars can anchor to it across reruns.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key — the page's stable identity, surfaced to the FE
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: exploration_block_id
                  type: int
                  remarks: The block this page belongs to. Mutable parent — a future re-grouping can move a page between blocks without changing its id.
                  constraints:
                    nullable: false
              - column:
                  name: card_id
                  type: int
                  remarks: Metric Card — part of the page's grouping/reconciliation key
                  constraints:
                    nullable: false
              - column:
                  name: dimension_id
                  type: ${text.type}
                  remarks: Virtual dimension ID — part of the page's grouping/reconciliation key
                  constraints:
                    nullable: false
              - column:
                  name: query_type
                  type: varchar(32)
                  defaultValue: default
                  remarks: Generator variant — part of the page's grouping/reconciliation key
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: First-seen authoring order of the page within its block
                  constraints:
                    nullable: false
              - column:
                  name: starred
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: True if the page is starred
                  constraints:
                    nullable: false
              - column:
                  name: hidden
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: True if the page is hidden from the sidebar
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the page was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the page was last updated
                  constraints:
                    nullable: false

