name: AI Benchmark

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'Agent profile to benchmark'
        required: false
        default: 'internal'
        type: choice
        options:
          - internal
          - metabot_next
          - nlq
          - sql
      sample:
        description: 'Cases per benchmark (integer N, or 1.0 for all)'
        required: false
        default: '3'
        type: string

jobs:
  benchmark:
    name: Run AI Benchmark
    runs-on: ubuntu-latest-8-cores
    timeout-minutes: 120

    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Verify db_dump.sql is not an LFS pointer
        run: |
          DUMP=ai-benchmark/src/benchmarks/fixtures/db_dump.sql
          file "$DUMP"
          SIZE=$(stat -c%s "$DUMP")
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: db_dump.sql is only $SIZE bytes — likely an LFS pointer stub"
            exit 1
          fi
          echo "db_dump.sql looks real ($SIZE bytes)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build benchmark base image
        working-directory: ai-benchmark
        run: ./scripts/build-base-image.sh

      - name: Start Metabase container
        working-directory: ai-benchmark
        env:
          MB_PREMIUM_EMBEDDING_TOKEN: ${{ secrets.MB_PREMIUM_EMBEDDING_TOKEN }}
          MB_EE_EMBEDDING_SERVICE_API_KEY: ${{ secrets.MB_EE_EMBEDDING_SERVICE_API_KEY }}
          MB_LLM_ANTHROPIC_API_KEY: ${{ secrets.MB_LLM_ANTHROPIC_API_KEY }}
        run: ./scripts/start-metabase.sh canonical_benchmark --keep-running

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Poetry and dependencies
        working-directory: ai-benchmark
        run: |
          pipx install poetry
          poetry install --no-interaction

      - name: Run benchmark
        working-directory: ai-benchmark
        env:
          AI_SERVICE_OPEN_AI_API_KEY: ${{ secrets.AI_SERVICE_OPEN_AI_API_KEY }}
          AI_SERVICE_ANTHROPIC_API_KEY: ${{ secrets.AI_SERVICE_ANTHROPIC_API_KEY }}
          AI_SERVICE_OPEN_ROUTER_API_KEY: ${{ secrets.AI_SERVICE_OPEN_ROUTER_API_KEY }}
        run: |
          poetry run ai-benchmark \
            --profile ${{ inputs.profile }} \
            --sample ${{ inputs.sample }} \
            --seed 1337

      - name: Dump container logs
        if: always()
        run: docker logs metabase-bench-canonical_benchmark > metabase-container.log 2>&1 || true

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            ai-benchmark/logs/
            metabase-container.log
          retention-days: 30

      - name: Stop container
        if: always()
        run: docker stop metabase-bench-canonical_benchmark || true
