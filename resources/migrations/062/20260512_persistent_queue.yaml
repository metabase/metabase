## Adds support for appdb persistent queue backend

databaseChangeLog:
  - changeSet:
      id: v62.asdgew
      author: nvoxland
      comment: Create the table backing the message queue
      changes:
        - createTable:
            tableName: queue_message_batch
            remarks: Lightweight message queue for cross-cluster communication
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: queue_name
                  type: varchar(254)
                  remarks: The name of queue this message is in
                  constraints:
                    nullable: false
              - column:
                  remarks: The timestamp of when the messages were created
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  remarks: The status of the messages
                  name: status
                  type: varchar(10)
                  defaultValue: 'pending'
                  constraints:
                    nullable: false
              - column:
                  remarks: Heartbeat to ensure status is not stuck
                  name: status_heartbeat
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  remarks: Number of failures processing these messages
                  name: failures
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  remarks: Current owner of the messages
                  name: owner
                  type: varchar(36)
              - column:
                  remarks: JSON-encoded array of messages
                  name: messages
                  type: ${text.type}
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.gdasfg2e
      author: nvoxland
      comment: Index queue_message_batch for efficient fetch
      changes:
        - createIndex:
            tableName: queue_message_batch
            indexName: idx_queue_message_fetch
            columns:
              - column:
                  name: queue_name
              - column:
                  name: status
              - column:
                  name: id
