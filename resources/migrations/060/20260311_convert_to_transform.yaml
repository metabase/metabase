## Add run_type column for `convert-to-transform` runs

databaseChangeLog:
  - logicalFilePath: migrations/060_update_migrations.yaml
  - changeSet:
      id: v60.2026-03-11T12:00:00
      author: escherize
      comment: Add run_type column to source_replacement_run
      changes:
        - addColumn:
            tableName: source_replacement_run
            columns:
              - column:
                  name: run_type
                  type: varchar(50)
                  remarks: "Type of run: `replace` or `convert-to-transform`"
                  defaultValue: "replace"
                  constraints:
                    nullable: false
