name: Monthly Sales Summary
source:
  query:
    database: Sample Database
    stages:
    - native: |-
        SELECT
          DATE_TRUNC('month', o.CREATED_AT) AS month,
          p.CATEGORY,
          COUNT(*) AS order_count,
          SUM(o.TOTAL) AS total_revenue
        FROM ORDERS o
        JOIN PRODUCTS p ON o.PRODUCT_ID = p.ID
        GROUP BY 1, 2
      lib/type: mbql.stage/native
    lib/type: mbql/query
