## Deduplicate and enforce unique names for transforms, transform tags, and transform jobs.
## Transform names are unique within their collection; tag and job names are globally unique.

databaseChangeLog:
  - logicalFilePath: migrations/060_update_migrations.yaml

  - changeSet:
      id: v60.2026-03-24T00:00:01
      author: ranquild
      comment: Deduplicate transform names within the same collection by appending entity_id
      changes:
        - sql:
            sql: >
              UPDATE transform
              SET name = name || ' ' || COALESCE(entity_id, CAST(id AS VARCHAR(36)))
              WHERE id IN (
                SELECT id FROM (
                  SELECT id, ROW_NUMBER() OVER (PARTITION BY COALESCE(collection_id, 0), name ORDER BY id) AS rn
                  FROM transform
                ) sub
                WHERE sub.rn > 1
              );
      rollback:

  - changeSet:
      id: v60.2026-03-24T00:00:02
      author: ranquild
      comment: Deduplicate transform tag names by appending entity_id
      changes:
        - sql:
            sql: >
              UPDATE transform_tag
              SET name = name || ' ' || COALESCE(entity_id, CAST(id AS VARCHAR(36)))
              WHERE id IN (
                SELECT id FROM (
                  SELECT id, ROW_NUMBER() OVER (PARTITION BY name ORDER BY id) AS rn
                  FROM transform_tag
                ) sub
                WHERE sub.rn > 1
              );
      rollback:

  - changeSet:
      id: v60.2026-03-24T00:00:03
      author: ranquild
      comment: Deduplicate transform job names by appending entity_id
      changes:
        - sql:
            sql: >
              UPDATE transform_job
              SET name = name || ' ' || COALESCE(entity_id, CAST(id AS VARCHAR(36)))
              WHERE id IN (
                SELECT id FROM (
                  SELECT id, ROW_NUMBER() OVER (PARTITION BY name ORDER BY id) AS rn
                  FROM transform_job
                ) sub
                WHERE sub.rn > 1
              );
      rollback:
