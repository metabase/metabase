name: Kondo Ratchets Self-Heal

# Stale budgets in .clj-kondo/ratchets.edn (above the actual ignore counts) fail CI. On PRs
# labelled kondo-ratchets-self-healing, this commits the lowered budgets to the branch;
# unlabelled PRs rely on local test runs to tighten the file.
permissions:
  contents: read

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - "**.clj"
      - "**.cljc"
      - "**.cljs"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ratchet-down:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    # fork PRs don't get the automation token, so we couldn't push to them anyway
    if: >-
      contains(github.event.pull_request.labels.*.name, 'kondo-ratchets-self-healing')
      && github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # the mage step below runs PR-controlled code, so don't leave credentials in git config
          persist-credentials: false
      - name: Lower ignore budgets to match the source tree
        run: ./bin/mage fix-kondo-ratchets
      - name: Commit to the PR branch if any budget decreased
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          REPO: ${{ github.repository }}
          # METABASE_AUTOMATION_USER_TOKEN so the self-healing commit triggers CI
          # (a GITHUB_TOKEN push would not); scoped to this step, which runs no PR-controlled code
          AUTOMATION_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
        run: |
          if git diff --quiet .clj-kondo/ratchets.edn; then
            echo "budgets already tight"
            exit 0
          fi
          git config --global user.name "Metabase Automation"
          git config --global user.email "github-automation@metabase.com"
          git add .clj-kondo/ratchets.edn
          git commit -m "Ratchet down kondo ignore budgets" --no-verify
          git push "https://x-access-token:${AUTOMATION_TOKEN}@github.com/${REPO}.git" "HEAD:$PR_BRANCH"
