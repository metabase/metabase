## Create search_prompt_entities table for storing search prompts and their associated entities.

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml

  - changeSet:
      id: v62.2026-06-02T00:00:00
      author: lbrdnk
      comment: Create search_prompt_entities table
      changes:
        - createTable:
            tableName: search_prompt_entities
            remarks: Stores search prompts paired with their associated entities
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: prompt
                  type: ${text.type}
                  remarks: The search prompt text
                  constraints:
                    nullable: false
              - column:
                  name: entities
                  type: ${text.type}
                  remarks: JSON array of associated entities
                  constraints:
                    nullable: false
              - column:
                  name: verified
                  type: boolean
                  remarks: Whether this prompt-entity mapping has been verified
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: search_prompt_entities

  - changeSet:
      id: v62.2026-06-02T00:00:01
      author: christruter
      comment: Add created_at/updated_at to search_prompt_entities (backfilled, not null)
      changes:
        - addColumn:
            tableName: search_prompt_entities
            columns:
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  # Backfills existing rows with the current timestamp so the column can be NOT NULL.
                  defaultValueComputed: current_timestamp
                  remarks: When the prompt-entity mapping was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the prompt-entity mapping was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-06-02T00:00:02
      author: lbrdnk
      comment: Add type column to search_prompt_entities (canonical or sources)
      changes:
        - addColumn:
            tableName: search_prompt_entities
            columns:
              - column:
                  name: type
                  type: varchar(50)
                  remarks: Discriminates the shape of entities — canonical (single entity) or sources (list of sources)
                  defaultValue: canonical
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-06-02T00:00:03
      author: christruter
      comment: Add entity_id to search_prompt_entities for serialization
      changes:
        - addColumn:
            tableName: search_prompt_entities
            columns:
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: Random NanoID tag for unique identity (serialization)
                  constraints:
                    nullable: true
                    unique: true
