name: Release Custom Viz Package
run-name: Release @metabase/custom-viz from ${{ inputs.branch }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to release from (master or release-x.NN.x)"
        type: string
        required: true
        default: "master"
      dry_run:
        description: "Skip npm publish and git tag push"
        type: boolean
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  determine-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      npm_tag: ${{ steps.resolve.outputs.npm_tag }}
      git_tag: ${{ steps.resolve.outputs.git_tag }}
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Resolve release from package.json
        id: resolve
        run: ./bin/custom-viz/resolve-release.sh | tee -a "$GITHUB_OUTPUT"

      - name: Append release plan to workflow summary
        env:
          BRANCH: ${{ inputs.branch }}
          VERSION: ${{ steps.resolve.outputs.version }}
          NPM_TAG: ${{ steps.resolve.outputs.npm_tag }}
          GIT_TAG: ${{ steps.resolve.outputs.git_tag }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          {
            echo "## Release plan"
            echo ""
            echo "- **Branch**: \`$BRANCH\`"
            echo "- **Version**: \`$VERSION\`"
            echo "- **npm tag**: \`$NPM_TAG\`"
            echo "- **git tag**: \`$GIT_TAG\`"
            echo "- **Dry run**: \`$DRY_RUN\`"
          } >> "$GITHUB_STEP_SUMMARY"

  preflight:
    needs: determine-release
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Fail if git tag already exists
        env:
          GIT_TAG: ${{ needs.determine-release.outputs.git_tag }}
        run: |
          if [ -n "$(git tag -l "$GIT_TAG")" ]; then
            echo "::error::Git tag '$GIT_TAG' already exists. Bump version in package.json and land a new PR."
            exit 1
          fi

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Fail if version already exists on npm
        env:
          VERSION: ${{ needs.determine-release.outputs.version }}
        run: |
          PUBLISHED=$(npm view "@metabase/custom-viz@$VERSION" version 2>/dev/null || true)
          if [ -n "$PUBLISHED" ]; then
            echo "::error::Version '$VERSION' already exists on npm. Bump version in package.json and land a new PR."
            exit 1
          fi

      - name: Install custom-viz dependencies
        working-directory: enterprise/frontend/src/custom-viz
        run: bun install --frozen-lockfile

      - name: Check package version consistency
        working-directory: enterprise/frontend/src/custom-viz
        run: bun run check:package-versions

  build-and-publish:
    needs: [determine-release, preflight]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: enterprise/frontend/src/custom-viz
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Setup npm registry auth
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install custom-viz dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Publish to NPM
        if: ${{ !inputs.dry_run }}
        env:
          NPM_TAG: ${{ needs.determine-release.outputs.npm_tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_RELEASE_TOKEN }}
        run: npm publish --tag "$NPM_TAG"

      - name: Dry run — skipping npm publish
        if: ${{ inputs.dry_run }}
        run: echo "dry_run=true → skipped 'npm publish --tag ${{ needs.determine-release.outputs.npm_tag }}'"

  tag-git:
    needs: [determine-release, build-and-publish]
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
      - name: Check out the code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "Metabase Automation"
          git config user.email "github-automation@metabase.com"

      - name: Create git tag
        env:
          GIT_TAG: ${{ needs.determine-release.outputs.git_tag }}
          VERSION: ${{ needs.determine-release.outputs.version }}
        run: git tag -a "$GIT_TAG" -m "@metabase/custom-viz $VERSION"

      - name: Push git tag
        if: ${{ !inputs.dry_run }}
        env:
          GIT_TAG: ${{ needs.determine-release.outputs.git_tag }}
        run: git push origin "$GIT_TAG"

      - name: Dry run — skipping git tag push
        if: ${{ inputs.dry_run }}
        run: echo "dry_run=true → skipped 'git push origin ${{ needs.determine-release.outputs.git_tag }}'"

      - name: Workflow summary
        env:
          VERSION: ${{ needs.determine-release.outputs.version }}
          NPM_TAG: ${{ needs.determine-release.outputs.npm_tag }}
          GIT_TAG: ${{ needs.determine-release.outputs.git_tag }}
          BRANCH: ${{ inputs.branch }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          tee -a "$GITHUB_STEP_SUMMARY" << EOF
          ## Released @metabase/custom-viz

          - **Version**: \`$VERSION\`
          - **npm tag**: \`$NPM_TAG\`
          - **git tag**: \`$GIT_TAG\`
          - **Branch**: \`$BRANCH\`
          - **Dry run**: \`$DRY_RUN\`
          - **Triggered by**: @${{ github.event.sender.login }}
          EOF
