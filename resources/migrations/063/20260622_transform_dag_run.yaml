## DAG-reprocess runs: reprocessing the transitive dependency DAG rooted at a single transform
## (upstream or downstream). These are coordinated multi-transform runs, like scheduled job runs,
## but triggered manually from one seed transform rather than by a job. They get their own table
## (transform_dag_run) rather than overloading transform_job_run, and each member transform_run is
## linked back to its coordinating DAG run via transform_run.dag_run_id (mirroring job_run_id).

databaseChangeLog:

  - changeSet:
      id: v63.2026-07-03T00:00:00
      author: bronsa
      comment: Create transform_dag_run table to track manual DAG-reprocess runs seeded from a single transform
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: transform_dag_run
      changes:
        - createTable:
            tableName: transform_dag_run
            remarks: Tracks manual DAG-reprocess runs (reprocessing a transform's upstream/downstream dependency DAG)
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: source_transform_id
                  type: int
                  remarks: The seed transform the DAG reprocess was triggered from
                  constraints:
                    nullable: false
              - column:
                  name: direction
                  type: varchar(20)
                  remarks: DAG traversal direction (upstream/downstream) that selected the transforms to run
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(50)
                  remarks: Current status of the run (started, succeeded, failed, timeout, canceled)
                  constraints:
                    nullable: false
              - column:
                  name: is_active
                  type: ${boolean.type}
                  remarks: True only for currently running DAG runs, null for the others
                  constraints:
                    nullable: true
                    defaultValue: true
              - column:
                  name: start_time
                  type: ${timestamp_type}
                  remarks: When the DAG run started
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: ${timestamp_type}
                  remarks: When the DAG run completed (null if still running)
                  constraints:
                    nullable: true
              - column:
                  name: message
                  type: ${text.type}
                  remarks: Human-readable message about the run; may contain the error message when the run failed
                  constraints:
                    nullable: true
              - column:
                  name: user_id
                  type: int
                  remarks: The user who triggered the DAG run (null if the user was later deleted)
                  constraints:
                    nullable: true
              - column:
                  name: last_heartbeat
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: Heartbeat timestamp stamped periodically while the run executes; a stale value means the owning process died
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: The timestamp this DAG run was created.
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: The timestamp this DAG run was last updated.
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: transform_dag_run

  - changeSet:
      id: v63.2026-07-03T00:00:01
      author: bronsa
      comment: FK from transform_dag_run.source_transform_id to transform; cascade-delete a transform's DAG run history with it
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyTableName: transform_dag_run
                foreignKeyName: fk_transform_dag_run_source_transform_id
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_transform_dag_run_source_transform_id
            baseTableName: transform_dag_run
            baseColumnNames: source_transform_id
            referencedTableName: transform
            referencedColumnNames: id
            onDelete: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: transform_dag_run
            constraintName: fk_transform_dag_run_source_transform_id

  - changeSet:
      id: v63.2026-07-03T00:00:02
      author: bronsa
      comment: FK from transform_dag_run.user_id to core_user; null it out when the user is deleted so run history survives
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyTableName: transform_dag_run
                foreignKeyName: fk_transform_dag_run_user_id
      changes:
        - addForeignKeyConstraint:
            constraintName: fk_transform_dag_run_user_id
            baseTableName: transform_dag_run
            baseColumnNames: user_id
            referencedTableName: core_user
            referencedColumnNames: id
            onDelete: SET NULL
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: transform_dag_run
            constraintName: fk_transform_dag_run_user_id

  - changeSet:
      id: v63.2026-07-03T00:00:03
      author: bronsa
      comment: Index transform_dag_run on (is_active, last_heartbeat) so the every-minute reaper scan is O(active rows)
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                tableName: transform_dag_run
                indexName: idx_transform_dag_run_active_runs
      changes:
        - createIndex:
            tableName: transform_dag_run
            indexName: idx_transform_dag_run_active_runs
            columns:
              - column:
                  name: is_active
              - column:
                  name: last_heartbeat
      rollback:
        - dropIndex:
            tableName: transform_dag_run
            indexName: idx_transform_dag_run_active_runs

  - changeSet:
      id: v63.2026-07-03T00:00:04
      author: bronsa
      comment: Index transform_dag_run on source_transform_id for per-transform DAG run history lookups
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                tableName: transform_dag_run
                indexName: idx_transform_dag_run_source_transform_id
      changes:
        - createIndex:
            tableName: transform_dag_run
            indexName: idx_transform_dag_run_source_transform_id
            columns:
              - column:
                  name: source_transform_id
      rollback:
        - dropIndex:
            tableName: transform_dag_run
            indexName: idx_transform_dag_run_source_transform_id

  - changeSet:
      id: v63.2026-07-03T00:00:05
      author: bronsa
      comment: >-
        Add dag_run_id to transform_run to link each transform execution to its coordinating DAG run
        (mirrors job_run_id, which links to transform_job_run). Exactly one of the two is set for a
        coordinated member run; both are null for a standalone single-transform run.
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: transform_run
                columnName: dag_run_id
      changes:
        - addColumn:
            tableName: transform_run
            columns:
              - column:
                  name: dag_run_id
                  type: bigint
                  remarks: FK to transform_dag_run; links each transform execution to its coordinating DAG run
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: transform_run
            columnName: dag_run_id

  - changeSet:
      id: v63.2026-07-03T00:00:06
      author: bronsa
      comment: Index transform_run on dag_run_id for efficient drill-down of a DAG run's member transform runs
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                tableName: transform_run
                indexName: idx_transform_run_dag_run_id
      changes:
        - createIndex:
            tableName: transform_run
            indexName: idx_transform_run_dag_run_id
            columns:
              - column:
                  name: dag_run_id
      rollback:
        - dropIndex:
            tableName: transform_run
            indexName: idx_transform_run_dag_run_id
