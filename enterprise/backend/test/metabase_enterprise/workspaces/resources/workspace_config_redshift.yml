# Redshift workspace - 2-slot identifiers (Postgres-family).
#
# Redshift emits `schema.table` (qualified-name-components is [:schema], inherited
# from :postgres). Same wire shape as Postgres; the SSL-enabled JDBC connection
# and port 5439 are the only details that differ from a vanilla Postgres workspace.
version: 1
config:
  databases:
  - name: test-data (redshift)
    engine: redshift
    details:
      host: redshift-cluster.example.us-east-1.redshift.amazonaws.com
      port: 5439
      db: test-data
      user: mb__isolation_44490_1933
      password: $52-8Aqjd%4$=-5H#h!uS#66Pge=+B4u9SqYJ9+fr2ED*&XTh2tPtC2U9
      schema-filters-type: inclusion
      schema-filters-patterns: public
  users:
  - first_name: Workspace
    last_name: Admin
    email: workspace@workspace.local
    password: password1
  settings:
    remote-sync-url: https://github.com/metabase/stats-remote-sync
    remote-sync-type: read-write
    remote-sync-branch: main
    remote-sync-token: not-real
  workspace:
    name: New workspace
    databases:
      test-data (redshift):
        input_schemas:
        - public
        output:
          schema: mb__isolation_44490_1933
