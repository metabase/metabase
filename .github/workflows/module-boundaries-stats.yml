name: Module Boundaries Stats

on:
  workflow_dispatch:
  schedule:
    - cron: 40 1 * * 5 # every Friday at 1:40

jobs:
  module-boundaries-stats:
    if: ${{ github.event_name != 'schedule' || github.repository == 'metabase/metabase' }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: 'package.json'
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: get module boundary stats
        id: get-stats
        run: node frontend/lint/module-boundaries-stats.mjs | tee -a "$GITHUB_OUTPUT"
      - name: Upload stats
        uses: actions/github-script@v9
        env:
          NAMED_MODULES: ${{ steps.get-stats.outputs.NAMED_MODULES }}
          ENFORCED_MODULES: ${{ steps.get-stats.outputs.ENFORCED_MODULES }}
          UNMODULED: ${{ steps.get-stats.outputs.UNMODULED }}
          VIOLATIONS: ${{ steps.get-stats.outputs.VIOLATIONS }}
          API_KEY: ${{ secrets.STATS_API_KEY }}
        with:
          script: | # js
            const { uploadCsvToMb } = require('${{ github.workspace }}/.github/scripts/csv-to-mb.js');

            console.log("NAMED_MODULES", Number(process.env.NAMED_MODULES));
            console.log("ENFORCED_MODULES", Number(process.env.ENFORCED_MODULES));
            console.log("UNMODULED", Number(process.env.UNMODULED));
            console.log("VIOLATIONS", Number(process.env.VIOLATIONS));

            const data = [
              {
                'Date': new Date().toISOString().slice(0, 10), // YYYY-MM-DD
                'Modules': Number(process.env.NAMED_MODULES),
                'Enforced modules': Number(process.env.ENFORCED_MODULES),
                'Unmoduled folders': Number(process.env.UNMODULED),
                'Violations': Number(process.env.VIOLATIONS),
              }
            ];

            uploadCsvToMb({
              baseUrl: 'https://stats.metabase.com',
              tableId: 75146,
              jsonData: data,
              mode: 'append',
            }).then(() => {
              console.log('Data uploaded successfully');
            }).catch((error) => {
              console.error('Error uploading data:', error);
              process.exit(1);
            });
