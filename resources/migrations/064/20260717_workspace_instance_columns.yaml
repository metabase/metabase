## Workspaces: track the deployed child Metabase instance (Harbormaster) on the
## workspace row so we can reach and later delete it.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-17T00:00:00
      author: ranquild
      comment: Add instance_id to workspace for the deployed child instance
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: instance_id
                  remarks: ID of the deployed child instance serving this workspace
                  type: varchar(254)

  - changeSet:
      id: v64.2026-07-17T00:00:01
      author: ranquild
      comment: Add instance_url to workspace for the deployed child instance
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: instance_url
                  remarks: URL of the deployed child instance serving this workspace
                  type: ${text.type}
