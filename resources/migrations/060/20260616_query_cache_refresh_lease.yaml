## Add query_cache.refresh_started_at -- cross-process refresh lease for stale-while-revalidate caching.
## Backported across 60/61/62/63: the same change exists in each version dir; each changeSet is skipped
## (MARK_RAN) if any of the others already ran, so the column is added exactly once. This v60 changeSet runs
## first on a fresh install, so it carries the real rollback.

databaseChangeLog:
  - logicalFilePath: migrations/060_update_migrations.yaml

  - changeSet:
      id: v60.2026-06-16T00:00:00
      author: ranquild
      comment: Add query_cache.refresh_started_at as a cross-process refresh lease for stale-while-revalidate caching
      preConditions:
        - onFail: MARK_RAN
        - not:
            changeSetExecuted:
              id: v61.2026-06-16T00:00:00
              author: ranquild
              changeLogFile: migrations/061_update_migrations.yaml
        - not:
            changeSetExecuted:
              id: v62.2026-06-16T00:00:00
              author: ranquild
              changeLogFile: migrations/062_update_migrations.yaml
        - not:
            changeSetExecuted:
              id: v63.2026-06-16T00:00:00
              author: ranquild
              changeLogFile: migrations/063_update_migrations.yaml
      changes:
        - addColumn:
            tableName: query_cache
            columns:
              - column:
                  name: refresh_started_at
                  type: ${timestamp_type}
                  remarks: When a process claimed the lease to recompute this expired entry; NULL when no refresh is in progress. Used to elect a single refresher across processes so the others serve stale results.
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: query_cache
            columnName: refresh_started_at
