name: Cross-Version Migration Tests

on:
  workflow_dispatch:
    inputs:
      source_version:
        description: "Source version (e.g., v1.58.6 or HEAD)"
        required: true
        type: string
      target_version:
        description: "Target version (e.g., v1.58.7 or HEAD)"
        required: true
        type: string

  pull_request:
    paths:
      - "cross-version/**"
      - ".github/workflows/cross-version.yml"
      - ".github/scripts/build-cross-version-matrix.js"

  # TEMP: test Slack notification on this branch
  push:
    branches:
      - DEV-1671-cross-version-slack

  schedule:
    # Run nightly at 3 AM UTC
    - cron: "0 3 * * *"

jobs:
  # Generate matrix for scheduled/PR runs
  generate-matrix:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Generate version matrix
        id: set-matrix
        uses: actions/github-script@v7
        with:
          script: |
            const { buildCrossVersionMatrix } = require('${{ github.workspace }}/.github/scripts/build-cross-version-matrix');
            const { config } = buildCrossVersionMatrix(${{ vars.CURRENT_VERSION }});
            const matrix = JSON.stringify({ include: config });
            core.setOutput("matrix", matrix);
            console.log("matrix:", matrix);

  # Matrix-based tests for scheduled/PR runs
  test-matrix:
    if: github.event_name != 'workflow_dispatch'
    needs: generate-matrix
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 30
    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare Cypress environment
        uses: ./.github/actions/prepare-cypress

      - name: Run cross-version test
        env:
          CURRENT_VERSION: ${{ vars.CURRENT_VERSION }}
          RESULT_FILE: ${{ runner.temp }}/cross-version-result.json
        run: |
          cd cross-version
          ./test.sh --source "${{ matrix.source }}" --target "${{ matrix.target }}"

      - name: Upload failure result
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failure-result-${{ matrix.source }}-${{ matrix.target }}
          path: ${{ runner.temp }}/cross-version-result.json
          if-no-files-found: ignore

      - name: Upload Cypress Artifacts upon failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-recording-${{ matrix.source }}-${{ matrix.target }}
          path: |
            ./cypress
            ./logs/test.log
          if-no-files-found: ignore

      - name: Show logs on failure
        if: failure()
        run: |
          cd cross-version
          docker compose logs metabase || true
          docker compose logs postgres || true

  # Notify Slack on nightly failures
  notify-on-failure:
    # TEMP: changed from 'schedule' to test on push
    if: always() && needs.test-matrix.result == 'failure'
    needs: [test-matrix]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            release
            .github

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Download failure results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: failure-result-*
          path: failure-results
          merge-multiple: true

      - name: Notify Slack
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { sendCrossVersionSlackNotification } = require('${{ github.workspace }}/release/dist/index.cjs');

            const resultsDir = 'failure-results';
            const failures = [];
            if (fs.existsSync(resultsDir)) {
              for (const file of fs.readdirSync(resultsDir)) {
                if (!file.endsWith('.json')) continue;
                try {
                  failures.push(JSON.parse(fs.readFileSync(path.join(resultsDir, file), 'utf8')));
                } catch (e) {
                  console.log(`Skipping malformed result: ${file}`);
                }
              }
            }

            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            // TEMP: using bot-testing channel instead of engineering-ci
            await sendCrossVersionSlackNotification(failures, runUrl, process.env.SLACK_BOT_TOKEN, 'bot-testing');
            console.log('Slack notification sent');

  # Manual test for workflow_dispatch
  test-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare Cypress environment
        uses: ./.github/actions/prepare-cypress

      - name: Run cross-version test
        env:
          CURRENT_VERSION: ${{ vars.CURRENT_VERSION }}
        run: |
          cd cross-version
          ./test.sh --source "${{ inputs.source_version }}" --target "${{ inputs.target_version }}"

      - name: Upload Cypress Artifacts upon failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-recording-${{ inputs.source_version }}-${{ inputs.target_version }}
          path: |
            ./cypress
            ./logs/test.log
          if-no-files-found: ignore

      - name: Show logs on failure
        if: failure()
        run: |
          cd cross-version
          docker compose logs metabase || true
          docker compose logs postgres || true
