## Workspace lifecycle statuses: workspaces get their own status/status_details
## columns (provisioning is now started explicitly and runs async), and
## workspace_database rows record the failure message of their last
## provision/deprovision attempt in status_details.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-18T10:00:00
      author: ranquild
      comment: Add workspace.status
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: status
                  type: varchar(254)
                  defaultValue: unprovisioned
                  remarks: Provisioning lifecycle state of the workspace
                  constraints:
                    nullable: false

  - changeSet:
      id: v64.2026-07-18T10:00:01
      author: ranquild
      comment: Add workspace.status_details
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: status_details
                  type: ${text.type}
                  remarks: Encrypted details for the current status, e.g. the provisioning failure message
                  constraints:
                    nullable: true

  - changeSet:
      id: v64.2026-07-18T10:00:02
      author: ranquild
      comment: Add workspace_database.status_details
      changes:
        - addColumn:
            tableName: workspace_database
            columns:
              - column:
                  name: status_details
                  type: ${text.type}
                  remarks: Encrypted details for the current status, e.g. the provisioning failure message
                  constraints:
                    nullable: true
