
name: evals-dispatch
run-name: "dispatch evals · ${{ github.event_name == 'pull_request' && format('smoke PR#{0}', github.event.pull_request.number) || format('PR#{0}', inputs.pr) }}"

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr:
        description: "Metabase PR number (sets ref to the PR head)"
        required: false
        default: ""
      ref:
        description: "Metabase ref"
        required: false
        default: ""
      scope:
        description: "Scope"
        required: true
        type: choice
        options: [smoke, full, "all (EXPENSIVE)"]
        default: smoke
      sample:
        description: "Sample (0 = full suite)"
        required: false
        default: "5"
      evals_action_ref:
        description: "Evals workflow ref"
        required: false
        default: ci-milestone-3
      evals_logic_ref:
        description: "Evals logic ref"
        required: false
        default: ci-milestone-3

permissions:
  contents: read
  issues: write

jobs:
  uberjar:
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'evals/smoke'
      && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/uberjar.yml
    secrets: inherit

  smoke:
    needs: [uberjar]
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'evals/smoke'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch smoke eval-run
        env:
          GH_TOKEN: ${{ secrets.MB_EVALS_CI_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh api repos/metabase/evals/actions/workflows/eval-run.yml/dispatches \
            -f ref="ci-milestone-3" \
            -f "inputs[pr]=$PR" \
            -f "inputs[scope]=smoke" \
            -f "inputs[sample]=5" \
            -f "inputs[evals_ref]=ci-milestone-3"

      - name: Remove label
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          gh api -X DELETE \
            "repos/${{ github.repository }}/issues/$PR/labels/evals%2Fsmoke" \
            || echo "label already gone"

  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch eval-run
        env:
          GH_TOKEN: ${{ secrets.MB_EVALS_CI_TOKEN }}
          ACTION_REF: ${{ inputs.evals_action_ref }}
          PR: ${{ inputs.pr }}
          REF: ${{ inputs.ref }}
          SCOPE: ${{ inputs.scope }}
          SAMPLE: ${{ inputs.sample }}
          LOGIC_REF: ${{ inputs.evals_logic_ref }}
        run: |
          gh api repos/metabase/evals/actions/workflows/eval-run.yml/dispatches \
            -f ref="$ACTION_REF" \
            -f "inputs[pr]=$PR" \
            -f "inputs[ref]=$REF" \
            -f "inputs[scope]=$SCOPE" \
            -f "inputs[sample]=$SAMPLE" \
            -f "inputs[evals_ref]=$LOGIC_REF"
