## Backfill canonical entity IDs for legacy Library root collections

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml

  - changeSet:
      id: v62.2026-05-13T11:59:58
      author: andsalves
      comment: Backfill type column value for Library collections
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET type = 'library'
              WHERE entity_id = 'librarylibrarylibrary' AND (type IS NULL OR type <> 'library');

              UPDATE collection
              SET type = 'library-data'
              WHERE entity_id = 'librarylibrarydatadat' AND (type IS NULL OR type <> 'library-data');

              UPDATE collection
              SET type = 'library-metrics'
              WHERE entity_id = 'librarylibrarymetrics' AND (type IS NULL OR type <> 'library-metrics');
      rollback:
        - empty: {}
  - changeSet:
      id: v62.2026-05-13T11:59:59
      author: andsalves
      comment: Make sure the root collection with library type and canonical entity_id is unique
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET type = NULL
              WHERE type = 'library' AND location = '/' AND entity_id != 'librarylibrarylibrary'
                AND EXISTS (
                  SELECT 1 FROM (
                    SELECT entity_id FROM collection WHERE entity_id = 'librarylibrarylibrary'
                  ) existing
                );
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T12:00:00
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library root collection
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarylibrary'
              WHERE type = 'library' AND location = '/'
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T12:00:00.500
      author: andsalves
      comment: Set MySQL/MariaDB session collation for Library root child path comparisons
      changes:
        - sql:
            dbms: mysql,mariadb
            sql: SET collation_connection = 'utf8mb4_unicode_ci'
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T12:00:01
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library Data section
      changes:
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarydatadat'
              WHERE type = 'library-data'
                AND location IN (
                  SELECT loc FROM (
                    SELECT '/' || CAST(id AS VARCHAR) || '/' AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-data'
                      AND child.location IN (
                        SELECT '/' || CAST(lib.id AS VARCHAR) || '/'
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
        - sql:
            dbms: mysql,mariadb
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarydatadat'
              WHERE type = 'library-data'
                AND location IN (
                  SELECT loc FROM (
                    SELECT CONCAT('/', CAST(id AS CHAR), '/') AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-data'
                      AND child.location IN (
                        SELECT CONCAT('/', CAST(lib.id AS CHAR), '/')
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T12:00:02
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library Metrics section
      changes:
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarymetrics'
              WHERE type = 'library-metrics'
                AND location IN (
                  SELECT loc FROM (
                    SELECT '/' || CAST(id AS VARCHAR) || '/' AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-metrics'
                      AND child.location IN (
                        SELECT '/' || CAST(lib.id AS VARCHAR) || '/'
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
        - sql:
            dbms: mysql,mariadb
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarymetrics'
              WHERE type = 'library-metrics'
                AND location IN (
                  SELECT loc FROM (
                    SELECT CONCAT('/', CAST(id AS CHAR), '/') AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-metrics'
                      AND child.location IN (
                        SELECT CONCAT('/', CAST(lib.id AS CHAR), '/')
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
      rollback:
        - empty: {}
