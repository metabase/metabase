# The query_execution table needs to be partitioned on postgres.
#
# Attach the query_execution_old table as a partition. This partition covers up
# to the current month, plus one more after, in order to handle the case where
# the migration runs at the end of the month and query executions need to be
# written to disk before the job to create the next partition gets a chance to
# run.
#
# The IDENTITY has to be dropped since this can't be done in a partition; it
# should be handled by the higher level table.
#
# The old query_execution table is now a partition of the new query_execution
# table, but the v_query_log view still references the old one. Re-creating it
# will point it at the new one.
databaseChangeLog:
  - changeSet:
      id: v64.2026-07-23T11:39:56
      author: technomancy
      comment: Create partitioned query_execution table and attach old one
      dbms: postgresql
      changes:
        - sql:
            sql: >-
              ALTER TABLE query_execution RENAME TO query_execution_old;
              CREATE TABLE query_execution (LIKE query_execution_old INCLUDING ALL)
                PARTITION BY RANGE (started_at);
              ALTER TABLE query_execution_old ALTER COLUMN id DROP IDENTITY;
              ALTER TABLE query_execution ATTACH PARTITION query_execution_old
                FOR VALUES FROM ('1970-01-01')
                           TO (date_trunc('month', current_timestamp + '1 month'::interval));
        - sqlFile:
            path: ../instance_analytics_views/query_log/v6/postgres-query_log.sql
            relativeToChangelogFile: true
      rollback:
        - sql:
            sql: >-
              ALTER TABLE query_execution_old ALTER COLUMN id
                      ADD GENERATED BY DEFAULT AS IDENTITY;
              DROP TABLE query_execution CASCADE;
              ALTER TABLE query_execution_old RENAME TO query_execution;
        - sqlFile:
            path: ../instance_analytics_views/query_log/v6/postgres-query_log.sql
            relativeToChangelogFile: true
