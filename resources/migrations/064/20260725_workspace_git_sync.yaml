## Workspaces as git branches: workspace copies of git-synced entities carry the
## same entity_id as their source, so entity_id uniqueness becomes per-workspace via a
## workspace_id_helper generated column (COALESCE(workspace_id, 0)) and a composite
## unique index. The workspace table gains the branch (renamed from name, unique) it is
## checked out to and the base_version bookkeeping column; remote_sync_object and
## remote_sync_task rows are scoped to a workspace.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-25T09:00:00
      author: ranquild
      comment: Rename workspace.name to workspace.branch
      changes:
        - renameColumn:
            tableName: workspace
            oldColumnName: name
            newColumnName: branch
            columnDataType: varchar(254)

  - changeSet:
      id: v64.2026-07-25T09:00:01
      author: ranquild
      comment: Unique index on workspace.branch
      changes:
        - createIndex:
            tableName: workspace
            indexName: idx_workspace_branch
            unique: true
            columns:
              - column:
                  name: branch

  - changeSet:
      id: v64.2026-07-25T09:00:02
      author: ranquild
      comment: Add workspace.base_version
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: base_version
                  type: varchar(254)
                  remarks: Last synced git SHA for this workspace; null until first successful pull
                  constraints:
                    nullable: true

  - changeSet:
      id: v64.2026-07-25T10:00:03
      author: ranquild
      comment: Add collection.workspace_id
      changes:
        - addColumn:
            tableName: collection
            columns:
              - column:
                  name: workspace_id
                  type: int
                  remarks: Workspace this collection belongs to; null for main-app content (including default-branch remote sync)
                  constraints:
                    nullable: true

  - changeSet:
      id: v64.2026-07-25T10:00:04
      author: ranquild
      comment: FK collection.workspace_id -> remote_sync_workspace
      changes:
        - addForeignKeyConstraint:
            baseTableName: collection
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_collection_workspace_id
            deleteCascade: true

  - changeSet:
      id: v64.2026-07-25T10:00:05
      author: ranquild
      comment: Index on collection.workspace_id
      changes:
        - createIndex:
            tableName: collection
            indexName: idx_collection_workspace_id
            columns:
              - column:
                  name: workspace_id

  - changeSet:
      id: v64.2026-07-25T10:00:06
      author: ranquild
      comment: Add remote_sync_object.workspace_id
      changes:
        - addColumn:
            tableName: remote_sync_object
            columns:
              - column:
                  name: workspace_id
                  type: int
                  remarks: Workspace whose dirty ledger this row belongs to
                  constraints:
                    nullable: true

  - changeSet:
      id: v64.2026-07-25T10:00:07
      author: ranquild
      comment: FK remote_sync_object.workspace_id -> remote_sync_workspace
      changes:
        - addForeignKeyConstraint:
            baseTableName: remote_sync_object
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_remote_sync_object_workspace_id
            deleteCascade: true

  - changeSet:
