name: Create test plan
description: Cruise the frontend import graph and compute the affected-tests plan.

inputs:
  changed-files:
    description: All changed files (CSV).
    required: true
  fe-changed-files:
    description: Changed frontend_sources files (CSV).
    required: true
  be-changed-files:
    description: Changed backend_sources files (CSV).
    required: true
  unit-infra-touched:
    description: Whether FE unit infra changed.
    required: true
  loki-infra-touched:
    description: Whether Loki infra changed.
    required: true
  e2e-infra-touched:
    description: Whether e2e harness/support code changed.
    required: true
  shared-sources-touched:
    description: Whether cljc/cljs/package.json changed.
    required: true

outputs:
  stats:
    description: FE Affected Tests stats row (JSON).
    value: ${{ steps.compute.outputs.stats }}
  fe_unit_specs_to_run:
    description: Unit specs to run (JSON array).
    value: ${{ steps.compute.outputs.fe_unit_specs_to_run }}
  loki_stories_to_run:
    description: Loki stories to run (JSON array).
    value: ${{ steps.compute.outputs.loki_stories_to_run }}
  e2e_specs_to_run:
    description: E2E specs to run (JSON array).
    value: ${{ steps.compute.outputs.e2e_specs_to_run }}

runs:
  using: composite
  steps:
    - name: Prepare Node + Bun
      uses: ./.github/actions/prepare-node-bun
    # Resolve the nightly e2e coverage manifest closest to this PR's history
    # (resolve-coverage-manifest.mjs: list artifacts -> compare API -> download
    # -> unzip, no deep clone). Sets `path` when found; create-test-plan.ts maps
    # its spec->files to modules and narrows the e2e run. Absent => e2e in full.
    - name: Resolve closest-ancestor e2e coverage manifest
      id: manifest
      uses: actions/github-script@v9
      with:
        script: | # js
          const { pathToFileURL } = require("url");
          const { resolveCoverageManifest } = await import(
            pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/.github/scripts/resolve-coverage-manifest.mjs`,
            ).href,
          );
          const result = await resolveCoverageManifest({
            github,
            owner: context.repo.owner,
            repo: context.repo.repo,
            headSha: context.payload.pull_request?.head?.sha ?? context.sha,
          });
          core.setOutput("path", result?.path ?? "");
    - name: Build dependency graph
      shell: bash
      run: |
        bun install --frozen-lockfile || true
        bunx depcruise frontend/src enterprise/frontend/src \
          --config .dependency-cruiser.cjs \
          --output-type json > dependency-graph.json || true

    - name: Create test plan
      id: compute
      shell: bash
      env:
        CHANGED_FILES: ${{ inputs.changed-files }}
        FE_CHANGED_FILES: ${{ inputs.fe-changed-files }}
        BE_CHANGED_FILES: ${{ inputs.be-changed-files }}
        UNIT_INFRA_TOUCHED: ${{ inputs.unit-infra-touched }}
        LOKI_INFRA_TOUCHED: ${{ inputs.loki-infra-touched }}
        E2E_INFRA_TOUCHED: ${{ inputs.e2e-infra-touched }}
        SHARED_SOURCES_TOUCHED: ${{ inputs.shared-sources-touched }}
        DEP_GRAPH_JSON: dependency-graph.json
        E2E_SPEC_MANIFEST: ${{ steps.manifest.outputs.path }}
      run: |
        # stdout is the plan JSON; the planner's own info logs go to stderr.
        bun .github/scripts/create-test-plan.ts > test-plan.json
        echo "stats=$(jq -c '.stats' test-plan.json)" >> "$GITHUB_OUTPUT"
        echo "fe_unit_specs_to_run=$(jq -c '.fe_unit_specs_to_run' test-plan.json)" >> "$GITHUB_OUTPUT"
        echo "loki_stories_to_run=$(jq -c '.loki_stories_to_run' test-plan.json)" >> "$GITHUB_OUTPUT"
        echo "e2e_specs_to_run=$(jq -c '.e2e_specs_to_run' test-plan.json)" >> "$GITHUB_OUTPUT"

    # A scannable "what will run" summary, to the console and the job summary.
    - name: Report test plan
      shell: bash
      run: |
        p=test-plan.json
        row() { # name, to_run, total
          if [ "$2" -eq "$3" ]; then echo "| $1 | all ($3) | $3 |"; else echo "| $1 | $2 | $3 |"; fi
        }
        {
          echo "## Affected test plan"
          echo
          echo "| Suite | Selected | Total |"
          echo "|---|---:|---:|"
          row "Unit" "$(jq '.stats.unit_specs_to_run_usage' $p)" "$(jq '.stats.unit_specs_all' $p)"
          row "Loki" "$(jq '.stats.loki_stories_to_run_usage' $p)" "$(jq '.stats.loki_stories_all' $p)"
          row "E2E"  "$(jq '.stats.e2e_specs_to_run_usage' $p)"  "$(jq '.stats.e2e_specs_all' $p)"
          echo
          echo "Changed: $(jq '.stats.fe_files_changed' $p) FE / $(jq '.stats.be_files_changed' $p) BE file(s) · $(jq '.stats.fe_modules_affected_usage' $p) FE module(s) affected"
          echo
          e2e_run=$(jq '.stats.e2e_specs_to_run_usage' $p)
          e2e_all=$(jq '.stats.e2e_specs_all' $p)
          if [ "$e2e_run" -eq "$e2e_all" ]; then
            echo "**E2E: full run** — no manifest, or a change the coverage manifest can't scope (backend, e2e infra, cljc/cljs)."
          else
            echo "<details><summary><b>E2E specs to run ($e2e_run)</b></summary>"
            echo
            jq -r '.e2e_specs_to_run[]' $p | sed 's/^/- /'
            echo
            echo "</details>"
          fi
          echo
          echo "<details><summary>Full stats (rules vs usage graph)</summary>"
          echo
          echo '```json'
          jq '.stats' $p
          echo '```'
          echo "</details>"
        } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/null}"
