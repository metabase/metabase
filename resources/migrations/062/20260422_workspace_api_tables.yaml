## Workspace and workspace_database tables for the /api/ee/workspace API

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml
  - changeSet:
      id: v62.2026-04-22T12:00:00
      author: eric
      comment: Create workspace table
      changes:
        - createTable:
            tableName: workspace
            remarks: Groups one or more databases with override credentials and per-database schema config
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(254)
                  remarks: Display name of the workspace
                  constraints:
                    nullable: false
              - column:
                  name: creator_id
                  type: int
                  remarks: User who created this workspace
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this workspace was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this workspace was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:01
      author: eric
      comment: Create workspace_database table
      changes:
        - createTable:
            tableName: workspace_database
            remarks: Associates a workspace with a database, with override credentials and schema config
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: The workspace this row belongs to
                  constraints:
                    nullable: false
              - column:
                  name: database_id
                  type: int
                  remarks: The underlying database this row configures
                  constraints:
                    nullable: false
              - column:
                  name: database_details
                  type: ${text.type}
                  remarks: JSON-encoded override connection details
                  constraints:
                    nullable: false
              - column:
                  name: output_schema
                  type: varchar(254)
                  remarks: Schema where workspace output tables are written
                  constraints:
                    nullable: false
              - column:
                  name: input_schemas
                  type: ${text.type}
                  remarks: JSON array of input schema names
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: unprovisioned
                  remarks: Provisioning state
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this row was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this row was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:02
      author: eric
      comment: FK workspace.creator_id -> core_user.id (set null on delete so deleting a user doesn't cascade)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace
            baseColumnNames: creator_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_workspace_creator_id
            onDelete: SET NULL

  - changeSet:
      id: v62.2026-04-22T12:00:03
      author: eric
      comment: Unique constraint on workspace_database (workspace_id, database_id)
      changes:
        - addUniqueConstraint:
            tableName: workspace_database
            constraintName: idx_unique_workspace_database
            columnNames: workspace_id, database_id

  - changeSet:
      id: v62.2026-04-22T12:00:04
      author: eric
      comment: FK workspace_database.workspace_id -> workspace.id (cascade on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_database
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_database_workspace_id
            deleteCascade: true

  - changeSet:
      id: v62.2026-04-22T12:00:05
      author: eric
      comment: FK workspace_database.database_id -> metabase_database.id (restrict on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_database
            baseColumnNames: database_id
            referencedTableName: metabase_database
            referencedColumnNames: id
            constraintName: fk_workspace_database_database_id
            onDelete: RESTRICT

  - changeSet:
      id: v62.2026-04-22T12:00:06
      author: eric
      comment: Index workspace_database.workspace_id for hydration lookups
      changes:
        - createIndex:
            tableName: workspace_database
            indexName: idx_workspace_database_workspace_id
            columns:
              - column:
                  name: workspace_id

  - changeSet:
      id: v62.2026-04-22T12:00:07
      author: eric
      comment: Create workspace_access_key table
      changes:
        - createTable:
            tableName: workspace_access_key
            remarks: Per-workspace access key used for unauthenticated config download
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: The workspace this key belongs to
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(254)
                  remarks: Human-readable name for the key
                  constraints:
                    nullable: false
              - column:
                  name: key
                  type: text
                  remarks: Encrypted access key value
                  constraints:
                    nullable: false
              - column:
                  name: creator_id
                  type: int
                  remarks: User who created this key
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this key was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this key was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:08
      author: eric
      comment: FK workspace_access_key.workspace_id -> workspace.id (cascade on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_access_key
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_access_key_workspace_id
            deleteCascade: true

  - changeSet:
      id: v62.2026-04-22T12:00:09
      author: eric
      comment: FK workspace_access_key.creator_id -> core_user.id (set null on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_access_key
            baseColumnNames: creator_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_workspace_access_key_creator_id
            onDelete: SET NULL

  - changeSet:
      id: v62.2026-04-22T12:00:10
      author: eric
      comment: Index workspace_access_key.workspace_id for hydration lookups
      changes:
        - createIndex:
            tableName: workspace_access_key
            indexName: idx_workspace_access_key_workspace_id
            columns:
              - column:
                  name: workspace_id

  - changeSet:
      id: v62.2026-04-22T12:00:11
      author: eric
      comment: Create workspace_access_key_log table for tracking access-key usage
      changes:
        - createTable:
            tableName: workspace_access_key_log
            remarks: Audit trail of workspace access-key usage from public endpoints
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: Workspace the key belonged to; null after workspace deletion
                  constraints:
                    nullable: true
              - column:
                  name: workspace_access_key_id
                  type: int
                  remarks: Access key used; null after the key has been deleted
                  constraints:
                    nullable: true
              - column:
                  name: context
                  type: varchar(254)
                  remarks: Operation tag for the call site, e.g. "config"
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: ${timestamp_type}
                  remarks: When the access key was used
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.2026-04-22T12:00:12
      author: eric
      comment: FK workspace_access_key_log.workspace_id -> workspace.id (set null on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_access_key_log
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_access_key_log_workspace_id
            onDelete: SET NULL

  - changeSet:
      id: v62.2026-04-22T12:00:13
      author: eric
      comment: FK workspace_access_key_log.workspace_access_key_id -> workspace_access_key.id (set null on delete)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_access_key_log
            baseColumnNames: workspace_access_key_id
            referencedTableName: workspace_access_key
            referencedColumnNames: id
            constraintName: fk_workspace_access_key_log_workspace_access_key_id
            onDelete: SET NULL

  - changeSet:
      id: v62.2026-04-22T12:00:14
      author: eric
      comment: Index workspace_access_key_log.workspace_access_key_id for per-key lookups
      changes:
        - createIndex:
            tableName: workspace_access_key_log
            indexName: idx_workspace_access_key_log_access_key_id
            columns:
              - column:
                  name: workspace_access_key_id
