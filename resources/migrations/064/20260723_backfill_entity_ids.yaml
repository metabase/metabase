## Backfill NULL entity_id values with random identifiers so the column can be treated as always
## present: the insert hook now generates one in every case (including deserialization), and the
## export/import-time app-level backfills are gone. The generated values are 21 hex characters (a
## subset of the NanoID alphabet) salted per row, so they satisfy the entity_id uniques.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-23T12:00:00
      author: ranquild
      comment: Backfill NULL entity_id values (postgres)
      changes:
        - sql:
            dbms: postgresql
            sql: |
              UPDATE action SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE collection SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE core_user SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE dashboard_tab SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE dimension SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE document SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE embedding_theme SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE measure SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE metabot SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE metabot_prompt SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE metric SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE native_query_snippet SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE permissions_group SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE pulse SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE pulse_card SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE pulse_channel SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE python_library SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE report_card SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE report_dashboard SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
              UPDATE report_dashboardcard SET entity_id = substr(md5(random()::text || id::text), 1, 21) WHERE entity_id IS NULL;
