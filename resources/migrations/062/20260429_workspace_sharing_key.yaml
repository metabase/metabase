## Nullable UUID sharing key for unauthenticated workspace config/metadata access

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml
  - changeSet:
      id: v62.2026-04-29T12:00:00
      author: dan
      comment: Add nullable sharing_key UUID column to workspace table
      changes:
        - addColumn:
            tableName: workspace
            columns:
              - column:
                  name: sharing_key
                  type: varchar(36)
                  remarks: Nullable UUID used for unauthenticated access to workspace config and metadata. Set to enable sharing, null to disable.
                  constraints:
                    nullable: true

  - changeSet:
      id: v62.2026-04-29T12:00:01
      author: dan
      comment: Unique index on workspace.sharing_key (only non-null values)
      changes:
        - createIndex:
            tableName: workspace
            indexName: idx_workspace_sharing_key
            unique: true
            columns:
              - column:
                  name: sharing_key
