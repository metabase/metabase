name: Driver result gate
description: >-
  The per-driver required status check. Decides a driver workflow's overall
  pass/fail from its decide + test job results and the conductor status
  (skip/info/required). See .github/scripts/conductor/README.md.

inputs:
  decide-result:
    description: Result of the workflow's `decide` job (success|failure|cancelled|skipped).
    required: true
  test-results:
    description: >-
      Space-separated results of the workflow's test job(s), e.g.
      "${{ needs.test.result }}" or "${{ needs.test.result }} ${{ needs.test-oss.result }}".
    required: true
  conductor-status:
    description: The conductor status the workflow ran under (skip|info|required).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: "1.3.7"
        token: ${{ github.token }}
    - name: Gate on driver test result
      shell: bash
      env:
        DECIDE_RESULT: ${{ inputs.decide-result }}
        TEST_RESULTS: ${{ inputs.test-results }}
        CONDUCTOR_STATUS: ${{ inputs.conductor-status }}
      run: bun "$GITHUB_WORKSPACE/.github/scripts/conductor/gate-result.ts"
