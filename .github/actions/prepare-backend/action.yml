name: Prepare back-end environment
description: |
  Prepare the backend. Installs jdk, Clojure, and fetches the cache for m2.
inputs:
  java-version:
    required: true
    default: "21"
  clojure-version:
    required: true
    default: "1.12.0.1488"

runs:
  using: "composite"
  steps:
    - name: Prepare JDK ${{ inputs.java-version }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ inputs.java-version }}
        distribution: "temurin"
    - name: Install Clojure CLI
      shell: bash
      run: |
        for attempt in 1 2 3; do
          curl --retry 3 --retry-delay 5 --fail -O https://download.clojure.org/install/linux-install-${{ inputs.clojure-version }}.sh \
            && sudo bash ./linux-install-${{ inputs.clojure-version }}.sh \
            && break
          echo "::warning::Clojure install attempt $attempt failed, retrying in 10s..."
          sleep 10
        done
        if ! clojure --version; then
          echo "::error::Clojure CLI installation failed after 3 attempts"
          exit 1
        fi

    - name: Get M2 cache key
      uses: ./.github/actions/get-cache-keys
      id: get-cache-keys

    - name: Install uv (for Python package installation)
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: false
        version: "0.10.2" # keep in sync with mise.toml
        github-token: ${{ github.token }}

    - name: Restore M2 cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/.m2
          ~/.gitlibs
        key: ${{ steps.get-cache-keys.outputs.m2-cache-key }}
        restore-keys: |
          ${{ steps.get-cache-keys.outputs.m2-restore-key }}

    # Workaround: the athena-jdbc artifact on s3.amazonaws.com/metabase-maven-downloads
    # is missing a POM, so tools.deps falls through to the opensaml repo, which returns
    # 403 (not 404) and breaks classpath resolution. Install a stub POM + JAR into the
    # local m2 cache so aether resolves from there. Remove once bin/athena.bb has been
    # re-run to publish a POM alongside the JAR on S3.
    - name: Prime athena-jdbc local m2 (missing-POM workaround)
      shell: bash
      env:
        ATHENA_JDBC_VERSION: "3.7.0"
      run: |
        DIR="$HOME/.m2/repository/com/metabase/athena-jdbc/$ATHENA_JDBC_VERSION"
        if [ -f "$DIR/athena-jdbc-$ATHENA_JDBC_VERSION.pom" ] && [ -f "$DIR/athena-jdbc-$ATHENA_JDBC_VERSION.jar" ]; then
          echo "athena-jdbc $ATHENA_JDBC_VERSION already present in local m2, skipping"
          exit 0
        fi
        mkdir -p "$DIR"
        curl --retry 3 --retry-delay 5 --fail -L -o "$DIR/athena-jdbc-$ATHENA_JDBC_VERSION.jar" \
          "https://s3.amazonaws.com/metabase-maven-downloads/com/metabase/athena-jdbc/$ATHENA_JDBC_VERSION/athena-jdbc-$ATHENA_JDBC_VERSION.jar"
        cat > "$DIR/athena-jdbc-$ATHENA_JDBC_VERSION.pom" <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <project xmlns="http://maven.apache.org/POM/4.0.0">
          <modelVersion>4.0.0</modelVersion>
          <groupId>com.metabase</groupId>
          <artifactId>athena-jdbc</artifactId>
          <version>$ATHENA_JDBC_VERSION</version>
          <packaging>jar</packaging>
        </project>
        EOF
        cat > "$DIR/_remote.repositories" <<EOF
        #NOTE: This is a Maven Resolver internal implementation file, its format can be changed without prior notice.
        athena-jdbc-$ATHENA_JDBC_VERSION.jar>=
        athena-jdbc-$ATHENA_JDBC_VERSION.pom>=
        EOF
