      id: v63.864345s
      author: nvoxland
      comment: Backfill exploration_thread.ai_summary_document_id from each thread's 'AI Summary' document
      changes:
        - sql:
            sql: >-
              UPDATE exploration_thread
              SET ai_summary_document_id = (
                SELECT d.id
                FROM document d
                WHERE d.exploration_thread_id = exploration_thread.id
                  AND d.name = 'AI Summary'
                  AND d.archived = FALSE
                ORDER BY d.id ASC
                LIMIT 1
