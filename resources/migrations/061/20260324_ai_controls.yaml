## AI controls

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml
  - changeSet:
      id: v61.gasgewas
      author: nvoxland
      comment: Create metabot_permissions table for AI feature permissions per group
      changes:
        - createTable:
            tableName: metabot_permissions
            remarks: A table to store AI/metabot permissions per permissions group
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: The ID of the permission
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: The ID of the associated permissions group
                  constraints:
                    nullable: false
                    referencedTableName: permissions_group
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_permissions_ref_permissions_group
                    deleteCascade: true
              - column:
                  name: perm_type
                  type: varchar(254)
                  remarks: The type of permission
                  constraints:
                    nullable: false
              - column:
                  name: perm_value
                  type: varchar(254)
                  remarks: The value of the permission
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.rr32dasd
      author: nvoxland
      comment: Add index on metabot_permissions.group_id
      changes:
        - createIndex:
            tableName: metabot_permissions
            indexName: idx_metabot_permissions_group_id
            columns:
              - column:
                  name: group_id

  - changeSet:
      id: v61.g24da211
      author: nvoxland
      comment: Add unique constraint on metabot_permissions group_id and perm_type
      changes:
        - addUniqueConstraint:
            tableName: metabot_permissions
            columnNames: group_id, perm_type
            constraintName: unique_metabot_permissions_group_id_perm_type

  - changeSet:
      id: v61.esa342
      author: nvoxland
      comment: Create metabot_custom_prompt table for instance, group, and user-level prompts
      changes:
        - createTable:
            tableName: metabot_custom_prompt
            remarks: A table to store AI/metabot custom prompts at instance, group, or user level
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: The ID of the prompt
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: The ID of the associated permissions group (mutually exclusive with user_id)
                  constraints:
                    nullable: true
                    referencedTableName: permissions_group
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_custom_prompt_ref_permissions_group
                    deleteCascade: true
              - column:
                  name: user_id
                  type: int
                  remarks: The ID of the associated user (mutually exclusive with group_id)
                  constraints:
                    nullable: true
                    referencedTableName: core_user
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_custom_prompt_ref_core_user
                    deleteCascade: true
              - column:
                  name: prompt
                  type: ${text.type}
                  remarks: The prompt text
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.5523dw
      author: nvoxland
      comment: Add index on metabot_custom_prompt.group_id
      changes:
        - createIndex:
            tableName: metabot_custom_prompt
            indexName: idx_metabot_custom_prompt_group_id
            columns:
              - column:
                  name: group_id

  - changeSet:
      id: v61.8t8seas
      author: nvoxland
      comment: Add index on metabot_custom_prompt.user_id
      changes:
        - createIndex:
            tableName: metabot_custom_prompt
            indexName: idx_metabot_custom_prompt_user_id
            columns:
              - column:
                  name: user_id

