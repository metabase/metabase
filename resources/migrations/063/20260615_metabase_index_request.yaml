## Index/clustering hints declared on a transform target table, reapplied on each full transform run.
## Each request binds to a transform; table_id is backfilled once the target first syncs.

databaseChangeLog:
  - changeSet:
      id: v63.ixrq01
      author: Ngoc Khuat
      comment: Create metabase_index_request table for transform target index/clustering hints
      changes:
        - createTable:
            tableName: metabase_index_request
            remarks: Index/clustering hints declared on a transform target, reapplied on each full transform run
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Auto-incrementing primary key
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: transform_id
                  type: int
                  remarks: FK to the transform that owns this index request
                  constraints:
                    nullable: false
              - column:
                  name: table_id
                  type: int
                  remarks: FK to metabase_table; backfilled after the target first syncs
                  constraints:
                    nullable: true
              - column:
                  name: index_name
                  type: varchar(255)
                  remarks: Physical index name, rendered verbatim into DDL
                  constraints:
                    nullable: false
              - column:
                  name: structured
                  type: ${text.type}
                  remarks: JSON structured index definition (kind, columns, ...)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(20)
                  defaultValue: pending
                  remarks: "Lifecycle status: pending, running, succeeded, failed, or dropped"
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: ${text.type}
                  remarks: Error from the last failed apply, if any
                  constraints:
                    nullable: true
              - column:
                  name: created_by
                  type: int
                  remarks: FK to core_user.id who created this request
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: Timestamp when this request was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: Timestamp when this request was last updated
                  constraints:
                    nullable: false
              - column:
                  name: last_executed_at
                  type: ${timestamp_type}
                  remarks: Timestamp of the last apply attempt
                  constraints:
                    nullable: true

  - changeSet:
      id: v63.ixrq02
      author: Ngoc Khuat
      comment: Add unique constraint on metabase_index_request (transform_id, index_name)
      changes:
        - addUniqueConstraint:
            tableName: metabase_index_request
            columnNames: transform_id, index_name
            constraintName: uq_index_request_transform_id_index_name

  - changeSet:
      id: v63.ixrq03
      author: Ngoc Khuat
      comment: Add FK on metabase_index_request.transform_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: transform_id
            referencedTableName: transform
            referencedColumnNames: id
            constraintName: fk_index_request_transform_id
            onDelete: CASCADE

  - changeSet:
      id: v63.ixrq04
      author: Ngoc Khuat
      comment: Add FK on metabase_index_request.table_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: table_id
            referencedTableName: metabase_table
            referencedColumnNames: id
            constraintName: fk_index_request_table_id
            onDelete: CASCADE

  - changeSet:
      id: v63.ixrq05
      author: Ngoc Khuat
      comment: Add FK on metabase_index_request.created_by
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: created_by
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_index_request_created_by
            onDelete: SET NULL
