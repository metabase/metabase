name: Driver Tests - Tier 1 (Fast)

on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}-tier1
  cancel-in-progress: true

jobs:
  # Tier 1: Fast drivers (5-15 minutes, no complex setup)
  be-tests-h2:
    if: ${{ !inputs.skip }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      CI: 'true'
    name: H2
    steps:
    - uses: actions/checkout@v4
    - name: Test H2 driver
      uses: ./.github/actions/test-driver
      with:
        junit-name: 'be-tests-h2'
        test-args: >-
          :only-tags [:mb/driver-tests]
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: ${{ github.job }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-sqlite:
    if: ${{ !inputs.skip }}
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    env:
      CI: 'true'
      DRIVERS: sqlite
    name: SQLite
    steps:
    - uses: actions/checkout@v4
    - name: Test SQLite driver
      uses: ./.github/actions/test-driver
      with:
        junit-name: 'be-tests-sqlite-ee'
        test-args: >-
          :only-tags [:mb/driver-tests]
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: ${{ github.job }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  postgres-latest:
    if: ${{ !inputs.skip }}
    uses: ./.github/workflows/driver-postgres.yml
    secrets: inherit
    with:
      version: latest

  mysql-latest:
    if: ${{ !inputs.skip }}
    uses: ./.github/workflows/driver-mysql.yml
    secrets: inherit
    with:
      variant: mysql-latest

  tier1-results:
    needs:
      - be-tests-h2
      - be-tests-sqlite
      - postgres-latest
      - mysql-latest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: tier1-results
    if: always() && !cancelled()
    steps:
      - name: Check tier 1 status
        uses: actions/github-script@v7
        env:
          needs: ${{ toJson(needs) }}
        with:
          script: | #js
            const needs = JSON.parse(process.env.needs);
            const jobs = Object.entries(needs).map(([jobName, jobValues]) => ({
              name: jobName,
              result: jobValues.result
            }));
            
            if (jobs.every(job => (job.result === 'skipped' || job.result === 'success'))) {
              console.log("✅ Tier 1 (Fast) drivers passed!");
              process.exit(0);
            } else {
              console.log("❌ Tier 1 (Fast) drivers failed:");
              jobs.forEach((job) => {
                if (job.result !== 'success') {
                  console.log(`${job.name} - ${job.result}`);
                }
              });
              process.exit(1);
            }