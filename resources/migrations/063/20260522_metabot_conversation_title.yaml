## Add title column to metabot_conversation for LLM-generated conversation titles.

databaseChangeLog:
  - changeSet:
      id: v63.2026-05-22T12:00:00
      author: sloan
      comment: Add title to metabot_conversation
      changes:
        - addColumn:
            tableName: metabot_conversation
            columns:
              - column:
                  name: title
                  type: varchar(255)
                  remarks: Short LLM-generated title for the conversation, set on the first turn.
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: metabot_conversation
            columnName: title
