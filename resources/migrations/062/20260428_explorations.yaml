## Initial exploration related tables

databaseChangeLog:
  - changeSet:
      id: v62.g43w3qr4
      author: nvoxland
      comment: Create exploration table
      changes:
        - createTable:
            tableName: exploration
            remarks: A user-created data investigation, e.g. "why is revenue down".
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Human-readable name for the exploration
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: ${text.type}
                  remarks: Optional longer description of what is being investigated
                  constraints:
                    nullable: true
              - column:
                  name: creator_id
                  type: int
                  remarks: User who created the exploration; owns it for permissions
                  constraints:
                    nullable: false
              - column:
                  name: collection_id
                  type: int
                  remarks: Collection this exploration is published to. NULL means unpublished, or — when is_published is true — the root collection.
                  constraints:
                    nullable: true
              - column:
                  name: is_published
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: When true, the exploration is shared via collection permissions. When false, only the creator (or admins) can read/write it.
                  constraints:
                    nullable: false
              - column:
                  name: archived
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: Whether the exploration has been archived
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the exploration was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the exploration was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.g442xf
      author: nvoxland
      comment: FK exploration.creator_id -> core_user.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration
            baseColumnNames: creator_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_exploration_creator_id
            onDelete: CASCADE

  - changeSet:
      id: v62.92fasdf
      author: nvoxland
      comment: Index on exploration.creator_id
      changes:
        - createIndex:
            tableName: exploration
            indexName: idx_exploration_creator_id
            columns:
              - column:
                  name: creator_id

  - changeSet:
      id: v62.expcollfk
      author: jdswanson
      comment: FK exploration.collection_id -> collection.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration
            baseColumnNames: collection_id
            referencedTableName: collection
            referencedColumnNames: id
            constraintName: fk_exploration_collection_id
            onDelete: SET NULL

  - changeSet:
      id: v62.expcollidx
      author: jdswanson
      comment: Index on exploration.collection_id
      changes:
        - createIndex:
            tableName: exploration
            indexName: idx_exploration_collection_id
            columns:
              - column:
                  name: collection_id

  - changeSet:
      id: v62.bnweradf
      author: nvoxland
      comment: Create exploration_thread table
      changes:
        - createTable:
            tableName: exploration_thread
            remarks: A hypothesis / iteration within an exploration.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_id
                  type: int
                  remarks: The exploration this thread belongs to
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Optional name for the thread / hypothesis
                  constraints:
                    nullable: true
              - column:
                  name: prompt
                  type: ${text.type}
                  remarks: Natural-language prompt the user typed for this thread
                  constraints:
                    nullable: true
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of threads within an exploration
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: ${timestamp_type}
                  remarks: Set when the user clicks "Start exploration"; null means draft
                  constraints:
                    nullable: true
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the thread was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the thread was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.gpores
      author: nvoxland
      comment: FK exploration_thread.exploration_id -> exploration.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread
            baseColumnNames: exploration_id
            referencedTableName: exploration
            referencedColumnNames: id
            constraintName: fk_exploration_thread_exploration_id
            onDelete: CASCADE

  - changeSet:
      id: v62.g89asrdg
      author: nvoxland
      comment: Index on exploration_thread.exploration_id
      changes:
        - createIndex:
            tableName: exploration_thread
            indexName: idx_exploration_thread_exploration_id
            columns:
              - column:
                  name: exploration_id

  - changeSet:
      id: v62.bjiofd
      author: nvoxland
      comment: Create exploration_thread_metric join table
      changes:
        - createTable:
            tableName: exploration_thread_metric
            remarks: Metrics (Cards of type=metric) selected on a thread.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this selection belongs to
                  constraints:
                    nullable: false
              - column:
                  name: card_id
                  type: int
                  remarks: The selected metric Card (report_card.id)
                  constraints:
                    nullable: false
              - column:
                  name: dimension_mappings
                  type: ${text.type}
                  remarks: JSON snapshot of the metric Card's dimension_mappings at selection time
                  constraints:
                    nullable: true
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of metric selections within a thread
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.98ubfd
      author: nvoxland
      comment: Unique constraint on exploration_thread_metric (thread, card)
      changes:
        - addUniqueConstraint:
            tableName: exploration_thread_metric
            columnNames: exploration_thread_id, card_id
            constraintName: uq_exploration_thread_metric_thread_card

  - changeSet:
      id: v62.ifddba
      author: nvoxland
      comment: FK exploration_thread_metric.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_metric
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_thread_metric_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v62.bjiare
      author: nvoxland
      comment: FK exploration_thread_metric.card_id -> report_card.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_metric
            baseColumnNames: card_id
            referencedTableName: report_card
            referencedColumnNames: id
            constraintName: fk_exploration_thread_metric_card_id
            onDelete: CASCADE

  - changeSet:
      id: v62.jibredf
      author: nvoxland
      comment: Create exploration_thread_dimension join table
      changes:
        - createTable:
            tableName: exploration_thread_dimension
            remarks: Dimensions selected on a thread. Dimension IDs are virtual strings (not Field FKs).
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this dimension belongs to
                  constraints:
                    nullable: false
              - column:
                  name: dimension_id
                  type: ${text.type}
                  remarks: Virtual dimension ID from the metric definition
                  constraints:
                    nullable: false
              - column:
                  name: display_name
                  type: ${text.type}
                  remarks: Snapshot display name for the dimension
                  constraints:
                    nullable: true
              - column:
                  name: effective_type
                  type: varchar(254)
                  remarks: Snapshot effective type for the dimension
                  constraints:
                    nullable: true
              - column:
                  name: semantic_type
                  type: varchar(254)
                  remarks: Snapshot semantic type for the dimension
                  constraints:
                    nullable: true
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of dimensions within a thread
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.4598gd
      author: nvoxland
      comment: FK exploration_thread_dimension.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_dimension
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_thread_dimension_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v62.nbwerg
      author: nvoxland
      comment: Index on exploration_thread_dimension.exploration_thread_id
      changes:
        - createIndex:
            tableName: exploration_thread_dimension
            indexName: idx_exploration_thread_dimension_thread_id
            columns:
              - column:
                  name: exploration_thread_id

  - changeSet:
      id: v62.bhresdfg
      author: nvoxland
      comment: Create exploration_thread_timeline join table
      changes:
        - createTable:
            tableName: exploration_thread_timeline
            remarks: Timelines associated with a thread.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this timeline belongs to
                  constraints:
                    nullable: false
              - column:
                  name: timeline_id
                  type: int
                  remarks: The associated timeline
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of timelines within a thread
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the selection was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.89yrbea
      author: nvoxland
      comment: Unique constraint on exploration_thread_timeline (thread, timeline)
      changes:
        - addUniqueConstraint:
            tableName: exploration_thread_timeline
            columnNames: exploration_thread_id, timeline_id
            constraintName: uq_exploration_thread_timeline_thread_timeline

  - changeSet:
      id: v62.b89rae
      author: nvoxland
      comment: FK exploration_thread_timeline.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_timeline
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_thread_timeline_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v62.hvdawe
      author: nvoxland
      comment: FK exploration_thread_timeline.timeline_id -> timeline.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_thread_timeline
            baseColumnNames: timeline_id
            referencedTableName: timeline
            referencedColumnNames: id
            constraintName: fk_exploration_thread_timeline_timeline_id
            onDelete: CASCADE

  - changeSet:
      id: v62.iowdfzx
      author: nvoxland
      comment: Create exploration_query table
      changes:
        - createTable:
            tableName: exploration_query
            remarks: A chart definition produced when "Start exploration" is run on a thread.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: The thread this query belongs to
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: ${text.type}
                  remarks: Optional display name for the chart
                  constraints:
                    nullable: true
              - column:
                  name: card_id
                  type: int
                  remarks: The metric Card this chart is for
                  constraints:
                    nullable: false
              - column:
                  name: segment_id
                  type: int
                  remarks: Optional segment applied as a filter on top of (card, dimension); null for the unsegmented base query
                  constraints:
                    nullable: true
              - column:
                  name: dimension_id
                  type: ${text.type}
                  remarks: Virtual dimension ID used as the breakout for this chart
                  constraints:
                    nullable: false
              - column:
                  name: display
                  type: varchar(64)
                  remarks: Chart display type (line, bar, etc.)
                  constraints:
                    nullable: true
              - column:
                  name: visualization_settings
                  type: ${text.type}
                  remarks: JSON visualization settings for this chart
                  constraints:
                    nullable: true
              - column:
                  name: dataset_query
                  type: ${text.type}
                  remarks: Snapshot MBQL produced at "Start" time
                  constraints:
                    nullable: false
              - column:
                  name: position
                  type: int
                  defaultValueNumeric: 0
                  remarks: Ordering of queries within a thread
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: varchar(32)
                  defaultValue: pending
                  remarks: Worker state machine; one of pending, running, done, error
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: ${text.type}
                  remarks: Error message captured when the worker fails to execute the query
                  constraints:
                    nullable: true
              - column:
                  name: started_at
                  type: ${timestamp_type}
                  remarks: When the worker started executing this query
                  constraints:
                    nullable: true
              - column:
                  name: finished_at
                  type: ${timestamp_type}
                  remarks: When the worker finished executing this query (success or error)
                  constraints:
                    nullable: true
              - column:
                  name: user_interestingness
                  type: int
                  remarks: Owner's interestingness rating; null = unrated, 0 = not interesting, 1 = hmm, 2 = interesting
                  constraints:
                    nullable: true
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: NanoID for serdes
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the query was created
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the query was last updated
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.bwbaxcz
      author: nvoxland
      comment: FK exploration_query.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_exploration_query_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v62.28easd
      author: nvoxland
      comment: FK exploration_query.card_id -> report_card.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: card_id
            referencedTableName: report_card
            referencedColumnNames: id
            constraintName: fk_exploration_query_card_id
            onDelete: CASCADE

  - changeSet:
      id: v62.qsegfk
      author: johnswanson
      comment: FK exploration_query.segment_id -> segment.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query
            baseColumnNames: segment_id
            referencedTableName: segment
            referencedColumnNames: id
            constraintName: fk_exploration_query_segment_id
            onDelete: CASCADE

  - changeSet:
      id: v62.badwes
      author: nvoxland
      comment: Index on exploration_query.exploration_thread_id
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_thread_id
            columns:
              - column:
                  name: exploration_thread_id

  - changeSet:
      id: v62.qstatusidx
      author: nvoxland
      comment: Index on exploration_query.status for the worker poll
      changes:
        - createIndex:
            tableName: exploration_query
            indexName: idx_exploration_query_status
            columns:
              - column:
                  name: status

  - changeSet:
      id: v62.qrescreate
      author: nvoxland
      comment: Create exploration_query_result table
      changes:
        - createTable:
            tableName: exploration_query_result
            remarks: Serialized query results produced by the exploration worker, keyed 1:1 to exploration_query.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_query_id
                  type: int
                  remarks: The exploration_query this result belongs to
                  constraints:
                    nullable: false
              - column:
                  name: result_data
                  type: ${blob.type}
                  remarks: gzipped+nippy serialized query result bytes
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the result was written
                  constraints:
                    nullable: false
              - column:
                  name: interestingness_score
                  type: double
                  remarks: Chart interestingness score in [0.0, 1.0]; null when the result can't be meaningfully scored (e.g. empty rows, no numeric measure).
                  constraints:
                    nullable: true
              - column:
                  name: contextual_interestingness_score
                  type: double
                  remarks: LLM-backed relevance score in [0.0, 1.0] for the chart vs. the thread prompt; null when the LLM is unconfigured, the prompt is blank, or the call failed.
                  constraints:
                    nullable: true

  - changeSet:
      id: v62.qresuq
      author: nvoxland
      comment: Unique constraint on exploration_query_result.exploration_query_id (1:1)
      changes:
        - addUniqueConstraint:
            tableName: exploration_query_result
            columnNames: exploration_query_id
            constraintName: uq_exploration_query_result_query_id

  - changeSet:
      id: v62.qresfk
      author: nvoxland
      comment: FK exploration_query_result.exploration_query_id -> exploration_query.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: exploration_query_result
            baseColumnNames: exploration_query_id
            referencedTableName: exploration_query
            referencedColumnNames: id
            constraintName: fk_exploration_query_result_query_id
            onDelete: CASCADE

  - changeSet:
      id: v62.643243
      author: nvoxland
      comment: Backfill dimension_interestingness=0 for hard-zero semantic types
      changes:
        - update:
            tableName: metabase_field
            columns:
              - column:
                  name: dimension_interestingness
                  valueNumeric: 0
            where: >-
              semantic_type IN (
                'type/PK',
                'type/Collection',
                'type/Dictionary',
                'type/Array',
                'type/Structured',
                'type/SerializedJSON',
                'type/JSON',
                'type/XML',
                'type/UpdatedTemporal',
                'type/UpdatedTimestamp',
                'type/UpdatedDate',
                'type/UpdatedTime',
                'type/DeletionTemporal',
                'type/DeletionTimestamp',
                'type/DeletionDate',
                'type/DeletionTime'
              )
              AND (dimension_interestingness IS NULL OR dimension_interestingness <> 0)
      rollback:

  - changeSet:
      id: v62.gjdases
      author: nvoxland
      comment: Force re-analyze for any Field still missing a dimension_interestingness score.
      changes:
        - update:
            tableName: metabase_field
            columns:
              - column:
                  name: last_analyzed
                  value: null
            where: dimension_interestingness IS NULL
      rollback:

  - changeSet:
      id: v62.62346w
      author: nvoxland
      comment: Add nullable exploration_thread_id column to document table
      changes:
        - addColumn:
            tableName: document
            columns:
              - column:
                  name: exploration_thread_id
                  type: int
                  remarks: Optional owning exploration thread
                  constraints:
                    nullable: true

  - changeSet:
      id: v62.g43sdfg
      author: nvoxland
      comment: FK document.exploration_thread_id -> exploration_thread.id
      changes:
        - addForeignKeyConstraint:
            baseTableName: document
            baseColumnNames: exploration_thread_id
            referencedTableName: exploration_thread
            referencedColumnNames: id
            constraintName: fk_document_exploration_thread_id
            onDelete: CASCADE

  - changeSet:
      id: v62.64fsvsd
      author: nvoxland
      comment: Index on document.exploration_thread_id
      changes:
        - createIndex:
            tableName: document
            indexName: idx_document_exploration_thread_id
            columns:
              - column:
                  name: exploration_thread_id

  - changeSet:
      id: v62.7gjeaasdg
      author: nvoxland
      comment: Backfill an empty Findings document for each existing exploration_thread that doesn't already have one
      changes:
        - sql:
            sql: >-
              INSERT INTO document (name, document, content_type, creator_id, exploration_thread_id)
              SELECT 'Findings', '{"type":"doc","content":[]}', 'application/json+vnd.prose-mirror', e.creator_id, t.id
              FROM exploration_thread t
              JOIN exploration e ON e.id = t.exploration_id
              WHERE NOT EXISTS (SELECT 1 FROM document d WHERE d.exploration_thread_id = t.id)
      rollback:

  - changeSet:
      id: v62.qtinterest
      author: jdswanson
      comment: Create exploration_query_timeline_interestingness scoring table
      changes:
        - createTable:
            tableName: exploration_query_timeline_interestingness
            remarks: LLM-backed relevance score for a thread-selected timeline against a specific exploration query's chart.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: Primary key
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: exploration_query_id
                  type: int
                  remarks: The exploration_query whose chart this score is about
                  constraints:
                    nullable: false
              - column:
                  name: timeline_id
                  type: int
                  remarks: The timeline being scored against the chart
                  constraints:
                    nullable: false
              - column:
                  name: interestingness_score
                  type: double
                  remarks: LLM relevance score in [0.0, 1.0]; null when the LLM is unconfigured, returned a malformed response, or the call failed.
                  constraints:
                    nullable: true
              - column:
                  name: scored_at
                  type: ${timestamp_type}
                  remarks: Timestamp the scoring attempt completed; null while the row is reserved by a worker but not yet finished. Acts as the in-flight claim marker.
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: When the row was inserted (i.e. when the worker reserved the pair)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: Last update timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v62.qtinterestuq
      author: jdswanson
      comment: Unique constraint on exploration_query_timeline_interestingness (query, timeline)
      changes:
        - addUniqueConstraint:
            tableName: exploration_query_timeline_interestingness
            columnNames: exploration_query_id, timeline_id
