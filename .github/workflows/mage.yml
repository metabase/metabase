name: Mage Tests

on:
  pull_request:

jobs:
  # run mage tests even if the rest of be isnt needed
  mage-tests:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    name: Mage
    steps:
      - uses: actions/checkout@v6
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - name: Check mage runs
        run: ./bin/mage -h
      - name: Run mage tests
        run: ./bin/mage -test
