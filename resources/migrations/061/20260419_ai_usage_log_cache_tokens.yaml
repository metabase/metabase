## Track Anthropic prompt-caching token counts on ai_usage_log

databaseChangeLog:
  - changeSet:
      id: v61.2026-04-19T00:00:01
      author: tsplude
      comment: Add cache_creation_tokens to ai_usage_log for Anthropic prompt caching
      changes:
        - addColumn:
            tableName: ai_usage_log
            columns:
              - column:
                  name: cache_creation_tokens
                  type: int
                  remarks: Number of input tokens written to the provider prompt cache (Anthropic cache_creation_input_tokens).
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-04-19T00:00:02
      author: tsplude
      comment: Add cache_read_tokens to ai_usage_log for Anthropic prompt caching
      changes:
        - addColumn:
            tableName: ai_usage_log
            columns:
              - column:
                  name: cache_read_tokens
                  type: int
                  remarks: Number of input tokens served from the provider prompt cache (Anthropic cache_read_input_tokens).
                  constraints:
                    nullable: true

  - changeSet:
      id: v61.2026-04-19T00:00:03
      author: tsplude
      runOnChange: true
      comment: Update v_ai_usage_log to v3 - expose cache_creation_tokens, cache_read_tokens
      changes:
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/ai_usage_log/v3/postgres-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/ai_usage_log/v3/mysql-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/ai_usage_log/v3/h2-ai_usage_log.sql
            relativeToChangelogFile: true
      rollback:
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/ai_usage_log/v2/postgres-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/ai_usage_log/v2/mysql-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/ai_usage_log/v2/h2-ai_usage_log.sql
            relativeToChangelogFile: true
