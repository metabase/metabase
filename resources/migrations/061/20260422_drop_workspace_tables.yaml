## Drop all workspace tables and the workspace_permissions_status column on metabase_database.
## The workspaces feature was removed; these tables and the column are no longer used.
## Tables are dropped children-first to respect foreign-key dependencies.

databaseChangeLog:

  - changeSet:
      id: v61.2026-04-22T00:00:00
      author: ranquild
      comment: Drop workspace_merge_transform table
      preConditions:
        - onFail: MARK_RAN
        - tableExists:
            tableName: workspace_merge_transform
      changes:
        - dropTable:
            tableName: workspace_merge_transform
            cascadeConstraints: true
      rollback: # workspaces feature removed; no rollback

