# Step 2 of the SDK release process: merging a version-bump PR (opened by
# sdk-version-bump-pr.yml, labeled `sdk-release-trigger`) publishes the version
# and dist-tag committed in package.template.json's `sdkRelease` block.
#
# workflow_dispatch publishes the same way, from the branch chosen in the ref
# picker, without a PR. It reads the same committed sdkRelease block and never
# bumps the version - so it is not how you cut a release. Use it only to publish
# a version that is already committed, when the bump PR cannot do it.
#
# To retry a failed run, re-run the failed jobs on that run rather than
# dispatching a fresh one: if publish-npm already succeeded, a fresh run would
# stop at check-git-tag on the existing tag.
name: Release Metabase Embedding SDK for React
run-name: Release SDK from ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}

on:
  workflow_dispatch:
    inputs:
      read_first:
        description: |
          ⚠️ To cut a release, use the "SDK Version Bump PR" workflow instead — it bumps the version and opens a PR; merging that PR publishes.
          This publishes the version already committed in package.template.json. It never bumps. Pick the branch in "Use workflow from" above.
          Use it only when neither the bump PR nor re-running the failed jobs will do.
        type: choice
        required: false
        options:
          - Publish the committed version from the branch picked in "Use workflow from" above
  # Step 2 of the new release process: merging a version-bump PR (opened by
  # sdk-version-bump-pr.yml, labeled `sdk-release-trigger`) triggers a release
  # of whatever branch that PR targeted. See `prepare-release` below.
  #
  # The `paths` filter keeps this from creating a run for every PR closed
  # anywhere in the repo - version-bump PRs always touch package.template.json,
  # so this is a reliable pre-filter ahead of the label/merge check below.
  pull_request:
    types: [closed]
    paths:
      - enterprise/frontend/src/embedding-sdk-package/package.template.json

concurrency:
  # The expression below tries three cases, in order (comments can't go inside
  # it - a `#` there would be literal text):
  #
  #   1. a manual dispatch          -> sdk-release-<branch picked in the ref picker>
  #   2. a merged bump PR           -> sdk-release-<branch that PR targeted>
  #   3. any other closed PR        -> sdk-release-noop-<run id>
  #
  # (Concurrency groups are repo-wide, so the names are prefixed rather than
  # bare - same reason embedding-sdk-tag-latest.yml uses `npm-dist-tag-latest`.)
  #
  # 1 and 2 land in the same group for a given branch, so two releases of that
  # branch queue instead of racing (both would npm publish and push the same
  # git tag).
  #
  # 3 exists because concurrency is evaluated before any job's `if:` runs, so a
  # closed PR that this workflow ignores (unmerged, or merged without the label)
  # still enters a group even though `prepare-release` skips everything. Giving
  # it a throwaway group keeps it out of the release group entirely.
  #
  # cancel-in-progress is false: a release must never be interrupted mid-publish.
  # A second release queues behind the first, and if it turns out to be stale it
  # fails loudly at check-git-tag rather than half-publishing.
  group: >-
    ${{
      github.event_name == 'workflow_dispatch'
        && format('sdk-release-{0}', github.ref_name)
      || github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'sdk-release-trigger')
        && format('sdk-release-{0}', github.event.pull_request.base.ref)
      || format('sdk-release-noop-{0}', github.run_id)
    }}
  cancel-in-progress: false

jobs:
  # Gates the whole workflow: either a manual workflow_dispatch, or a merged
  # PR carrying the sdk-release-trigger label. Every other job depends
  # (directly or transitively) on this one, so if it's skipped the rest of
  # the run is skipped too - no separate `if:` needed on downstream jobs.
  prepare-release:
    name: Prepare release trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'sdk-release-trigger'))
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      # base.ref is only set on a pull_request event; on a dispatch it is empty,
      # so this falls through to the branch picked in the ref picker.
      - name: Resolve target branch
        id: resolve
        run: echo "branch=${{ github.event.pull_request.base.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

  workflow-summary:
    name: Log inputs
    needs: prepare-release
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - name: Generate workflow summary
        env:
          BRANCH: ${{ needs.prepare-release.outputs.branch }}
        run: |
          tee -a "$GITHUB_STEP_SUMMARY" << EOF
          **Inputs:**

          - \`branch\`: $BRANCH
          - \`trigger\`: ${{ github.event_name }}

          triggered by: @${{ github.event.sender.login }}
          EOF

  # Builds release/dist/index.cjs once, for every Slack job to download. It hangs
  # off prepare-release only - not off the metadata read or anything downstream -
  # so the artifact exists even when the release fails at its very first step,
  # which is exactly when send-slack-notification-failure needs it.
  build-release-scripts:
    name: Build release scripts
    needs: prepare-release
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            release
            .github

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Upload release scripts
        uses: actions/upload-artifact@v7
        with:
          name: build-scripts
          path: release/dist/index.cjs

  send-slack-notification-start:
    name: "Send Slack notification: SDK release started"
    needs: [build-release-scripts, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      slackMessageId: ${{ steps.send-slack-message-start.outputs.result }}
    steps:
      - name: Retrieve release scripts
        uses: actions/download-artifact@v8
        with:
          name: build-scripts
          path: release/dist/

      - name: Send build start message
        id: send-slack-message-start
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          result-encoding: string
          script: | # js
            const { mentionUserByGithubLogin, sendSlackMessage, githubRunLink } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";

            const title = `:rocket: *SDK release: ${sdkVersion}* :rocket:`
            const runLink = githubRunLink(
              `:building_construction: _CI Run_ :building_construction:`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );
            const body = `${runLink} - run by ${mentionUserByGithubLogin("${{ github.event.sender.login }}")}`
            const sendSlackMessageResponse = await sendSlackMessage({
              channelName: 'team-embedding-releases',
              message: `${title}\n${body}`,
            });

            return sendSlackMessageResponse.message.ts

  # Technically this should be placed last, since it runs after other jobs, but I want to co-locate all Slack jobs
  send-slack-notification-failure:
    name: "Send Slack notification: SDK release failed"
    needs:
      [
        "build-release-scripts",
        "read-sdk-release-metadata",
        "send-slack-notification-start",
        "check-git-tag",
        "test",
        "build-sdk",
        "publish-npm",
        "tag-latest",
        "git-tag",
      ]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      slackMessageId: ${{ needs.send-slack-notification-start.outputs.slackMessageId }}
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      - name: Retrieve release scripts
        uses: actions/download-artifact@v8
        with:
          name: build-scripts
          path: release/dist/

      - name: Send build failure message
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const { githubRunLink, sendSlackReply, sendSlackMessage } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";
            const messageId = "${{ env.slackMessageId }}";

            const runLink = githubRunLink(
              `:x: ${sdkVersion} Release has failed`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );

            if (messageId) {
              sendSlackReply({
                channelName: 'team-embedding-releases',
                message: runLink,
                messageId,
                broadcast: true,
              });
            } else {
              sendSlackMessage({
                channelName: 'team-embedding-releases',
                message: runLink,
              });
            }

  send-slack-notification-successful:
    name: "Send Slack notification: SDK release successful"
    needs:
      [
        "build-release-scripts",
        "read-sdk-release-metadata",
        "send-slack-notification-start",
        "publish-npm",
      ]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      slackMessageId: ${{ needs.send-slack-notification-start.outputs.slackMessageId }}
    steps:
      - name: Retrieve release scripts
        uses: actions/download-artifact@v8
        with:
          name: build-scripts
          path: release/dist/

      - name: Send build successful message
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const { githubRunLink, sendSlackReply } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";

            const runLink = githubRunLink(
              `:partydeploy: ${sdkVersion} Release is complete :partydeploy:`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );
            sendSlackReply({
              channelName: 'team-embedding-releases',
              message: runLink,
              messageId: "${{ env.slackMessageId }}",
              broadcast: true
            });

  # Reads the version + release metadata straight from package.template.json
  # instead of computing them (the version and sdkRelease.distTag/tagAsLatest
  # are already correct on this branch, because sdk-version-bump-pr.yml wrote
  # them there and a human reviewed them before merging).
  read-sdk-release-metadata:
    name: Read SDK release metadata
    needs: prepare-release
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      sdk_version: ${{ steps.metadata.outputs.sdk_version }}
      major_version: ${{ steps.metadata.outputs.major_version }}
      dist_tag: ${{ steps.metadata.outputs.dist_tag }}
      tag_as_latest: ${{ steps.metadata.outputs.tag_as_latest }}
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Read version and sdkRelease metadata
        id: metadata
        run: |
          FILE=enterprise/frontend/src/embedding-sdk-package/package.template.json
          VERSION=$(jq -r '.version' "$FILE")
          DIST_TAG=$(jq -r '.sdkRelease.distTag // empty' "$FILE")
          TAG_AS_LATEST=$(jq -r '.sdkRelease.tagAsLatest // false' "$FILE")
          MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f2)

          if [ -z "$DIST_TAG" ]; then
            echo "::error::$FILE is missing sdkRelease.distTag - this branch predates the sdkRelease metadata block (EMB-1518) and needs it added (via sdk-version-bump-pr.yml or manually) before it can be released."
            exit 1
          fi

          {
            echo "sdk_version=$VERSION"
            echo "major_version=$MAJOR_VERSION"
            echo "dist_tag=$DIST_TAG"
            echo "tag_as_latest=$TAG_AS_LATEST"
          } >> "$GITHUB_OUTPUT"

      - name: Append workflow summary
        run: |
          tee -a "$GITHUB_STEP_SUMMARY" << EOF
          **SDK release metadata (from package.template.json):**

          - \`version\`: "${{ steps.metadata.outputs.sdk_version }}"
          - \`major_version\`: "${{ steps.metadata.outputs.major_version }}"
          - \`distTag\`: "${{ steps.metadata.outputs.dist_tag }}"
          - \`tagAsLatest\`: "${{ steps.metadata.outputs.tag_as_latest }}"
          EOF

  check-git-tag:
    needs: [prepare-release, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    env:
      tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: check tags
        run: |
          if git tag -l | grep -q "${tag}$"
          then
            echo "::error::Tag '${{ env.tag }}' already exists. If you expect to run this workflow with the same tag, please remove the tag first and rerun this workflow."
            exit 1
          else
            exit 0
          fi

  test:
    needs: [prepare-release, check-git-tag]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Run unit tests
        run: bun run embedding-sdk:test-unit

  build-sdk:
    needs: [prepare-release, test]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      # No version bump here anymore: package.template.json's version is
      # already correct on this branch (bumped by sdk-version-bump-pr.yml
      # before merge), so we build with it as-is.
      - name: Build SDK package
        run: bun run build-embedding-sdk-package

      - name: Generate SDK package.json in the build directory
        run: bun run embedding-sdk:generate-package

      - name: Upload built SDK package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: metabase-sdk
          path: ./resources/embedding-sdk

  publish-npm:
    needs: [prepare-release, build-sdk, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    permissions:
      id-token: write # OIDC handshake for npm trusted publishing
      actions: read # actions/download-artifact reads the Actions API via GITHUB_TOKEN
    steps:
      - name: Retrieve build SDK package artifact
        uses: actions/download-artifact@v8
        with:
          name: metabase-sdk
          path: sdk

      # Trusted publishing requires npm >= 11.5.1 and Node >= 22.14.0.
      # Node 22.x line bundles npm 10.x, so pin Node 24.x which ships npm 11.x.
      - name: Setup Node.js for npm publish with trusted publishing
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to NPM
        working-directory: sdk
        run: |
          TAG="${{ needs.read-sdk-release-metadata.outputs.dist_tag }}"
          echo "Resolved npm tag: $TAG"
          npm publish --tag "$TAG"

  tag-latest:
    name: Tag npm release as latest
    # Driven by package.template.json's sdkRelease.tagAsLatest instead of a
    # hardcoded `if: false` that had to be hand-edited (uncommented) once a
    # branch went gold - see sdk-version-bump-pr.yml, which is where a human
    # sets this to true when appropriate.
    if: ${{ needs.read-sdk-release-metadata.outputs.tag_as_latest == 'true' }}
    needs: [publish-npm, read-sdk-release-metadata]
    uses: ./.github/workflows/embedding-sdk-tag-latest.yml
    with:
      version: ${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
    secrets: inherit

  git-tag:
    needs: [prepare-release, publish-npm, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    env:
      tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
      stable_tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.major_version }}-stable
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Setup git user
        run: |
          git config --global user.email "github-automation@metabase.com"
          git config --global user.name "Metabase Automation"

      - name: Create and push SDK version tag
        run: |
          git tag -a ${{ env.tag }} -m "Tagging SDK version ${{ env.tag }}"
          git push origin ${{ env.tag }}

      - name: Create and push SDK stable version tag
        if: ${{ startsWith(needs.prepare-release.outputs.branch, 'release-x.') }}
        run: |
          git tag -a -f ${{ env.stable_tag }} -m "Tagging SDK stable version ${{ env.stable_tag }}"
          git push origin -f ${{ env.stable_tag }}
