name: MongoDB Driver Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
        description: 'MongoDB version (latest or 6.0)'

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ inputs.version == 'latest' && 65 || 60 }}
    env:
      CI: 'true'
      DRIVERS: mongo
      MB_MONGO_TEST_USER: metabase
      MB_MONGO_TEST_PASSWORD: metasample123
    services:
      mongodb:
        image: ${{ inputs.version == 'latest' && 'mongo:latest' || 'metabase/qa-databases:mongo-sample-6' }}
        ports:
          - "27017:27017"
        env:
          MONGO_INITDB_ROOT_USERNAME: metabase
          MONGO_INITDB_ROOT_PASSWORD: metasample123
    name: MongoDB ${{ inputs.version == 'latest' && 'Latest' || '6.0' }}
    steps:
    - uses: actions/checkout@v4
    - name: Test MongoDB ${{ inputs.version }}
      uses: ./.github/actions/test-driver
      with:
        junit-name: ${{ inputs.version == 'latest' && 'be-tests-mongo-latest-ee' || 'be-tests-mongo-6-0-ee' }}
        test-args: ':exclude-tags [:mongo-sharded-cluster-tests] :only-tags [:mb/driver-tests]'
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: mongo-${{ inputs.version }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}