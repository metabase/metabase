# MySQL workspace - cardinality upgrade case.
#
# MySQL emits bare table identifiers natively (qualified-name-components is
# []), so the source side has only :schema (used as the input filter on the
# warehouse "database" - MySQL synonym for schema). The output side replaces
# it with the workspace database name. Same wire shape as Postgres - the
# slot named :schema carries what MySQL calls a "database" because that's
# the AST position the qualifier lands at.
version: 1
config:
  databases:
  - name: test-data (mysql)
    engine: mysql
    details:
      host: localhost
      port: 3306
      db: prod_db
      user: mb__isolation_44490_1933
      password: not-a-real-password
  users:
  - first_name: Workspace
    last_name: Admin
    email: workspace@workspace.local
    password: password1
  workspace:
    name: New workspace
    databases:
      test-data (mysql):
        input_schemas:
        - prod_db
        output:
          db: ws_alice
