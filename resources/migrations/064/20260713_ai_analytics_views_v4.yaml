## Update v_ai_usage_log to v4 — add CASE branches for the new explorations LLM usage
## sources (contextual_interestingness, exploration), so they display friendly names
## instead of raw machine identifiers in AI usage analytics.
##
## v_metabot_conversations also has a v4 (same explorations CASE branches, plus master's
## include-deleted semantics from #77542), but its installing changeset lives in
## migrations/064/20260713_metabot_analytics_views_include_deleted.yaml — master created it
## in parallel, and both changesets are runOnChange against the same v4 SQL files, so a
## second installer here would be redundant.
##
## Keep the CASE branches in sync with the known-sources / known-profile-ids allow-lists in
## enterprise/backend/src/metabase_enterprise/metabot/usage.clj.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-13T00:00:02
      author: johnswanson
      runOnChange: true
      comment: Update v_ai_usage_log to v4 - add explorations usage sources to source_name CASE
      changes:
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/ai_usage_log/v4/postgres-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/ai_usage_log/v4/mysql-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/ai_usage_log/v4/h2-ai_usage_log.sql
            relativeToChangelogFile: true
      rollback:
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/ai_usage_log/v3/postgres-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/ai_usage_log/v3/mysql-ai_usage_log.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/ai_usage_log/v3/h2-ai_usage_log.sql
            relativeToChangelogFile: true
