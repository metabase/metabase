name: Build Uberjar

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  files-changed:
    if: ${{ !contains(github.event.pull_request.labels.*.name,'ci skip') }}
    name: Check which files changed
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      e2e_all: ${{ steps.changes.outputs.e2e_all }}
      backend_all: ${{ steps.changes.outputs.backend_all }}
    steps:
      - uses: actions/checkout@v4
      - name: Test which files changed
        uses: dorny/paths-filter@v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-paths.yaml

  check-build-needed:
    needs: files-changed
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    outputs:
      build_needed: ${{ steps.check.outputs.build_needed }}
    steps:
      - name: Check if build is needed
        id: check
        run: |
          if [[ "${{ needs.files-changed.outputs.e2e_all }}" == "true" || "${{ needs.files-changed.outputs.backend_all }}" == "true" ]]; then
            echo "build_needed=true" >> $GITHUB_OUTPUT
          else
            echo "build_needed=false" >> $GITHUB_OUTPUT
          fi

  get-build-requirements:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      java_version: ${{ steps.dependencies.outputs.java_version }}
      node_version: ${{ steps.dependencies.outputs.node_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Get build dependencies
        id: dependencies
        uses: actions/github-script@v7
        with:
          script: | # js
            let javaVersion = 21;  // default
            let nodeVersion = 22;  // default

            // Check if this is a release branch
            if (context.ref.includes('release-')) {
              try {
                const fs = require('fs');
                const path = require('path');

                // Check if release tools exist
                const releasePath = path.join(process.env.GITHUB_WORKSPACE, 'release');
                if (fs.existsSync(releasePath)) {
                  // Prepare build scripts
                  const { execSync } = require('child_process');
                  execSync('yarn && yarn build', { cwd: releasePath });

                  // Get requirements from release branch
                  const { getBuildRequirements, getVersionFromReleaseBranch } = require(path.join(releasePath, 'dist/index.cjs'));
                  const version = getVersionFromReleaseBranch(context.ref);
                  const requirements = getBuildRequirements(version);

                  javaVersion = requirements.java;
                  nodeVersion = requirements.node;
                  console.log(`Release branch detected: Using Java ${javaVersion}, Node ${nodeVersion}`);
                }
              } catch (error) {
                console.log(`Could not get release requirements: ${error.message}`);
                console.log(`Using defaults: Java ${javaVersion}, Node ${nodeVersion}`);
              }
            } else {
              console.log(`Non-release branch: Using defaults Java ${javaVersion}, Node ${nodeVersion}`);
            }

            core.setOutput('java_version', javaVersion);
            core.setOutput('node_version', nodeVersion);

  build:
    needs: [check-build-needed, get-build-requirements]
    if: ${{ !cancelled() && needs.check-build-needed.outputs.build_needed == 'true' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    strategy:
      matrix:
        edition: [oss, ee]
    env:
      MB_EDITION: ${{ matrix.edition }}
      INTERACTIVE: false
      # make sure that builds on release branches get licenses, because we use them for releases
      SKIP_LICENSES: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
        with:
          node-version: "${{ needs.get-build-requirements.outputs.node_version }}"
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
        with:
          m2-cache-key: uberjar
          java-version: "${{ needs.get-build-requirements.outputs.java_version }}"

      - name: Build uberjar with ./bin/build.sh
        timeout-minutes: 10
        run: ./bin/build.sh
        shell: bash

      - name: Prepare uberjar artifact
        uses: ./.github/actions/prepare-uberjar-artifact
        with:
          name: metabase-${{ matrix.edition }}-${{ github.event.pull_request.head.sha || github.sha }}-uberjar

      - name: Upload Static Viz Bundle Artifact
        if: ${{ matrix.edition == 'ee' }}  # Only upload once, from EE build
        uses: actions/upload-artifact@v4
        with:
          name: static-viz-bundle-${{ github.event.pull_request.head.sha || github.sha }}
          path: resources/frontend_client/app/dist

  pr-env:
    needs: [build]
    if: |
      !cancelled() &&
      contains(github.event.pull_request.labels.*.name, 'PR-Env') &&
      needs.build.result == 'success'
    uses: ./.github/workflows/pr-env.yml
    secrets: inherit

