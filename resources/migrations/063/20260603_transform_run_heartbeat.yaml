## Add heartbeat tracking to transform_run for dead-process orphan detection

databaseChangeLog:

  - changeSet:
      id: v63.2026-06-03T00:00:00
      author: bronsa
      comment: Add last_heartbeat column to transform_run for heartbeat-based orphan detection
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: transform_run
                columnName: last_heartbeat
      changes:
        - addColumn:
            tableName: transform_run
            columns:
              - column:
                  name: last_heartbeat
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  remarks: Heartbeat timestamp stamped periodically while the run executes; a stale value means the owning process died
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: transform_run
            columnName: last_heartbeat

  - changeSet:
      id: v63.2026-06-03T00:00:01
      author: bronsa
      comment: Add process_uuid column to transform_run identifying the instance that owns the run
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: transform_run
                columnName: process_uuid
      changes:
        - addColumn:
            tableName: transform_run
            columns:
              - column:
                  name: process_uuid
                  type: varchar(36)
                  defaultValue: "unknown"
                  remarks: UUID of the Metabase instance that created this run
                  constraints:
                    nullable: false
      rollback:
        - dropColumn:
            tableName: transform_run
            columnName: process_uuid
