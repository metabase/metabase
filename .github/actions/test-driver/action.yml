name: Test database driver
description: Test database driver
inputs:
  junit-name:
    required: true
    default: "driver"
  test-args:
    required: false
  build-static-viz:
    required: true
    default: false
  logs-artifact-suffix:
    required: false
    description: Suffix to append to the test logs artifact name to avoid conflicts in matrix jobs
  edition:
    required: false
    default: 'ee'
    description: Edition to test (oss or ee)

outputs:
  test-outcome:
    description: "The outcome of the test run (success, failure, cancelled, skipped)"
    value: ${{ steps.run-test.outcome }}

runs:
  using: "composite"
  steps:
    - name: Prepare back-end environment
      uses: ./.github/actions/prepare-backend
    - name: Resolve current job id
      # Resolve JOB_ID early (before the long test step) so the ci-conductor
      # reporter below can link failures to this exact job. Best-effort.
      uses: ./.github/actions/resolve-job-id
    - name: Prepare front-end environment
      if: ${{ inputs.build-static-viz == 'true' }}
      uses: ./.github/actions/prepare-frontend
    - name: Build static viz frontend
      if: ${{ inputs.build-static-viz == 'true' }}
      run: bun run build-static-viz
      shell: bash
      env:
        MB_EDITION: ee
    - name: Test database driver
      run: clojure -X:dev:ci:${{ inputs.edition }}:${{ inputs.edition }}-dev:drivers:drivers-dev:test ${{ inputs.test-args }}
      shell: bash
      id: run-test
      # Trunk Quarantine controls the final state of the run in the CI!
      # Even if this step fails we let it pass, and then `trunk-io/analytics-uploader` determines
      # whether to fail or to pass the whole job, based on the quarantine list.
      continue-on-error: true
    - name: Install bun (for ci-conductor reporting)
      # Only when we're about to report — keeps clean runs fast. The driver jobs
      # are JDK-only, so bun isn't otherwise present.
      if: ${{ always() && steps.run-test.outcome != 'success' }}
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: "1.3.14"
        token: ${{ github.token }}
    - name: Report failed tests to ci-conductor
      # A visibility step: parse the raw JUnit hawk just wrote and POST failures to
      # ci-conductor. Positioned right after the test run (before the report/upload
      # steps) so it reads pristine results and its log is easy to find. Gated like
      # the report below (run on anything that isn't a clean pass), and
      # continue-on-error so it can never change the job outcome — Trunk Quarantine
      # remains the sole arbiter. CI_CONDUCTOR_BASE_URL / _WEBHOOK_SECRET and the
      # resolved JOB_ID arrive via the workflow/job env. The reporter is
      # zero-runtime-dep (bun built-ins only), so it just runs the TS directly —
      # no `bun install`. See DEV-2224 / DEV-2235.
      if: ${{ always() && steps.run-test.outcome != 'success' }}
      shell: bash
      continue-on-error: true
      env:
        REPO_ID: ${{ github.event.repository.id }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.ref_name }}
        # junit-name is the per-job test-identity label the repo already uses for
        # JUnit/Trunk reporting (e.g. be-tests-postgres-ee, semantic-search-tests-h2-…),
        # so ci-conductor buckets line up with it. Only workflows that also set
        # CI_CONDUCTOR_BASE_URL actually POST; others no-op.
        CI_CONDUCTOR_TEST_SUITE: ${{ inputs.junit-name }}
      run: bun release/ci-conductor/src/report-junit.ts
    - name: Publish Test Report (JUnit)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      # As per the documentation: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#steps-context
      # test.outcome gives us access to the result before `continue-on-error` overrides it and sets it to 'success'.
      # We want test reports even if the test step gets cancelled (e.g. times out), hence we match anything that is not a 'success'.
      if: ${{ steps.run-test.outcome != 'success' }}
      with:
        path: "target/junit/**/*_test.xml"
        name: JUnit Test Report ${{ inputs.junit-name }}
        reporter: java-junit
        list-suites: failed
        list-tests: failed
        fail-on-error: false
    - name: Upload Logs on Failure
      if: always() && steps.run-test.outcome != 'success'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ format('test-logs-{0}{1}', github.job, inputs.logs-artifact-suffix && format('-{0}', inputs.logs-artifact-suffix) || '') }}
        path: logs/test-log.json
        retention-days: 1
      # Failing to upload the artifact should never affect the outcome of the whole test run.
      continue-on-error: true
