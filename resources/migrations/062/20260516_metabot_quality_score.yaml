## BOT-1515: persist a conversation quality composite.
##
## Adds quality_score (double in (-1, 0]) and quality_breakdown (JSON) to
## metabot_conversation so newly finalized assistant turns can write a
## composite verdict for the whole conversation.
##
## Both columns nullable so the migration is safe on a live DB.

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml

  - changeSet:
      id: v62.2026-05-16T00:00:00
      author: tylerplude
      comment: Add metabot_conversation.quality_score
      changes:
        - addColumn:
            tableName: metabot_conversation
            columns:
              - column:
                  name: quality_score
                  type: double
                  remarks: >
                    Conversation quality composite in (-1, 0]. NULL = not
                    computed (or out of scope, e.g. old-format conversation).
                    0.0 means scored, no signal fired.
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: metabot_conversation
            columnName: quality_score

  - changeSet:
      id: v62.2026-05-16T00:00:01
      author: tylerplude
      comment: Add metabot_conversation.quality_breakdown JSON column
      changes:
        - addColumn:
            tableName: metabot_conversation
            columns:
              - column:
                  name: quality_breakdown
                  type: ${text.type}
                  remarks: >
                    JSON-encoded breakdown of the composite — composite_version,
                    raw, concern, per-signal magnitudes, per-signal
                    contributions, and a small context block.
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: metabot_conversation
            columnName: quality_breakdown
