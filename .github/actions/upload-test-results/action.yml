name: Upload Test Results to s3
description: Uploads test results files to s3

inputs:
  input-path:
    required: true
  output-name:
    required: true
    default: test
  role-to-assume:
    required: true
  aws-region:
    required: true
    default: us-east-1
  bucket:
    required: true
  trunk-api-token:
    required: true
  variant:
    required: false
    default: ""
  previous-step-outcome:
    required: true
  driver-status:
    required: false
    default: ""
    description: >-
      Configured status for this driver ("info", "skip", "required", or empty). When
      "info", the job is reported as passing regardless of the real test outcome, and
      that outcome is surfaced via a job summary and (on PRs) a comment instead.
  report-variant:
    required: false
    default: ""
    description: >-
      Optional label disambiguating matrix legs of the same job, so the info-driver
      job summary and PR comment stay distinct per leg.

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
    - name: zip test results
      env:
        INPUT_DIR: ${{ inputs.input-path }}
        OUTPUT_FILE: ${{ inputs.output-name }}
      shell: bash
      run: | # sh
        zip ${OUTPUT_FILE}.zip $INPUT_DIR/*.xml
    - name: Upload test results to S3
      env:
        BUCKET: ${{ inputs.bucket }}
        OUTPUT_FILE: ${{ inputs.output-name }}
      shell: bash
      run: | # sh
        DATE=$(date '+%Y-%m-%d')
        aws s3 cp ${OUTPUT_FILE}.zip s3://$BUCKET/$DATE/$GITHUB_RUN_ID/$GITHUB_RUN_ATTEMPT/

    - name: Upload results to Trunk
      # Important!
      # 1. This step must always run because it controls job's exit code.
      # 2. There's no point in running this outside the organization
      # 3. For "info" drivers our own status takes precedence: we let this step pass so
      #    the job is reported as passing regardless of the real outcome (still uploaded).
      if: always() && github.repository_owner == 'metabase'
      continue-on-error: ${{ inputs.driver-status == 'info' }}
      uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
      env:
        TRUNK_REPO_URL: git@github.com:metabase/metabase.git
      with:
        junit-paths: ${{ inputs.input-path }}
        variant: ${{ inputs.variant || inputs.output-name }}
        org-slug: metabase
        dry-run: ${{ (github.event_name == 'pull_request' && github.event.pull_request.draft == true) || github.repository != 'metabase/metabase' }} # quarantine, but do not upload results
        token: ${{ inputs.trunk-api-token }}
        use-cache: true
        previous-step-outcome: ${{ inputs.previous-step-outcome }}

    # For "info" drivers the job is forced green above, so surface the real outcome here —
    # but only when it did NOT pass, to avoid spamming summaries/comments for healthy runs.
    # Never include logs or stack traces — only the real status and a link to the run.
    - name: Report info-level driver result (job summary)
      if: ${{ always() && inputs.driver-status == 'info' && inputs.previous-step-outcome != 'success' }}
      shell: bash
      env:
        OUTCOME: ${{ inputs.previous-step-outcome }}
        LABEL: ${{ inputs.output-name }}
        VARIANT: ${{ inputs.report-variant }}
      run: | # sh
        if [ "$OUTCOME" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
        TITLE="$LABEL"
        [ -n "$VARIANT" ] && TITLE="$LABEL ($VARIANT)"
        RUN_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
        {
          echo "### ℹ️ Info-level driver: $TITLE"
          echo ""
          echo "Reported as passing (non-blocking). Real result: $EMOJI \`$OUTCOME\`"
          echo ""
          echo "[View run]($RUN_URL)"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Report info-level driver result (PR comment)
      if: ${{ always() && inputs.driver-status == 'info' && inputs.previous-step-outcome != 'success' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v9
      continue-on-error: true
      env:
        OUTCOME: ${{ inputs.previous-step-outcome }}
        LABEL: ${{ inputs.output-name }}
        VARIANT: ${{ inputs.report-variant }}
      with:
        script: | # js
          const { OUTCOME, LABEL, VARIANT, GITHUB_SERVER_URL, GITHUB_REPOSITORY, GITHUB_RUN_ID } = process.env;
          const pr = context.payload.pull_request;
          if (!pr) return;
          const title = VARIANT ? `${LABEL} (${VARIANT})` : LABEL;
          const marker = `<!-- info-driver-result:${LABEL}:${VARIANT} -->`;
          const emoji = OUTCOME === "success" ? "✅" : "❌";
          const runUrl = `${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}`;
          const body = `${marker}\nℹ️ Info-level driver **${title}** ran non-blocking — real result: ${emoji} \`${OUTCOME}\`. [Logs](${runUrl})`;
          const { owner, repo } = context.repo;
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr.number, per_page: 100 });
          const existing = comments.find((c) => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
          }

    # If an info driver now passes, remove any stale failure comment from an earlier run so
    # the PR doesn't keep showing an out-of-date failure. (No new comment is posted on pass.)
    - name: Clear info-level driver PR comment (on pass)
      if: ${{ always() && inputs.driver-status == 'info' && inputs.previous-step-outcome == 'success' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v9
      continue-on-error: true
      env:
        LABEL: ${{ inputs.output-name }}
        VARIANT: ${{ inputs.report-variant }}
      with:
        script: | # js
          const { LABEL, VARIANT } = process.env;
          const pr = context.payload.pull_request;
          if (!pr) return;
          const marker = `<!-- info-driver-result:${LABEL}:${VARIANT} -->`;
          const { owner, repo } = context.repo;
          const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: pr.number, per_page: 100 });
          const existing = comments.find((c) => c.body.includes(marker));
          if (existing) {
            await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
          }
