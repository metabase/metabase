agent: claude

files:
  symlink:
    - node_modules

post_create:
  - ./bin/mage -bot-setup --bot {{BOT_NAME}} --app-db {{APP_DB}}

pre_remove:
  - ./bin/mage -bot-dev-env --down

panes:
  - command: <agent>
    focus: true

  - command: mise x -- clj -M:dev:dev-start:drivers:drivers-dev:ee:ee-dev 2>&1 | tee .{{BOT_NAME}}/backend-$(date +%Y%m%d-%H%M%S).log
    split: horizontal
    percentage: 30

  - command: mise x -- bun run build-hot 2>&1 | tee .{{BOT_NAME}}/frontend-$(date +%Y%m%d-%H%M%S).log
    split: vertical

  - command: mise x -- ./bin/mage -fixbot-status .{{BOT_NAME}}/llm-status.txt
    split: vertical
    size: 7
