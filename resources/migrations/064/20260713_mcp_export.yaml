## `mcp_export` holds the file a `run_saved_question` export generated, so the download link the tool hands
## back serves the rows the agent reported rather than re-running the query when the link is clicked. A row is
## keyed by (user, uuid), carries its own expiry, and is swept by
## `metabase.agent-api.task.cleanup-expired-exports`.

databaseChangeLog:
  - logicalFilePath: migrations/064_update_migrations.yaml

  - changeSet:
      id: v64.2026-07-13T00:00:00
      author: aleksandr
      comment: Add mcp_export, the generated export files that agent download links serve
      changes:
        - createTable:
            tableName: mcp_export
            remarks: Files generated by the MCP `run_saved_question` export, served by TTL'd download link
            columns:
              - column:
                  name: id
                  type: varchar(36)
                  remarks: The download link's UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: int
                  remarks: Owner of the export; the download resolves for this user and no other
                  constraints:
                    nullable: false
              - column:
                  name: card_id
                  type: int
                  remarks: The card the export was generated from
                  constraints:
                    nullable: false
              - column:
                  name: filename
                  type: varchar(254)
                  remarks: The name the file downloads under
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: varchar(254)
                  remarks: MIME type the download is served with
                  constraints:
                    nullable: false
              - column:
                  name: row_count
                  type: int
                  remarks: Rows in the file, which is the count the tool reported
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: ${large_blob.type}
                  remarks: Raw bytes of the generated file
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When the export was generated
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: ${timestamp_type}
                  remarks: When the download link stops resolving; the cleanup task deletes the row after
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: mcp_export

  - changeSet:
      id: v64.2026-07-13T00:00:01
      author: aleksandr
      comment: FK from mcp_export.user_id to core_user, cascade on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: mcp_export
            baseColumnNames: user_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_mcp_export_ref_core_user
            onDelete: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: mcp_export
            constraintName: fk_mcp_export_ref_core_user

  - changeSet:
      id: v64.2026-07-13T00:00:02
      author: aleksandr
      comment: FK from mcp_export.card_id to report_card, cascade on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: mcp_export
            baseColumnNames: card_id
            referencedTableName: report_card
            referencedColumnNames: id
            constraintName: fk_mcp_export_ref_report_card
            onDelete: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: mcp_export
            constraintName: fk_mcp_export_ref_report_card

  - changeSet:
      id: v64.2026-07-13T00:00:03
      author: aleksandr
      comment: Index mcp_export.expires_at so the cleanup task can find expired rows
      changes:
        - createIndex:
            tableName: mcp_export
            indexName: idx_mcp_export_expires_at
            columns:
              - column:
                  name: expires_at
      rollback:
        - dropIndex:
            tableName: mcp_export
            indexName: idx_mcp_export_expires_at
