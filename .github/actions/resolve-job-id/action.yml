name: Resolve current job id
description: >
  Resolve this job's numeric GitHub job id and export it as JOB_ID (and
  JOB_HTML_URL) to $GITHUB_ENV, so any later step can read it without making
  its own API call. Best-effort: warns and proceeds on failure so it can never
  break the run.

inputs:
  job-display-name:
    description: >
      The leaf displayName of the calling job, used to find this job among all
      jobs in the run (e.g. "e2e-tests-<name>-<edition>"). Must match the job's
      `name:` exactly.
    required: true

runs:
  using: composite
  steps:
    - name: Resolve JOB_ID
      shell: bash
      env:
        JOB_DISPLAY_NAME: ${{ inputs.job-display-name }}
      run: |
        # GitHub doesn't expose the current job's numeric id. The Actions web
        # backend's job_groups_batch endpoint returns *every* job in the run in
        # a single response, so we match our own leaf job by its (unique)
        # displayName and read its numeric id. Why this over the REST jobs API:
        #   - One request, no pagination — the REST endpoint caps at 100 jobs
        #     per page and a full run has ~185, so the old single-page lookup
        #     silently missed shards past page 1 (DEV-2117).
        #   - Not counted against the REST rate-limit budget that ~70 e2e shards
        #     would otherwise hammer; needs no auth on a public repo.
        #   - displayName is unique per shard (the chunk index is baked into the
        #     matrix name), so we don't need runner_name — which only populates
        #     after runner pickup; the job is in this response from dispatch.
        set +e
        url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/job_groups_batch?attempt=$GITHUB_RUN_ATTEMPT&batch=0&size=400"
        # Flatten every group's jobs (groups are nested for reusable workflows),
        # pick the one whose displayName is ours, emit "<id> <href>".
        jq_filter='[.. | .jobs? // empty | .[] | select(.displayName == env.JOB_DISPLAY_NAME)] | .[0] | select(. != null) | "\(.id) \(.href)"'

        out=""
        for attempt in 1 2 3 4 5; do
          resp=$(curl -sf -H "Accept: application/json" "$url" 2>/dev/null)
          if [ -n "$resp" ]; then
            out=$(jq -r "$jq_filter" <<<"$resp" 2>/dev/null)
          fi
          if [ -n "$out" ] && [ "$out" != "null" ]; then
            break
          fi
          out=""
          echo "Attempt $attempt: job '$JOB_DISPLAY_NAME' not yet visible; retrying..."
          sleep 3
        done

        if [ -n "$out" ]; then
          read -r job_id job_path <<<"$out"
          echo "JOB_ID=$job_id" >> "$GITHUB_ENV"
          echo "JOB_HTML_URL=$GITHUB_SERVER_URL$job_path" >> "$GITHUB_ENV"
          echo "Resolved JOB_ID=$job_id ($JOB_DISPLAY_NAME)"
        else
          echo "::warning::Could not resolve job id for '$JOB_DISPLAY_NAME' after 5 attempts"
        fi
        exit 0
