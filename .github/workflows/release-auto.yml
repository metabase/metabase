name: Trigger Release End-to-End
run-name: Auto ${{ inputs.kind }} release for v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Major Metabase version (e.g. 45, 52, 68)"
        type: number
        required: true
      kind:
        description: "Release kind"
        type: choice
        required: true
        options:
          - patch
          - minor
      override_sha:
        description: DANGEROUSLY allow releasing from this commit sha, regardless of the state of CI (can be empty)
        type: string
        required: false
        default: ""

# This workflow only runs on dispatch. Given a major version and a kind, it
# infers the next patch or minor to cut and kicks off that release. Cron
# scheduling lives in the schedule-* trigger workflows, which decide what to
# release and when.
jobs:
  prepare:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      version: ${{ steps.compute.outputs.version }}
      commit: ${{ steps.compute.outputs.commit }}
      should_release: ${{ steps.compute.outputs.should_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            release
            .github
      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts
      - name: Compute next version and green commit
        id: compute
        uses: actions/github-script@v9
        env:
          SLACK_RELEASE_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const {
              compareCommits,
              getLastReleaseCommit,
              getLatestGreenCommit,
              getNextVersion,
              sendAutoReleaseFailureMessage,
            } = require('${{ github.workspace }}/release/dist/index.cjs');

            const majorVersion = Number('${{ inputs.version }}');
            const kind = '${{ inputs.kind }}';

            if (Number.isNaN(majorVersion)) {
              throw new Error(`Invalid version number: ${{ inputs.version }}`);
            }
            if (kind !== 'patch' && kind !== 'minor') {
              throw new Error(`Invalid kind: ${kind}`);
            }

            const overrideSha = String('${{ inputs.override_sha }}').trim();
            const isValidOverride = overrideSha.length === 40;

            if (!isValidOverride && overrideSha.length > 0) {
              throw new Error(`Invalid override SHA provided: ${overrideSha}`);
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const nextVersion = await getNextVersion({
              github, owner, repo, majorVersion, kind,
            });

            // The commit the most recent release for this major points to. Every
            // new release must be strictly ahead of it (see the freshness gate
            // below), regardless of how the candidate commit is chosen.
            const lastReleaseCommit = await getLastReleaseCommit({
              github, owner, repo, majorVersion,
            });

            // The override SHA bypasses the CI-green requirement only. getLatestGreenCommit
            // is itself bounded to commits newer than the last release, so it never
            // returns a stale candidate.
            const releaseCommit = (isValidOverride ? overrideSha : null) || await getLatestGreenCommit({
              github, owner, repo,
              branch: `release-x.${majorVersion}.x`,
              sinceCommit: lastReleaseCommit,
            });

            // Freshness gate — path-independent. Applies equally to the green commit
            // and the dangerous override: we must never tag a higher version number
            // on a commit that isn't strictly newer than the last release. Anything
            // but "ahead" (identical / behind / diverged) means the candidate is not
            // new work on top of what shipped, so we skip. A deliberate release from
            // a non-ahead commit must go through tag-for-release.yml directly.
            const ancestry = (releaseCommit && lastReleaseCommit)
              ? await compareCommits({ github, owner, repo, base: lastReleaseCommit, head: releaseCommit })
              : 'no-previous-release';
            const isAhead = !lastReleaseCommit || ancestry === 'ahead';

            console.log({ kind, majorVersion, nextVersion, lastReleaseCommit, releaseCommit, ancestry, isAhead });

            if (nextVersion && releaseCommit && isAhead) {
              core.setOutput('version', nextVersion);
              core.setOutput('commit', releaseCommit);
              core.setOutput('should_release', 'true');
              return;
            }

            const reason = !nextVersion
              ? 'no-next-version'
              : !releaseCommit
                ? 'no-green-commit'
                : 'commit-not-ahead';

            console.error(`Auto-${kind} skipped for v${majorVersion}: ${reason} (ancestry: ${ancestry})`);

            await sendAutoReleaseFailureMessage({
              channelName: '${{ vars.SLACK_RELEASE_CHANNEL }}',
              kind,
              majorVersion,
              reason,
              runId: '${{ github.run_id }}',
              owner: context.repo.owner,
              repo: context.repo.repo,
            }).catch(console.error);

            core.setOutput('should_release', 'false');
      - name: Write job summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Auto-${{ inputs.kind }} release for v${{ inputs.version }}"
            echo ""
            if [[ "${{ steps.compute.outputs.should_release }}" == "true" ]]; then
              echo "**Releasing:** \`${{ steps.compute.outputs.version }}\`"
              echo ""
              echo "**Commit:** [\`${{ steps.compute.outputs.commit }}\`](https://github.com/${{ github.repository }}/commit/${{ steps.compute.outputs.commit }})"
            else
              echo "_Skipped — see logs for the reason._"
            fi
            echo ""
            echo "**Triggered by:** @${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"

  trigger-release:
    name: Release ${{ needs.prepare.outputs.version }}
    needs: prepare
    if: ${{ needs.prepare.outputs.should_release == 'true' }}
    permissions:
      id-token: write
      contents: write
      checks: write
      issues: write
      actions: read
    uses: ./.github/workflows/tag-for-release.yml
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
      commit: ${{ needs.prepare.outputs.commit }}
