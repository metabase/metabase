name: Serialization

on:
  push:
    branches:
      - 'master'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  files-changed:
    name: Check which files changed
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 3
    outputs:
      serialization_baseline: ${{ steps.changes.outputs.serialization_baseline }}
    steps:
      - uses: actions/checkout@v4
      - name: Test which files changed
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          filters: .github/file-paths.yaml

  validate-serialization-baseline:
    needs: files-changed
    if: needs.files-changed.outputs.serialization_baseline == 'true'
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Validate serialization baseline schema
        run: bunx @metabase/representations validate-schema --folder test_resources/serialization_baseline
