# Test changelog for metabase.app-db.liquibase-test/dev-consecutive-migration-runs-are-separate-deployments-test.
# `versionless-dev-run1.yaml` plus a second migration the developer added; the shared logicalFilePath keeps
# changeset identity stable across the two files.
databaseChangeLog:
  - logicalFilePath: migrations/2026/versionless_dev.yaml
  - changeSet:
      id: dev_run_a
      author: test
      comment: first dev migration run (scenario test)
      changes:
        - createTable:
            tableName: dev_run_a_table
            columns:
              - column:
                  name: id
                  type: int
  - changeSet:
      id: dev_run_b
      author: test
      comment: second dev migration run (scenario test)
      changes:
        - createTable:
            tableName: dev_run_b_table
            columns:
              - column:
                  name: id
                  type: int
