## Index manager: records of CREATE INDEX statements queued/executed against
## transform-managed tables. One row per index Metabase owns on a given table.

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml
  - changeSet:
      id: v62.2026-05-14T00:00:00
      author: bronsa
      comment: Create metabase_index_request table
      changes:
        - createTable:
            tableName: metabase_index_request
            remarks: One row per Metabase-managed index. The validated CREATE INDEX statement is the source of truth; structured form is stored alongside for round-trip editing.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: table_id
                  type: int
                  remarks: FK to metabase_table — the table this index lives on
                  constraints:
                    nullable: false
              - column:
                  name: transform_id
                  type: int
                  remarks: FK to transform — denormalised from metabase_table.transform_id at creation; lets transform-rerun replay find rows even if metabase_table.transform_id is later cleared
                  constraints:
                    nullable: true
              - column:
                  name: index_name
                  type: varchar(255)
                  remarks: Index name as parsed out of the CREATE INDEX statement
                  constraints:
                    nullable: false
              - column:
                  name: statement
                  type: ${text.type}
                  remarks: The validated CREATE INDEX statement; source of truth replayed on transform re-runs
                  constraints:
                    nullable: false
              - column:
                  name: structured
                  type: ${text.type}
                  remarks: JSON-encoded structured form when the request was built via /preview; NULL when the user pasted raw SQL
              - column:
                  name: status
                  type: varchar(20)
                  remarks: One of pending, running, succeeded, failed, dropped
                  constraints:
                    nullable: false
              - column:
                  name: error_message
                  type: ${text.type}
                  remarks: Populated when status = failed; cleared on subsequent retries
              - column:
                  name: created_by_id
                  type: int
                  remarks: FK to core_user — the superuser who created the request
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: last_executed_at
                  type: ${timestamp_type}
                  remarks: When the index DDL last finished (succeeded or failed); NULL while pending
      rollback:
        - dropTable:
            tableName: metabase_index_request

  - changeSet:
      id: v62.2026-05-14T00:00:01
      author: bronsa
      comment: Unique (table_id, index_name) on metabase_index_request
      changes:
        - addUniqueConstraint:
            tableName: metabase_index_request
            columnNames: table_id, index_name
            constraintName: uq_metabase_index_request_table_id_index_name
      rollback:
        - dropUniqueConstraint:
            tableName: metabase_index_request
            constraintName: uq_metabase_index_request_table_id_index_name

  - changeSet:
      id: v62.2026-05-14T00:00:02
      author: bronsa
      comment: Index metabase_index_request.table_id for FK and table-scoped lookups
      changes:
        - createIndex:
            tableName: metabase_index_request
            indexName: idx_metabase_index_request_table_id
            columns:
              - column:
                  name: table_id
      rollback:
        - dropIndex:
            tableName: metabase_index_request
            indexName: idx_metabase_index_request_table_id

  - changeSet:
      id: v62.2026-05-14T00:00:03
      author: bronsa
      comment: Index metabase_index_request.transform_id for replay lookups on transform-run-complete
      changes:
        - createIndex:
            tableName: metabase_index_request
            indexName: idx_metabase_index_request_transform_id
            columns:
              - column:
                  name: transform_id
      rollback:
        - dropIndex:
            tableName: metabase_index_request
            indexName: idx_metabase_index_request_transform_id

  - changeSet:
      id: v62.2026-05-14T00:00:04
      author: bronsa
      comment: FK from metabase_index_request.table_id to metabase_table, cascade on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: table_id
            referencedTableName: metabase_table
            referencedColumnNames: id
            constraintName: fk_metabase_index_request_ref_metabase_table
            onDelete: CASCADE
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: metabase_index_request
            constraintName: fk_metabase_index_request_ref_metabase_table

  - changeSet:
      id: v62.2026-05-14T00:00:05
      author: bronsa
      comment: FK from metabase_index_request.transform_id to transform, set null on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: transform_id
            referencedTableName: transform
            referencedColumnNames: id
            constraintName: fk_metabase_index_request_ref_transform
            onDelete: SET NULL
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: metabase_index_request
            constraintName: fk_metabase_index_request_ref_transform

  - changeSet:
      id: v62.2026-05-14T00:00:06
      author: bronsa
      comment: FK from metabase_index_request.created_by_id to core_user, set null on delete
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_index_request
            baseColumnNames: created_by_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_metabase_index_request_ref_core_user
            onDelete: SET NULL
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: metabase_index_request
            constraintName: fk_metabase_index_request_ref_core_user
