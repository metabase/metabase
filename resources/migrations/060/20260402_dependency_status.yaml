databaseChangeLog:

  # 1. Create the dependency_status table
  - changeSet:
      id: v60.2026-04-02T00:00:00
      author: ericnormand
      comment: Create dependency_status table for async dependency calculation tracking
      changes:
        - createTable:
            tableName: dependency_status
            remarks: Tracks dependency calculation status for entities, analogous to analysis_finding
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_type
                  type: varchar(254)
                  remarks: The type of the entity (card, transform, snippet, etc.)
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: int
                  remarks: The ID of the entity
                  constraints:
                    nullable: false
              - column:
                  name: dependency_analysis_version
                  type: smallint
                  defaultValue: 0
                  remarks: Version of the dependency analysis that was performed
                  constraints:
                    nullable: false
              - column:
                  name: stale
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: True when the entity needs dependency recalculation
                  constraints:
                    nullable: false
              - column:
                  name: fail_count
                  type: int
                  defaultValueNumeric: 0
                  remarks: Number of consecutive failed dependency calculation attempts
                  constraints:
                    nullable: false
              - column:
                  name: next_retry_at
                  type: ${timestamp_type}
                  remarks: Earliest time at which a failed entity can be retried (null means immediately processable)
              - column:
                  name: terminal
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  remarks: True when the entity has exceeded max retries and should not be retried until modified
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: dependency_status

  # 2. Unique constraint on (entity_type, entity_id)
  - changeSet:
      id: v60.2026-04-02T00:00:01
      author: ericnormand
      comment: Unique constraint to prevent duplicate dependency_status entries
      changes:
        - addUniqueConstraint:
            tableName: dependency_status
            columnNames: entity_type, entity_id
            constraintName: idx_unique_dependency_status
      rollback:
        - dropUniqueConstraint:
            tableName: dependency_status
            constraintName: idx_unique_dependency_status

  # 3. Index on stale column (partial on postgres, full on others)
  - changeSet:
      id: v60.2026-04-02T00:00:02
      author: ericnormand
      comment: Add partial index on dependency_status.stale for efficient polling
      changes:
        - sql:
            dbms: postgresql
            sql: CREATE INDEX idx_dependency_status_stale ON dependency_status(stale) WHERE stale = true
        - sql:
            dbms: mysql,mariadb,h2
            sql: CREATE INDEX idx_dependency_status_stale ON dependency_status(stale)
      rollback:
        - dropIndex:
            tableName: dependency_status
            indexName: idx_dependency_status_stale

  # 4-11. Migrate data from entity tables to dependency_status
  # All entities are migrated. Entities with version > 0 (already analyzed) get stale=false.
  # Entities with version = 0 (never analyzed) get stale=true so the backfill picks them up.

  - changeSet:
      id: v60.2026-04-02T00:00:03
      author: ericnormand
      comment: Migrate dependency_analysis_version from report_card to dependency_status
      changes:
        - sql:
            sql: >-
              INSERT INTO dependency_status (entity_type, entity_id, dependency_analysis_version, stale)
              SELECT 'card', id, dependency_analysis_version, CASE WHEN dependency_analysis_version = 0 THEN true ELSE false END FROM report_card
      rollback:
        - sql:
            sql: DELETE FROM dependency_status WHERE entity_type = 'card'

