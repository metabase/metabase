# Aggregates the individual driver checks (drivers-tests-*) into a single
# `drivers-tests-result` check-run, driven by ci-test-config.
#
# This replaces the old `drivers-tests-result` job that lived inside drivers.yml.
# Because the drivers now report independently, we can't aggregate them with a
# `needs:` block — instead we listen for their check-runs and roll them up via
# the GitHub Checks API. See .github/scripts/drivers-rollup/.
#
# NOTE: `check_run`-triggered workflows only run from the file on the repo's
# DEFAULT branch, in the base-repo context (so this also covers fork PRs). It
# will not take effect until merged to master.
name: Drivers Rollup

on:
  check_run:
    types: [created, completed]

permissions:
  checks: write
  contents: read

# Re-evaluate per commit; the most recent event wins (it reads the full set of
# check-runs, so the final state is always correct).
concurrency:
  group: drivers-rollup-${{ github.event.check_run.head_sha }}
  cancel-in-progress: true

jobs:
  rollup:
    # React only to driver checks, never to our own aggregate (which also starts
    # with `drivers-tests-`) — that exclusion is what prevents an infinite loop.
    # The reusable-workflow caller is `driver-tests` (singular), so
    # `determine-driver-skips` and friends don't contain `drivers-tests-`.
    if: >-
      github.event.check_run.name != '' &&
      contains(github.event.check_run.name, 'drivers-tests-') &&
      !contains(github.event.check_run.name, 'drivers-tests-result')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.7"
          token: ${{ github.token }}
      - name: Roll up driver checks into drivers-tests-result
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.check_run.head_sha }}
          CHECK_NAME: ${{ github.event.check_run.name }}
          CHECK_STATUS: ${{ github.event.check_run.status }}
          CHECK_CONCLUSION: ${{ github.event.check_run.conclusion }}
          # Overridable; defaults to the production ci-test-config in the script.
          CONFIG_URL: https://raw.githubusercontent.com/metabase/ci-test-config/refs/heads/master/ci-test-config.json
        run: bun .github/scripts/drivers-rollup/index.ts
