# MongoDB SSL driver tests. See driver-postgres.yml for the template rationale.
name: Driver Tests - Mongo SSL

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: read

jobs:
  decide:
    uses: ./.github/workflows/_driver-decide.yml
    with:
      driver: mongo-ssl
      workflow-name: ${{ github.workflow }}
    secrets: inherit

  test:
    needs: decide
    if: >-
      !cancelled() &&
      needs.decide.result == 'success' &&
      needs.decide.outputs.conductor-status != 'skip' &&
      (needs.decide.outputs.should-run == 'true' || needs.decide.outputs.quarantine-conflict == 'true')
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        version:
          - name: MongoDB 6.0
            junit-name: be-tests-mongo-6-0-ssl-ee
            image: metabase/qa-databases:mongo-sample-6
    env:
      CI: 'true'
      DRIVERS: mongo
      MB_MONGO_TEST_USER: metabase
      MB_MONGO_TEST_PASSWORD: metasample123
      MB_TEST_MONGO_REQUIRES_SSL: true
    name: "${{ matrix.version.name }} (SSL)"
    steps:
      - name: Fail on quarantine conflict
        if: ${{ needs.decide.outputs.quarantine-conflict == 'true' }}
        run: |
          echo "::error::MongoDB SSL driver is quarantined but you changed files in modules/drivers/mongo/"
          echo ""
          echo "Your changes will NOT be tested because the driver is currently quarantined."
          echo "To run MongoDB SSL tests, add the label: break-quarantine-mongo-ssl"
          echo ""
          echo "If you merge without testing, you risk breaking the MongoDB SSL driver!"
          exit 1
      - uses: actions/checkout@v6
      - name: Spin up Mongo docker container
        run: >-
          docker run -d
          -p 27017:27017
          --name metamongo
          ${{ matrix.version.image }}
          mongod
          --dbpath /data/db2/
          --tlsMode requireTLS
          --tlsCertificateKeyFile /etc/mongo/metamongo.pem
          --tlsCAFile /etc/mongo/metaca.crt
      - uses: ./.github/actions/await-port
        with:
          port: 27017
        timeout-minutes: 5
      - name: Make SSL certificates for Mongo available
        run: |
          curl https://raw.githubusercontent.com/metabase/metabase-qa/master/dbs/mongo/certificates/metabase.crt \
          -o ./test_resources/ssl/mongo/metabase.crt

          curl https://raw.githubusercontent.com/metabase/metabase-qa/master/dbs/mongo/certificates/metabase.key \
          -o ./test_resources/ssl/mongo/metabase.key

          curl https://raw.githubusercontent.com/metabase/metabase-qa/master/dbs/mongo/certificates/metaca.crt \
          -o ./test_resources/ssl/mongo/metaca.crt
      - name: Test ${{ matrix.version.name }}
        id: test-driver
        uses: ./.github/actions/test-driver
        with:
          junit-name: ${{ matrix.version.junit-name }}
          test-args: >-
            :exclude-tags '[:mongo-sharded-cluster-tests :mb/transforms-python-test]'
            :only-tags [:mb/driver-tests]
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        continue-on-error: ${{ needs.decide.outputs.conductor-status == 'info' }}
        with:
          input-path: ./target/junit/
          output-name: be-tests-mongo-ssl
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.test-driver.outputs.test-outcome }}
      - name: Report result to conductor
        if: always()
        uses: ./.github/actions/conductor-report
        with:
          secret: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}
          status: ${{ needs.decide.outputs.conductor-status }}
          outcome: ${{ steps.test-driver.outputs.test-outcome || job.status }}

  result:
    name: result
    needs: [decide, test]
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Gate on driver test result
        env:
          DECIDE_RESULT: ${{ needs.decide.result }}
          TEST_RESULTS: ${{ needs.test.result }}
          CONDUCTOR_STATUS: ${{ needs.decide.outputs.conductor-status }}
        run: bash "$GITHUB_WORKSPACE/.github/scripts/conductor/gate-result.sh"
