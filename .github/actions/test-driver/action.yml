name: Test database driver
description: Test database driver
inputs:
  junit-name:
    required: true
    default: "driver"
  test-args:
    required: false
  build-static-viz:
    required: true
    default: false
  logs-artifact-suffix:
    required: false
    description: Suffix to append to the test logs artifact name to avoid conflicts in matrix jobs
  edition:
    required: false
    default: "ee"
    description: Edition to test (oss or ee)
  quarantine-engine:
    required: false
  driver-status:
    required: false
    default: ""
    description: >-
      Configured status for this driver ("info", "skip", "required", or empty), as reported by `mage driver-decisions`.

outputs:
  test-outcome:
    description: "The outcome of the test run (success, failure, cancelled, skipped)"
    value: ${{ steps.run-test.outcome }}

runs:
  using: "composite"
  steps:
    - name: Prepare back-end environment
      uses: ./.github/actions/prepare-backend
    - name: Resolve current job id
      # Resolve JOB_ID early (before the long test step) so the ci-conductor
      # reporter below can link failures to this exact job. Best-effort.
      uses: ./.github/actions/resolve-job-id
    - name: Prepare front-end environment
      if: ${{ inputs.build-static-viz == 'true' }}
      uses: ./.github/actions/prepare-frontend
    - name: Build static viz frontend
      if: ${{ inputs.build-static-viz == 'true' }}
      run: bun run build-static-viz
      shell: bash
      env:
        MB_EDITION: ${{ inputs.edition }}

    # Granular rerun: on a re-run of a failed job, restore the list
    # of tests that failed on the previous attempt (uploaded below) so the test
    # step can target only those instead of the whole suite. Best-effort: a
    # missing/empty artifact leaves no file and the run falls back to the full
    # suite. First attempts skip this entirely.
    - name: Restore previously-failed tests
      if: ${{ github.run_attempt != '1' }}
      continue-on-error: true
      uses: actions/download-artifact@v8
      with:
        name: failed-tests-${{ inputs.junit-name }}
        path: target

    - name: Test database driver
      # On a rerun with a non-empty failed-tests file, target only those vars via
      # hawk `:only` (a var-level selector bypasses `:only-tags`, which is fine —
      # every listed var already passed that filter on the first attempt).
      # Otherwise run exactly as before. Quote the file so the whole `[ns/var ...]`
      # vector reaches clojure -X as a single argument.
      run: |
        BASE="clojure -X:dev:ci:${{ inputs.edition }}:${{ inputs.edition }}-dev:drivers:drivers-dev:test"
        if [ "${{ github.run_attempt }}" != "1" ] && [ -s target/failed-tests ]; then
          echo "Granular rerun of previously-failed tests: $(cat target/failed-tests)"
          $BASE :only "$(cat target/failed-tests)"
        else
          $BASE ${{ inputs.test-args }}
        fi
      shell: bash
      id: run-test
      # Keep this step continue-on-error because the quarantine logic controls whether it ultimately fails.
      # Driver "info" status can affect this logic. See below.
      continue-on-error: true

    - name: Report failed tests to ci-conductor
      if: ${{ !cancelled() && steps.run-test.outcome == 'failure' }}
      # This step should NEVER fail the job!
      continue-on-error: true
      uses: ./.github/actions/report-failures-to-ci-conductor
      with:
        test-suite: ${{ inputs.junit-name }}
        adapter: backend

    # Granular rerun: record which tests failed so a re-run of this
    # job targets only those (restored above). Reuses the backend JUnit adapter
    # from the ci-conductor sources the report step just prepared. Best-effort:
    # writes nothing unless every failure is attributable to a var, so an
    # unattributable failure falls back to a full rerun.
    - name: Collect failed tests for rerun
      if: ${{ !cancelled() && steps.run-test.outcome == 'failure' }}
      continue-on-error: true
      shell: bash
      run: bun release/ci-conductor/src/collect-failed-backend.ts

    - name: Upload failed tests for rerun
      if: ${{ !cancelled() && steps.run-test.outcome == 'failure' }}
      continue-on-error: true
      uses: actions/upload-artifact@v7
      with:
        name: failed-tests-${{ inputs.junit-name }}
        path: target/failed-tests
        if-no-files-found: ignore
        overwrite: true

    - name: Publish Test Report (JUnit)
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      # As per the documentation: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#steps-context
      # test.outcome gives us access to the result before `continue-on-error` overrides it and sets it to 'success'.
      # We want test reports even if the test step gets cancelled (e.g. times out), hence we match anything that is not a 'success'.
      if: ${{ steps.run-test.outcome != 'success' }}
      with:
        path: "target/junit/**/*_test.xml"
        name: JUnit Test Report ${{ inputs.junit-name }}
        reporter: java-junit
        list-suites: failed
        list-tests: failed
        fail-on-error: false

    - name: Upload Logs on Failure
      if: always() && steps.run-test.outcome != 'success'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ format('test-logs-{0}{1}', github.job, inputs.logs-artifact-suffix && format('-{0}', inputs.logs-artifact-suffix) || '') }}
        path: logs/test-log.json
        retention-days: 1
      # Failing to upload the artifact should never affect the outcome of the whole test run.
      continue-on-error: true

    # Last, because this is the only step allowed to fail the job: everything above it reports the
    # failure (JUnit report, logs, ci-conductor) and must run regardless of the verdict below.
    - name: Quarantine gate
      # Off master and release branches an "info" driver is data-collection only - the test always passes!
      # On master and release branches "info" carries no weight - the quarantine logic applies.
      if: |
        !cancelled()
        && steps.run-test.outcome == 'failure'
        && !(inputs.driver-status == 'info'
             && !(github.ref_name == 'master' || startsWith(github.ref_name, 'release-x')))
      continue-on-error: ${{ inputs.quarantine-engine != 'ci-conductor' }}
      uses: ./.github/actions/quarantine-gate
      with:
        adapter: backend
        test-suite: ${{ inputs.junit-name }}
        enforce-quarantine: ${{ inputs.quarantine-engine == 'ci-conductor' }}
