## Drop unused icon_dark column from custom_viz_plugin

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml
  - changeSet:
      id: v61.2026-04-13T10:00:00
      author: egrushin
      comment: Remove icon_dark column — dark icons are no longer needed because custom viz icons use CSS mask rendering
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: custom_viz_plugin
            columnName: icon_dark
      changes:
        - dropColumn:
            tableName: custom_viz_plugin
            columnName: icon_dark
