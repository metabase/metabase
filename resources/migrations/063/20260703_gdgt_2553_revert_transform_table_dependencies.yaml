databaseChangeLog:

  - changeSet:
      id: v63.2026-07-03T00:00:00
      author: bronsa
      comment: Drop table_dependencies column from transform table (revert GDGT-2553)
      changes:
        - dropColumn:
            tableName: transform
            columnName: table_dependencies
      rollback:
        - addColumn:
            tableName: transform
            columns:
              - column:
                  name: table_dependencies
                  type: ${text.type}
