agent: claude

files:
  symlink:
    - node_modules
    - bin/bb

post_create:
  # Copy fixbot tooling from source repo (worktree is based on master, not possibly-different)
  - cp -r {{SOURCE_REPO}}/.claude/fixbot .claude/fixbot
  - cp -r {{SOURCE_REPO}}/mage/src/mage/fixbot mage/src/mage/fixbot
  - cp {{SOURCE_REPO}}/bb.edn bb.edn

  - sed "s|{{pwd}}|$(pwd)|;s|{{tmpdir}}|${TMPDIR%/}|" .claude/fixbot/settings.local-template.json > .claude/settings.local.json
  - mkdir -p .fixbot
  - echo '{{ISSUE_ID}} | {{ISSUE_URL}}' > .fixbot/issue.txt
  - rm -f .claude/commands/fixbot*.md
  - cp .claude/fixbot/commands/*.md .claude/commands/
  - mkdir -p .github/hooks/workmux-status
  - echo '{"version":1,"hooks":{"userPromptSubmitted":[{"type":"command","bash":"workmux set-window-status working"}],"postToolUse":[{"type":"command","bash":"workmux set-window-status working"}],"agentStop":[{"type":"command","bash":"workmux set-window-status done"}]}}' > .github/hooks/workmux-status/hooks.json
  - MB_PREMIUM_EMBEDDING_TOKEN={{MB_PREMIUM_EMBEDDING_TOKEN}} LINEAR_API_KEY={{LINEAR_API_KEY}} ./bin/mage -fixbot-dev-env --app-db {{APP_DB}}
  - bun install

pre_remove:
  - ./bin/mage -fixbot-dev-env --down

panes:
  - command: <agent>
    focus: true

  - command: mise x -- clj -M:dev:dev-start:drivers:drivers-dev:ee:ee-dev 2>&1 | tee .fixbot/backend-$(date +%Y%m%d-%H%M%S).log
    split: horizontal
    percentage: 30

  - command: mise x -- bun run build-hot 2>&1 | tee .fixbot/frontend-$(date +%Y%m%d-%H%M%S).log
    split: vertical

  - command: mise x -- ./bin/mage -fixbot-status
    split: vertical
    size: 7
