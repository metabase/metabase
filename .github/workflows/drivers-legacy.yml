name: Driver Tests - Legacy Versions

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      drivers:
        description: 'Specific drivers to test (comma-separated)'
        required: false
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-legacy
  cancel-in-progress: true

jobs:
  # Legacy versions: older database versions tested weekly
  be-tests-postgres-12:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      CI: 'true'
      DRIVERS: postgres
      MB_DB_TYPE: postgres
      MB_DB_PORT: 5432
      MB_DB_HOST: localhost
      MB_DB_DBNAME: mb_test
      MB_DB_USER: mb_test
      MB_POSTGRESQL_TEST_USER: mb_test
      MB_POSTGRES_SSL_TEST_SSL: 'false'
    services:
      postgres:
        image: postgres:12-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: mb_test
          POSTGRES_DB: mb_test
          POSTGRES_HOST_AUTH_METHOD: trust
    name: PostgreSQL 12.x
    steps:
      - uses: actions/checkout@v4
      - name: Test PostgreSQL 12.x
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-postgres-12-ee'
          test-args: >-
            :only-tags [:mb/driver-tests]
            :exclude-tags [:mb/old-migrations-test]
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ github.job }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-mysql-8:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    services:
      mysql:
        image: mysql:8.0
        ports:
          - "3306:3306"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: circle_test
    env:
      CI: 'true'
      DRIVERS: mysql
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: circle_test
      MB_DB_USER: root
      MB_MYSQL_TEST_USER: root
      MB_MYSQL_SSL_TEST_SSL: 'false'
    name: MySQL 8.0
    steps:
      - uses: actions/checkout@v4
      - name: Test MySQL 8.0
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-mysql-8-0-ee'
          test-args: >-
            :only-tags [:mb/driver-tests]
            :exclude-tags [:mb/old-migrations-test]
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ github.job }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-mariadb-10-2:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    services:
      mysql:
        image: circleci/mariadb:10.2.23
        ports:
          - "3306:3306"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: circle_test
    env:
      CI: 'true'
      DRIVERS: mysql
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: circle_test
      MB_DB_USER: root
      MB_MYSQL_TEST_USER: root
      MB_MYSQL_SSL_TEST_SSL: 'false'
    name: MariaDB 10.2
    steps:
      - uses: actions/checkout@v4
      - name: Test MariaDB 10.2
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-mariadb-10-2-ee'
          test-args: >-
            :only-tags [:mb/driver-tests]
            :exclude-tags [:mb/old-migrations-test]
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ github.job }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-mariadb-latest:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    services:
      mysql:
        image: circleci/mariadb:latest
        ports:
          - "3306:3306"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: circle_test
    env:
      CI: 'true'
      DRIVERS: mysql
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: circle_test
      MB_DB_USER: root
      MB_MYSQL_TEST_USER: root
      MB_MYSQL_SSL_TEST_SSL: 'false'
    name: MariaDB Latest
    steps:
      - uses: actions/checkout@v4
      - name: Test MariaDB Latest
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-mariadb-latest-ee'
          test-args: >-
            :only-tags [:mb/driver-tests]
            :exclude-tags [:mb/old-migrations-test]
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ github.job }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-oracle-18-4:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      CI: 'true'
      DRIVERS: oracle
      MB_ORACLE_TEST_HOST: localhost
      MB_ORACLE_TEST_USER: system
      MB_ORACLE_TEST_SERVICE_NAME: XEPDB1
      MB_ORACLE_TEST_PASSWORD: 'password'
      MB_ORACLE_TEST_SSL: false
      MB_ORACLE_SSL_TEST_SSL: false
    services:
      oracle:
        image: gvenzl/oracle-xe:18.4.0-slim
        env:
          ORACLE_PASSWORD: password
        ports:
          - "1521:1521"
    name: Oracle 18.4
    steps:
    - uses: actions/checkout@v4
    - name: Test Oracle 18.4
      uses: ./.github/actions/test-driver
      with:
        junit-name: 'be-tests-oracle-18-4-ee'
        test-args: >-
          :only-tags [:mb/driver-tests]
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: ${{ github.job }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  be-tests-mongo-6:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      CI: 'true'
      DRIVERS: mongo
      MB_MONGO_TEST_USER: metabase
      MB_MONGO_TEST_PASSWORD: metasample123
    services:
      mongodb:
        image: metabase/qa-databases:mongo-sample-6
        ports:
          - "27017:27017"
        env:
          MONGO_INITDB_ROOT_USERNAME: metabase
          MONGO_INITDB_ROOT_PASSWORD: metasample123
    name: MongoDB 6.0
    steps:
    - uses: actions/checkout@v4
    - name: Test MongoDB 6.0
      uses: ./.github/actions/test-driver
      with:
        junit-name: 'be-tests-mongo-6-0-ee'
        test-args: >-
          :exclude-tags [:mongo-sharded-cluster-tests]
          :only-tags [:mb/driver-tests]
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: ${{ github.job }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}

  legacy-results:
    needs:
      - be-tests-postgres-12
      - be-tests-mysql-8
      - be-tests-mariadb-10-2
      - be-tests-mariadb-latest
      - be-tests-oracle-18-4
      - be-tests-mongo-6
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: legacy-results
    if: always() && !cancelled()
    steps:
      - name: Check legacy versions status
        uses: actions/github-script@v7
        env:
          needs: ${{ toJson(needs) }}
        with:
          script: | #js
            const needs = JSON.parse(process.env.needs);
            const jobs = Object.entries(needs).map(([jobName, jobValues]) => ({
              name: jobName,
              result: jobValues.result
            }));
            
            console.log("📊 Legacy Driver Test Results:");
            jobs.forEach((job) => {
              const status = job.result === 'success' ? '✅' : '❌';
              console.log(`${status} ${job.name} - ${job.result}`);
            });
            
            const failedCount = jobs.filter(job => job.result !== 'success').length;
            if (failedCount > 0) {
              console.log(`\n⚠️  ${failedCount} legacy driver tests failed`);
              process.exit(1);
            } else {
              console.log("\n🎉 All legacy driver tests passed!");
              process.exit(0);
            }