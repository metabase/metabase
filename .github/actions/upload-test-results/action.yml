name: Upload Test Results to s3
description: Uploads test results files to s3

inputs:
  input-path:
    required: true
  output-name:
    required: true
    default: test
  role-to-assume:
    required: true
  aws-region:
    required: true
    default: us-east-1
  bucket:
    required: true
  trunk-api-token:
    required: true
  variant:
    required: false
    default: ""
  previous-step-outcome:
    required: true
  driver-id:
    required: false
    default: ""
    description: >-
      When set (driver jobs pass ${{ github.job }}), looks the id up in
      ci-test-config; if its status is "info" the Trunk step won't fail the job,
      so the driver passes no matter what. No-ops for non-driver callers.

runs:
  using: "composite"
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-region: ${{ inputs.aws-region }}
    - name: zip test results
      env:
        INPUT_DIR: ${{ inputs.input-path }}
        OUTPUT_FILE: ${{ inputs.output-name }}
      shell: bash
      run: | # sh
        zip ${OUTPUT_FILE}.zip $INPUT_DIR/*.xml
    - name: Upload test results to S3
      env:
        BUCKET: ${{ inputs.bucket }}
        OUTPUT_FILE: ${{ inputs.output-name }}
      shell: bash
      run: | # sh
        DATE=$(date '+%Y-%m-%d')
        aws s3 cp ${OUTPUT_FILE}.zip s3://$BUCKET/$DATE/$GITHUB_RUN_ID/$GITHUB_RUN_ATTEMPT/

    # For driver jobs flagged "info" in ci-test-config, the job should pass no
    # matter what. Resolve that here (reusing the rollup's tested config logic)
    # and make the Trunk step — which controls the job's exit code — non-fatal.
    # Both steps no-op for non-driver callers (driver-id empty).
    - name: Install bun (driver info check)
      if: ${{ inputs.driver-id != '' }}
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: "1.3.7"
        token: ${{ github.token }}
    - name: Resolve driver config status
      id: driver-status
      if: ${{ inputs.driver-id != '' }}
      shell: bash
      env:
        DRIVER_ID: ${{ inputs.driver-id }}
      run: bun "$GITHUB_WORKSPACE/.github/scripts/drivers-rollup/job-status.ts"
    - name: Upload results to Trunk
      # Important!
      # 1. This step must always run because it controls job's exit code.
      # 2. There's no point in running this outside the organization
      # 3. For "info" drivers we never fail the job (continue-on-error).
      if: always() && github.repository_owner == 'metabase'
      continue-on-error: ${{ steps.driver-status.outputs.is-info == 'true' }}
      uses: trunk-io/analytics-uploader@1198efcc0976501147b10a7e343c3fa069527526 # v2.0.9
      env:
        TRUNK_REPO_URL: git@github.com:metabase/metabase.git
      with:
        junit-paths: ${{ inputs.input-path }}
        variant: ${{ inputs.variant || inputs.output-name }}
        org-slug: metabase
        dry-run: ${{ (github.event_name == 'pull_request' && github.event.pull_request.draft == true) || github.repository != 'metabase/metabase' }} # quarantine, but do not upload results
        token: ${{ inputs.trunk-api-token }}
        use-cache: true
        previous-step-outcome: ${{ inputs.previous-step-outcome }}
