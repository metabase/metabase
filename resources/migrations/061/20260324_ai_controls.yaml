## AI controls

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml
  - changeSet:
      id: v61.gasgewas
      author: nvoxland
      comment: Create metabot_permissions table for AI feature permissions per group
      changes:
        - createTable:
            tableName: metabot_permissions
            remarks: A table to store AI/metabot permissions per permissions group
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  remarks: The ID of the permission
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: The ID of the associated permissions group
                  constraints:
                    nullable: false
              - column:
                  name: perm_type
                  type: varchar(254)
                  remarks: The type of permission
                  constraints:
                    nullable: false
              - column:
                  name: perm_value
                  type: varchar(254)
                  remarks: The value of the permission
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.rr32dasd
      author: nvoxland
      comment: Add index on metabot_permissions.group_id
      changes:
        - createIndex:
            tableName: metabot_permissions
            indexName: idx_metabot_permissions_group_id
            columns:
              - column:
                  name: group_id

  - changeSet:
      id: v61.ge2e24a
      author: nvoxland
      comment: Add foreign key on metabot_permissions.group_id referencing permissions_group
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabot_permissions
            baseColumnNames: group_id
            referencedTableName: permissions_group
            referencedColumnNames: id
            constraintName: fk_metabot_permissions_ref_permissions_group
            onDelete: CASCADE

  - changeSet:
      id: v61.g24da211
      author: nvoxland
      comment: Add unique constraint on metabot_permissions group_id and perm_type
      changes:
        - addUniqueConstraint:
            tableName: metabot_permissions
            columnNames: group_id, perm_type
            constraintName: unique_metabot_permissions_group_id_perm_type

  - changeSet:
      id: v61.t42424d
      author: nvoxland
      comment: Create metabot_instance_limit table
      changes:
        - createTable:
            tableName: metabot_instance_limit
            remarks: Metabot usage limits at the instance or tenant level
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: int
                  remarks: The tenant ID, or null for instance-wide limit
                  constraints:
                    nullable: true
              - column:
                  name: max_usage
                  type: int
                  remarks: The maximum usage value, interpreted according to the metabot-limit-type setting. Null is unlimited

  - changeSet:
      id: v61.t42424d-unique
      author: nvoxland
      comment: Add unique constraint on metabot_instance_limit.tenant_id
      changes:
        - addUniqueConstraint:
            tableName: metabot_instance_limit
            columnNames: tenant_id
            constraintName: unique_metabot_instance_limit_tenant_id

  - changeSet:
      id: v61.t42424d-fk
      author: nvoxland
      comment: Add foreign key on metabot_instance_limit.tenant_id referencing tenant
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabot_instance_limit
            baseColumnNames: tenant_id
            referencedTableName: tenant
            referencedColumnNames: id
            constraintName: fk_metabot_instance_limit_ref_tenant
            onDelete: CASCADE

  - changeSet:
      id: v61.gr34fp
      author: nvoxland
      comment: Create metabot_group_limit table
      changes:
        - createTable:
            tableName: metabot_group_limit
            remarks: Metabot usage limits per group
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: The ID of the associated permissions group
                  constraints:
                    nullable: false
              - column:
                  name: max_usage
                  type: int
                  remarks: The maximum usage value, interpreted according to the metabot-limit-type setting
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.gr34fp-unique
      author: nvoxland
      comment: Add unique constraint on metabot_group_limit.group_id
      changes:
        - addUniqueConstraint:
            tableName: metabot_group_limit
            columnNames: group_id
            constraintName: unique_metabot_group_limit_group_id

  - changeSet:
      id: v61.gr34fp-fk
      author: nvoxland
      comment: Add foreign key on metabot_group_limit.group_id referencing permissions_group
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabot_group_limit
            baseColumnNames: group_id
            referencedTableName: permissions_group
            referencedColumnNames: id
            constraintName: fk_metabot_group_limit_ref_permissions_group
            onDelete: CASCADE

  - changeSet:
      id: v61.98kjjhf
      author: edpaget
      comment: Insert default metabot permissions (all yes/medium) for magic user groups
      changes:
        - sql:
            sql: >-
              INSERT INTO metabot_permissions (group_id, perm_type, perm_value)
              SELECT pg.id, d.perm_type, d.perm_value
              FROM permissions_group pg
              CROSS JOIN (
                SELECT 'permission/metabot' AS perm_type, 'yes' AS perm_value
                UNION ALL SELECT 'permission/metabot-model', 'medium'
                UNION ALL SELECT 'permission/metabot-sql-generation', 'yes'
                UNION ALL SELECT 'permission/metabot-nql', 'yes'
                UNION ALL SELECT 'permission/metabot-other-tools', 'yes'
              ) AS d
              WHERE pg.magic_group_type IN ('admin', 'all-internal-users', 'data-analyst', 'all-external-users')
                AND NOT EXISTS (
                  SELECT 1 FROM metabot_permissions mp
                  WHERE mp.group_id = pg.id AND mp.perm_type = d.perm_type
                )
      rollback:
        - sql:
            sql: >-
              DELETE FROM metabot_permissions
              WHERE group_id IN (
                SELECT id FROM permissions_group
                WHERE magic_group_type IN ('admin', 'all-internal-users', 'data-analyst', 'all-external-users')
              )

  - changeSet:
      id: v61.t42424d
      author: nvoxland
      comment: Create metabot_instance_limit table for instance-wide and per-tenant usage limits
      changes:
        - createTable:
            tableName: metabot_instance_limit
            remarks: Usage limits at the instance or tenant level. tenant_id NULL = instance-wide limit.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: tenant_id
                  type: int
                  remarks: 'Tenant ID for per-tenant limits. NULL for instance-wide limit.'
              - column:
                  name: max_usage
                  type: int
                  remarks: 'Maximum usage allowed in the billing period. NULL means unlimited.'

  - changeSet:
      id: v61.gr34fp
      author: nvoxland
      comment: Create metabot_group_limit table for per-group usage limits
      changes:
        - createTable:
            tableName: metabot_group_limit
            remarks: Usage limits per permissions group. A user''s effective limit is the max across their groups.
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: group_id
                  type: int
                  remarks: 'The permissions group this limit applies to.'
                  constraints:
                    nullable: false
              - column:
                  name: max_usage
                  type: int
                  remarks: 'Maximum usage allowed in the billing period. NULL means unlimited.'
        - addUniqueConstraint:
            tableName: metabot_group_limit
            columnNames: group_id
            constraintName: unique_metabot_group_limit_group_id
