<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Metabase</title>

    <style>
      :root {
        /* Allow light-dark() to work */
        color-scheme: light dark;
      }

      body {
        margin: 0;
        height: 500px;
        background: var(--color-background-primary);
        color: var(--color-text-primary);
        font-family: var(--font-sans);
      }
    </style>

    <link
      rel="stylesheet"
      href="{{{instanceUrlRaw}}}/app/dist/app-embed-mcp.css?v={{{cacheBuster}}}"
    />
  </head>
  <body>
    <div id="root"></div>

    <script>
      window.metabaseConfig = {
        instanceUrl: {{{instanceUrl}}},
        sessionToken: {{{sessionToken}}}
      };
    </script>

    <script src="{{{instanceUrlRaw}}}/app/dist/app-embed-mcp.js?v={{{cacheBuster}}}"></script>
  </body>
</html>
