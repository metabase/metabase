## osi_ai_context: one row per library entity holding OSI ai_context metadata
## ({instructions, synonyms[], examples[]}). Replaces curated_search_entries.
## The table is authoritative; an enterprise pgvector index (library_entity_index, many embedded
## docs per entity) is reconciled against it plus live library membership and backs the
## retrieve_library_entities Metabot tool.

databaseChangeLog:
  - logicalFilePath: migrations/063_update_migrations.yaml

  - changeSet:
      id: v63.2026-06-23T00:00:01
      author: christruter
      comment: Create osi_ai_context table
      changes:
        - createTable:
            tableName: osi_ai_context
            remarks: OSI ai_context metadata for library entities, one row per entity
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: entity_type
                  type: varchar(32)
                  remarks: Type of entity this ai_context describes (table, metric, model, measure, segment)
                  constraints:
                    nullable: false
              - column:
                  name: entity_local_id
                  type: bigint
                  remarks: Local appdb id of the entity this ai_context describes
                  constraints:
                    nullable: false
              - column:
                  name: ai_context
                  type: ${text.type}
                  remarks: OSI ai_context JSON blob ({instructions, synonyms[], examples[]})
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: char(21)
                  remarks: Random NanoID tag for unique identity (serialization)
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When the ai_context was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When the ai_context was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
      rollback:
        - dropTable:
            tableName: osi_ai_context

  - changeSet:
      id: v63.2026-06-23T00:00:02
      author: christruter
      comment: Drop the superseded curated_search_entries table
      changes:
        - dropTable:
            tableName: curated_search_entries
      ## Faithful rollback recreates the old table so cross-version down-migrations don't error.
      ## (Data is not restored — the feature was unreleased, so there is none to preserve.)
      rollback:
        - createTable:
            tableName: curated_search_entries
            remarks: Curated search prompts mapped to the entities that answer them
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: search_prompt
                  type: ${text.type}
                  constraints:
                    nullable: false
              - column:
                  name: usage_instructions
                  type: ${text.type}
                  constraints:
                    nullable: true
              - column:
                  name: entity
                  type: ${text.type}
                  constraints:
                    nullable: false
              - column:
                  name: verified
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: entity_id
                  type: char(21)
                  constraints:
                    nullable: true
                    unique: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v63.2026-06-25T00:00:01
      author: christruter
      comment: Enforce one ai_context row per entity
      changes:
        - addUniqueConstraint:
            tableName: osi_ai_context
            columnNames: entity_type, entity_local_id
            constraintName: uq_osi_ai_context_entity
      rollback:
        - dropUniqueConstraint:
            tableName: osi_ai_context
            constraintName: uq_osi_ai_context_entity

  ## Coalesce card-flavor ai_context rows (question/metric/model/card) into one canonical "card" row per entity.
  ## Split across two change sets because the strict migration linter allows only one change per change set
  ## (unless each is DBMS-qualified).
  - changeSet:
      id: v63.2026-06-25T00:00:02
      author: christruter
      comment: Keep only the newest card-flavor ai_context row per entity
      changes:
        # Keep only the newest card-flavor row per entity (a derived table so MySQL allows deleting from the
        # table referenced in the subquery), so the type-normalizing UPDATE below can't hit the unique constraint.
        - sql:
            sql: >-
              DELETE FROM osi_ai_context
              WHERE entity_type IN ('question', 'metric', 'model', 'card')
                AND id NOT IN (SELECT keep_id FROM
                  (SELECT MAX(id) AS keep_id FROM osi_ai_context
                   WHERE entity_type IN ('question', 'metric', 'model', 'card')
                   GROUP BY entity_local_id) AS newest);
      rollback:

  - changeSet:
      id: v63.2026-06-25T00:00:03
      author: christruter
      comment: Normalize card-flavor entity_type values to canonical "card"
      changes:
        - sql:
            sql: >-
              UPDATE osi_ai_context SET entity_type = 'card'
              WHERE entity_type IN ('question', 'metric', 'model');
      rollback:
