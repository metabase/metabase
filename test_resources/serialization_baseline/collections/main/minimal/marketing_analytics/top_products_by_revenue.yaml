dataset_query:
  database: Sample Database
  stages:
  - native: |-
      SELECT
        p.TITLE,
        p.CATEGORY,
        SUM(o.TOTAL) AS revenue
      FROM ORDERS o
      JOIN PRODUCTS p ON o.PRODUCT_ID = p.ID
      WHERE p.CATEGORY = {{category}}
      GROUP BY p.TITLE, p.CATEGORY
      ORDER BY revenue DESC
      LIMIT 10
