name: Reset Snowflake Dataset

on:
  workflow_dispatch:
    inputs:
      dataset-name:
        description: 'Dataset name to drop (e.g., test-data)'
        required: true
        default: 'test-data'
        type: string

jobs:
  reset-dataset:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: 'true'
      DRIVERS: snowflake
      MB_SNOWFLAKE_TEST_USER: METABASE CI
      MB_SNOWFLAKE_TEST_ACCOUNT: ${{ secrets.MB_SNOWFLAKE_TEST_ACCOUNT }}
      MB_SNOWFLAKE_TEST_PASSWORD: ${{ secrets.MB_SNOWFLAKE_TEST_PASSWORD }}
      MB_SNOWFLAKE_TEST_PRIVATE_KEY: ${{ secrets.MB_SNOWFLAKE_TEST_PRIVATE_KEY }}
      MB_SNOWFLAKE_TEST_WAREHOUSE: ${{ secrets.MB_SNOWFLAKE_TEST_WAREHOUSE }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.3
        with:
          cli: latest
      - name: Drop Snowflake dataset
        run: >-
          clojure -X:dev:drivers:drivers-dev
          metabase.test.data.snowflake/drop-dataset!
          :dataset-name '"${{ inputs.dataset-name }}"'
