name: E2E Test
run-name: E2E Test - ${{ inputs.name }}

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      edition: # oss | ee
        required: false
        type: string
        default: ee
      specs:
        required: false
        default: ./e2e/test/scenarios/**/*.cy.spec.*
        type: string
      tags:
        required: false
        type: string
      runner:
        required: false
        type: string
        default: ${{ vars.DEFAULT_RUNNER_KEY }}
      total_chunks: # number of chunks
        required: false
        type: number
      split_index: # index of the chunk
        required: false
        type: number

env:
  DISPLAY: "" # https://github.com/cypress-io/cypress/issues/4034
  TERM: xterm
  TZ: US/Pacific # to make Node match the instance tz
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  HASH: ${{ github.event.pull_request.head.sha || github.sha }}-${{ github.run_attempt }}
  PR_NUMBER: ${{ github.event.pull_request.number || '' }}
  JOB_NAME: ${{ inputs.name }}
  # ci-conductor reporting (DEV-1999). Secret holds the base origin
  # (e.g. "https://conductor.<host>"); each consumer appends the path it needs
  # (the reporter POSTs to "/webhooks/failed-tests"). Callers pass
  # `secrets: inherit`; reporting no-ops when it's unset.
  CI_CONDUCTOR_BASE_URL: ${{ secrets.CI_CONDUCTOR_BASE_URL }}
  # Shared secret sent as the `x-internal-secret` header to authenticate.
  CI_CONDUCTOR_WEBHOOK_SECRET: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}
  REPO_ID: ${{ github.event.repository.id }}
  # Commit + PR target branch under test, so conductor can tie failures to the
  # right code. On PRs the ambient GITHUB_SHA is the synthetic merge commit and
  # GITHUB_BASE_REF the target, so we pass the PR head sha / base ref explicitly
  # (falling back to push-event values). The reporter reads these. DEV-1999.
  COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.ref_name }}

jobs:
  e2e-tests:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 40
    name: e2e-tests-${{ inputs.name }}-${{ inputs.edition }}
    env:
      MB_EDITION: ${{ inputs.edition }}
      # Absolute path for the quarantine failures file (DEV-2082). The after:spec
      # recorder runs in Cypress' plugins process, whose cwd differs from the
      # workspace where the gate step runs; an absolute path anchored to the
      # workspace makes both agree regardless of cwd.
      QUARANTINE_FAILURES_FILE: ${{ github.workspace }}/target/quarantine-failures.jsonl
      # Sensitive env vars (tokens, secrets) starting with `CYPRESS_` are accessed via async `cy.env()`
      # Example: `cy.env(["FOO"]).then(({ FOO }) => ...)`
      # For non-sensitive config, use `Cypress.expose()` in cypress config instead (synchronous)
      CYPRESS_MB_ALL_FEATURES_TOKEN: ${{ secrets.STAGING_MB_ALL_FEATURES_TOKEN }}
      CYPRESS_MB_STARTER_CLOUD_TOKEN: ${{ secrets.STAGING_MB_STARTER_CLOUD_TOKEN }}
      CYPRESS_MB_PRO_CLOUD_TOKEN: ${{ secrets.STAGING_MB_PRO_CLOUD_TOKEN }}
      CYPRESS_MB_PRO_SELF_HOSTED_TOKEN: ${{ secrets.STAGING_MB_PRO_SELF_HOSTED_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Setup python-runner
        if: ${{ inputs.name == 'python' }}
        env:
          METABASE_AUTOMATION_USER_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
        run: ./.github/scripts/setup-python-runner.sh

      - name: Prepare Docker containers
        uses: ./.github/actions/e2e-prepare-containers
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          maildev: true
          openldap: true
          webhook: true
          snowplow: true
          postgres: true
          mysql: true
          mongo: true

      - name: Retrieve uberjar artifact for ${{ inputs.edition }}
        uses: ./.github/actions/fetch-artifact
        with:
          commit: ${{ github.event.pull_request.head.sha || github.sha }}
          edition: ${{ inputs.edition }}
          extract-path: "target/uberjar"
          output-name: "metabase.jar"

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Prepare Cypress environment
        id: cypress-prep
        uses: ./.github/actions/prepare-cypress

      - name: Download failed test artifacts
        uses: actions/download-artifact@v8
        if: github.run_attempt != '1'
        continue-on-error: true
        id: failed-specs
        with:
          name: failed-tests-${{ inputs.name }}-${{ inputs.edition }}

      - name: Get failed specs
        if: github.run_attempt != '1'
        run: echo "specs=$(cat failed-specs)" >> $GITHUB_ENV

      - name: Compile CLJS
        run: bun run build-pure:cljs

      - name: Run Metabase
        run: node e2e/runner/run_cypress_ci.js start

      # Export this job's numeric GitHub job id as $JOB_ID for the Cypress runs
      # below (ci-conductor failed-tests reporting reads it in after:spec).
      # Snapshot generation is itself a Cypress run that fires after:spec, so
      # this must precede it. Placed late, not after checkout: the Actions jobs
      # API is eventually consistent, so the longer the job has been alive the
      # more reliably the lookup resolves. JOB_ID exported here persists to the
      # steps below. DEV-1999.
      - uses: ./.github/actions/resolve-job-id

      - name: Generate database snapshots
        env:
          CYPRESS_BROWSER: ${{ steps.cypress-prep.outputs.chrome-path }}
        run: node e2e/runner/run_cypress_ci.js snapshot

      - name: Run auto-split Cypress tests on ${{ inputs.name }}
        id: split-e2e
        if: ${{ !inputs.specs }}
        env:
          SPLIT: ${{ inputs.total_chunks }}
          SPLIT_INDEX: ${{ inputs.split_index }}
          SPLIT_FILE: "./e2e/support/timings.json"
          SPLIT_OUTPUT_FILE: "newTimes.json"
          SPLIT_TIME_THRESHOLD: 0.01 # 1% threshold for changes
          # do not write cypress-split summary to github
          SPLIT_SUMMARY: false
          SPEC_PATH: ${{ env.specs || inputs.specs }}
          CYPRESS_BROWSER: ${{ steps.cypress-prep.outputs.chrome-path }}
        shell: bash
        run: |
          echo "Running tests with specs: $SPEC_PATH"
          node e2e/runner/run_cypress_ci.js e2e \
            --expose grepTags="-@mongo+-@python+-@OSS+-@skip" \
            --spec "$SPEC_PATH"
        # Trunk Quarantine controls the final state of the run in the CI!
        # Even if this step fails we let it pass, and then `trunk-io/analytics-uploader` determines
        # whether to fail or to pass the whole job, based on the quarantine list.
        continue-on-error: true

      - name: Run Tagged EE Cypress tests on ${{ inputs.name }}
        id: tagged-e2e
        if: ${{ inputs.specs }}
        shell: bash
        env:
          SPEC_PATH: ${{ env.specs || inputs.specs }}
          CYPRESS_BROWSER: ${{ steps.cypress-prep.outputs.chrome-path }}
        run: |
          echo "Running tests with specs: $SPEC_PATH"
          node e2e/runner/run_cypress_ci.js e2e \
          --expose grepTags="${{inputs.tags && format('{0}+-@skip', inputs.tags) || '-@mongo+-@python+-@OSS+-@skip'}}" \
          --spec "$SPEC_PATH"
        # Trunk Quarantine controls the final state of the run in the CI!
        # Even if this step fails we let it pass, and then `trunk-io/analytics-uploader` determines
        # whether to fail or to pass the whole job, based on the quarantine list.
        continue-on-error: true

      - name: Rewrite JUnit hook failures
        if: always()
        continue-on-error: true
        timeout-minutes: 1
        shell: bash
        run: |
          if [ -d ./target/junit ]; then
            echo "fix-junit-hooks: invoking bun"
            bun e2e/support/fix-junit-hooks.ts ./target/junit
          else
            echo "No ./target/junit directory; nothing to process."
          fi

      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit
          # Related to our custom upload to S3
          output-name: e2e-${{ inputs.name }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          # Related to Trunk uploader
          variant: e2e-tests
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ inputs.specs && steps.tagged-e2e.outcome || steps.split-e2e.outcome }}

      # Quarantine gate (DEV-2082). Compare this job's ultimate test failures
      # (recorded by after:spec into ./target/quarantine-failures.jsonl) against
      # ci-conductor's quarantine list and decide whether the job should pass:
      # pass if every failure is quarantined, fail if any isn't. This mirrors
      # what Trunk's analytics-uploader does for us today. Runs in dry-run mode
      # for now (QUARANTINE_DRY_RUN defaults to true) — it only prints the
      # verdict and never fails the job. `continue-on-error` is belt-and-braces
      # while it's observational; drop both it and the dry run to enforce.
      - name: Quarantine gate (dry run)
        if: always()
        continue-on-error: true
        timeout-minutes: 2
        shell: bash
        run: bun e2e/support/check-quarantine.ts

      - name: Upload Cypress Artifacts upon failure
        uses: actions/upload-artifact@v7
        if: |
          !cancelled() && (steps.split-e2e.outcome == 'failure' || steps.tagged-e2e.outcome == 'failure')
        with:
          name: cypress-recording-${{ inputs.name }}-${{ inputs.edition }}
          path: |
            ./cypress
            ./logs/test.log
          if-no-files-found: ignore

      - name: Upload Failed Tests
        uses: actions/upload-artifact@v7
        if: |
          !cancelled() && (steps.split-e2e.outcome == 'failure' || steps.tagged-e2e.outcome == 'failure')
        with:
          name: failed-tests-${{ inputs.name }}-${{ inputs.edition }}
          path: ./cypress/test-results
          if-no-files-found: ignore

      - name: Extract chunk-specific changed timings
        id: extract-timings
        if: inputs.split_index >= 0 && github.ref == 'refs/heads/master'
        continue-on-error: true
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const oldTimingsPath = "./e2e/support/timings.json";
            const newTimingsPath = "./e2e/support/newTimes.json";

            if (!fs.existsSync(newTimingsPath)) {
              throw new Error(`newTimes.json not found - cypress-split may not have generated it`);
            }

            if (!fs.existsSync(oldTimingsPath)) {
              throw new Error(`Original timings file ${oldTimingsPath} not found`);
            }

            const oldTimings = fs.existsSync(oldTimingsPath)
              ? JSON.parse(fs.readFileSync(oldTimingsPath, "utf8"))
              : { durations: [] };

            const newTimings = fs.existsSync(newTimingsPath)
              ? JSON.parse(fs.readFileSync(newTimingsPath, "utf8"))
              : { durations: [] };

            const { extractChangedTimings } = require('${{ github.workspace }}/.github/scripts/extract-changed-timings.js');

            const result = extractChangedTimings({ oldTimings, newTimings });

            if (result.hasChanges) {
              core.setOutput('has-changes', 'true');
              fs.writeFileSync('chunkTimings.json', JSON.stringify(result.changedTimings, null, 2));
              console.log(`Extracted ${Object.keys(result.changedTimings).length} changed timings for chunk index ${{ inputs.split_index }}`);
            }

      - name: Upload Timing Data
        uses: actions/upload-artifact@v7
        if: steps.extract-timings.outcome == 'success' && steps.extract-timings.outputs.has-changes == 'true'
        with:
          name: timing-data-${{ inputs.name }}
          path: chunkTimings.json
          retention-days: 1 # gets merged immediately by parent workflow

      - name: Publish Summary
        if: failure()
        uses: actions/github-script@v9
        with:
          script: | #js
            const {
               generateReport,
               parseReport,
               formatSummary
             } = require("./.github/scripts/handle-mochawesome-report.js");

             const report = await generateReport();
             const results = parseReport(report);
             const summary = formatSummary(results);

             await core.summary.addRaw(summary).write();
