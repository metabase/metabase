            dbms: mysql,mariadb
            sql: >-
              UPDATE metabase_field_user_settings AS a
              LEFT JOIN metabase_field AS b ON b.id = a.fk_target_field_id
              SET a.fk_target_field_id = NULL
              WHERE a.fk_target_field_id IS NOT NULL AND b.id IS NULL;
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE metabase_field_user_settings AS a
              SET fk_target_field_id = NULL
              WHERE a.fk_target_field_id IS NOT NULL
                AND NOT EXISTS (SELECT 1 FROM metabase_field b WHERE b.id = a.fk_target_field_id);
      rollback: # no change

  - changeSet:
      id: v63.2026-07-14T00:00:04
      author: ranquild
      comment: Index metabase_field_user_settings.fk_target_field_id
      changes:
        - createIndex:
            tableName: metabase_field_user_settings
            indexName: idx_field_user_settings_fk_target_field_id
            columns:
              - column:
                  name: fk_target_field_id

  - changeSet:
      id: v63.2026-07-14T00:00:05
      author: ranquild
      comment: Add FK constraint on metabase_field_user_settings.fk_target_field_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_field_user_settings
            baseColumnNames: fk_target_field_id
            referencedTableName: metabase_field
            referencedColumnNames: id
            constraintName: fk_field_user_settings_fk_target_ref_field_id
            onDelete: SET NULL

  ## oauth_refresh_token.user_id is documented as an FK to core_user.id and its sibling tables
  ## (oauth_authorization_code, oauth_access_token) got an index + FK when they were created,
  ## but the refresh-token table was left unconstrained. A refresh token whose user is gone is
  ## unusable (and undesirable to keep), so dangling rows are deleted rather than nulled:
  ## user_id NULL is reserved for tokens that were never tied to a user.
  - changeSet:
      id: v63.2026-07-14T00:00:06
      author: ranquild
      comment: Delete oauth_refresh_token rows whose user has been deleted
      changes:
        - sql:
            dbms: mysql,mariadb
            sql: >-
              DELETE a FROM oauth_refresh_token AS a
              LEFT JOIN core_user AS b ON b.id = a.user_id
              WHERE a.user_id IS NOT NULL AND b.id IS NULL;
        - sql:
            dbms: postgresql,h2
            sql: >-
              DELETE FROM oauth_refresh_token
              WHERE user_id IS NOT NULL
                AND user_id NOT IN (SELECT id FROM core_user);
      rollback: # no change

  - changeSet:
      id: v63.2026-07-14T00:00:07
      author: ranquild
      comment: Index oauth_refresh_token.user_id
      changes:
        - createIndex:
            tableName: oauth_refresh_token
            indexName: idx_oauth_refresh_token_user_id
            columns:
              - column:
                  name: user_id

  - changeSet:
      id: v63.2026-07-14T00:00:08
      author: ranquild
      comment: Add FK on oauth_refresh_token.user_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: oauth_refresh_token
            baseColumnNames: user_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_oauth_refresh_token_user_id

  ## pulse_channel.channel_id has had an FK since v51 but never an explicit index; it was
  ## grandfathered into the excluded-fks set of fks-are-indexed-test. The FK is dropped and
  ## re-added around the index creation so the explicit index becomes the FK's backing index on
  ## every database: adding the index while the FK exists would make MySQL adopt it in place of
  ## its auto-generated one, and the rollback's DROP INDEX would then fail with errno 1553.
  - changeSet:
      id: v63.2026-07-14T00:00:09
      author: ranquild
      comment: Drop FK on pulse_channel.channel_id ahead of indexing the column
      changes:
        - dropForeignKeyConstraint:
            baseTableName: pulse_channel
            constraintName: fk_pulse_channel_channel_id
      rollback:
        - addForeignKeyConstraint:
            baseTableName: pulse_channel
            baseColumnNames: channel_id
            referencedTableName: channel
            referencedColumnNames: id
            constraintName: fk_pulse_channel_channel_id
            onDelete: CASCADE

  - changeSet:
      id: v63.2026-07-14T00:00:10
      author: ranquild
      comment: Index pulse_channel.channel_id
      changes:
        - createIndex:
            tableName: pulse_channel
            indexName: idx_pulse_channel_channel_id
            columns:
              - column:
                  name: channel_id

  - changeSet:
      id: v63.2026-07-14T00:00:11
      author: ranquild
      comment: Re-add FK on pulse_channel.channel_id, backed by the new index
      changes:
        - addForeignKeyConstraint:
            baseTableName: pulse_channel
            baseColumnNames: channel_id
            referencedTableName: channel
            referencedColumnNames: id
            constraintName: fk_pulse_channel_channel_id
            onDelete: CASCADE

  ## Polymorphic references (type + id column pairs) can't have FK constraints, but every other
  ## polymorphic pair in the schema (comment, dependency, cache_config, task_run, ...) carries a
  ## composite (type, id) index. These four were missing theirs.
  - changeSet:
      id: v63.2026-07-14T00:00:12
