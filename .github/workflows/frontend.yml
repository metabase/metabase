name: Frontend

on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        default: false
      skip-lint:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      skip:
        description: "Skip main frontend jobs (type-check, unit tests, timezone tests)"
        type: boolean
        default: false
      skip-lint:
        description: "Skip linting jobs (oxfmt, eslint, css variables check)"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}-frontend
  cancel-in-progress: true

env:
  # Consumed by the report-failures-to-ci-conductor step in fe-tests-unit. Absent
  # (e.g. fork PRs without secret access) the reporter no-ops. Matches the other
  # suite workflows (backend, drivers, e2e, app-db, semantic-search).
  CI_CONDUCTOR_BASE_URL: ${{ secrets.CI_CONDUCTOR_BASE_URL }}
  CI_CONDUCTOR_WEBHOOK_SECRET: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}

jobs:
  fe-lint:
    if: ${{ !inputs.skip-lint }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Get Eslint cache key
        uses: ./.github/actions/get-cache-keys
        id: get-cache-keys
      - name: Restore ESLint cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace}}/.eslintcache
          key: ${{ steps.get-cache-keys.outputs.eslint-cache-key }}

      - name: Compile CLJS
        run: bun run build-pure:cljs
      - name: Find CSS variables that are used but never defined
        run: bun run find-never-defined-css-variables
      - name: Run oxfmt formatting linter
        run: bun run lint-format-pure
      - name: Run ESLint linter
        run: bun run lint-eslint-pure
      - name: Run CSS linter
        run: bun run lint-css

  fe-type-check:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - run: bun run build-pure:cljs
        name: Compile CLJS
      - run: bun run type-check-pure
        name: Check types

  fe-tests-unit:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2] # 2 shards for parallel execution
    env:
      SHARDS: 2 # should match matrix above
      JEST_JUNIT_OUTPUT_DIR: ./target/junit
      JEST_JUNIT_OUTPUT_NAME: test-report-frontend-unit.xml
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend
      - name: Resolve current job id
        # Resolve JOB_ID before the long test step so the ci-conductor reporter
        # below can link failures to this exact job. Best-effort.
        uses: ./.github/actions/resolve-job-id
      - name: Run frontend unit tests
        id: fe-tests
        run: bun run test-unit --silent --shard=${{ matrix.shard }}/${{ env.SHARDS }}
        # Keep this step continue-on-error because the quarantine logic controls whether it ultimately fails.
        continue-on-error: true
      - name: Report failed tests to ci-conductor
        if: ${{ !cancelled() && steps.fe-tests.outcome == 'failure' }}
        # This step should NEVER fail the job!
        continue-on-error: true
        uses: ./.github/actions/report-failures-to-ci-conductor
        with:
          test-suite: fe-tests-unit
          adapter: frontend
      - name: Quarantine gate
        if: ${{ !cancelled() && steps.fe-tests.outcome == 'failure' }}
        continue-on-error: ${{ vars.QUARANTINE_ENGINE != 'ci-conductor' }}
        timeout-minutes: 3
        uses: ./.github/actions/quarantine-gate
        with:
          adapter: frontend
          test-suite: fe-tests-unit
          enforce-quarantine: ${{ vars.QUARANTINE_ENGINE == 'ci-conductor' }}
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always() && github.event_name != 'workflow_dispatch'
        with:
          input-path: ./target/junit
          output-name: frontend-unit
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.fe-tests.outcome }}
          run-trunk: ${{ vars.QUARANTINE_ENGINE != 'ci-conductor' }}

  fe-tests-timezones:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend
      - name: Run frontend timezones tests
        run: bun run test-timezones

  fe-tests-result:
    needs:
      - fe-lint
      - fe-type-check
      - fe-tests-unit
      - fe-tests-timezones
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      needs: ${{ toJson(needs) }}
    steps:
      - name: Check frontend job status
        uses: actions/github-script@v7
        env:
          needs: ${{ toJson(needs) }}
        with:
          script: | # js
            const needs = JSON.parse(process.env.needs);
            const jobs = Object.entries(needs).map(
              ([jobName, jobValues]) => ({
                name: jobName,
                result: jobValues.result
              }));

            // are all jobs skipped or successful?
            if (jobs.every(job => (job.result === 'skipped' || job.result === 'success'))) {
              console.log('All jobs are skipped or successful');
              process.exit(0);
            }

            // otherwise, something failed
            console.log('Some frontend jobs failed');
            jobs.forEach((job) => {
              if (job.result !== 'success') {
                console.log(`${job.name} - ${job.result}`);
              }
            });
            process.exit(1);
