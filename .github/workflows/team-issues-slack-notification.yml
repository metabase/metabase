name: Team Issues Slack Notification

on:
  issues:
    types:
      - labeled

jobs:
  on-team-label-added:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    if: |
      contains(github.event.label.name, '.Team/') &&
       ( contains(github.event.issue.labels.*.name, 'Type:Bug') ||
         contains(github.event.issue.labels.*.name, 'flaky-test-fix') )
    steps:
      - name: Setting title
        uses: actions/github-script@v9
        id: vars
        with:
          script: |
            core.setOutput('issue_title', JSON.stringify(${{ toJson(github.event.issue.title) }} + '\n' + ${{ toJson(github.event.issue.html_url) }}));
      - name: Extracting team name
        id: team_name
        env:
          LABEL_NAME: ${{ github.event.label.name }}
        run: |
          team_label=$(sed 's/&/\$/g' <<< "$LABEL_NAME")
          echo "$team_label"
          team_name=${team_label#*.Team/}
          echo "$team_name"
          echo "team_name=${team_name^^}_SLACK_ISSUES_WEBHOOK_URL" >> "$GITHUB_OUTPUT"
      - name: Check webhook secret exists
        id: check_secret
        env:
          WEBHOOK_URL: ${{ secrets[steps.team_name.outputs.team_name] }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "Secret ${{ steps.team_name.outputs.team_name }} is not set, skipping Slack notification"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Send the issue ${{ github.event.issue.number }} to Slack
        if: steps.check_secret.outputs.exists == 'true'
        id: slack
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        with:
          webhook: ${{ secrets[steps.team_name.outputs.team_name] }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ${{ steps.vars.outputs.issue_title }}
                  }
                }
              ]
            }
