# MongoDB Sharded Cluster driver tests. See driver-postgres.yml for the template rationale.
name: Driver Tests - Mongo Sharded Cluster

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: read

jobs:
  decide:
    uses: ./.github/workflows/_driver-decide.yml
    with:
      driver: mongo-sharded-cluster
      workflow-name: ${{ github.workflow }}
    secrets: inherit

  test:
    needs: decide
    if: >-
      !cancelled() &&
      needs.decide.result == 'success' &&
      needs.decide.outputs.conductor-status != 'skip' &&
      (needs.decide.outputs.should-run == 'true' || needs.decide.outputs.quarantine-conflict == 'true')
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 40
    name: MongoDB Sharded Cluster
    env:
      CI: 'true'
      DRIVERS: mongo
    services:
      mongodb:
        image: metabase/mongo-sharded-cluster:6
        ports:
          - "27017:17017"
    steps:
      - name: Fail on quarantine conflict
        if: ${{ needs.decide.outputs.quarantine-conflict == 'true' }}
        run: |
          echo "::error::MongoDB Sharded Cluster driver is quarantined but you changed files in modules/drivers/mongo/"
          echo ""
          echo "Your changes will NOT be tested because the driver is currently quarantined."
          echo "To run MongoDB Sharded Cluster tests, add the label: break-quarantine-mongo-sharded-cluster"
          echo ""
          echo "If you merge without testing, you risk breaking the MongoDB Sharded Cluster driver!"
          exit 1
      - uses: actions/checkout@v6
      - name: Test MongoDB driver (Sharded cluster)
        id: test-driver
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-mongo-sharded-cluster-ee'
          test-args: >-
            :only metabase.driver.mongo.sharded-cluster-test
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        continue-on-error: ${{ needs.decide.outputs.conductor-status == 'info' }}
        with:
          input-path: ./target/junit/
          output-name: be-tests-mongo-sharded-cluster-ee
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.test-driver.outputs.test-outcome }}
      - name: Report result to conductor
        if: always()
        uses: ./.github/actions/conductor-report
        with:
          secret: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}
          status: ${{ needs.decide.outputs.conductor-status }}
          outcome: ${{ steps.test-driver.outputs.test-outcome || job.status }}

  result:
    name: Mongo Sharded Cluster result
    needs: [decide, test]
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/driver-gate
        with:
          decide-result: ${{ needs.decide.result }}
          test-results: ${{ needs.test.result }}
          conductor-status: ${{ needs.decide.outputs.conductor-status }}
