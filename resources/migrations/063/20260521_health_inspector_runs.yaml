## Create a table for health inspector runs

databaseChangeLog:
  - changeSet:
      id: v63.2026-05-21T10:47:00
      author: technomancy
      comment: Create health_inspector_runs table.
      changes:
        - createTable:
            tableName: health_inspector_runs
            remarks: Records status of health inspector runs over time
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: message
                  type: ${text.type}
                  remarks: A message to show to the instance admin.
              - column:
                  name: check_name
                  type: varchar(254)
                  remarks: The name of the check
                  constraints:
                    nullable: false
              - column:
                  name: run_at
                  type: ${timestamp_type}
                  remarks: When it was run
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: health
                  type: int
                  remarks: Health as a percentage out of 100
                  constraints:
                    nullable: false
