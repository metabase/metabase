name: Run tests

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  # Single decision point: combines file-pattern filters (dorny) and
  # module-affected test selection (node) into one job so every downstream
  # consumer reads "what runs and why" from one place. The node step is
  # PR-only because it needs base/head SHAs to compute a diff; on push and
  # merge_group, downstream gates fall back to dorny outputs alone.
  decide-what-runs:
    if: ${{ !contains(github.event.pull_request.labels.*.name,'ci skip') && !contains(github.event.pull_request.labels.*.name,'minimal-tests') }}
    name: Decide what runs
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      e2e_all: ${{ steps.changes.outputs.e2e_all }}
      e2e_all_files: ${{ steps.changes.outputs.e2e_all_files }}
      e2e_specs: ${{ steps.changes.outputs.e2e_specs }}
      e2e_specs_files: ${{ steps.changes.outputs.e2e_specs_files }}
      backend_all: ${{ steps.changes.outputs.backend_all }}
      frontend_all: ${{ steps.changes.outputs.frontend_all }}
      frontend_sources: ${{ steps.changes.outputs.frontend_sources }}
      documentation: ${{ steps.changes.outputs.documentation }}
      embedding_documentation: ${{ steps.changes.outputs.embedding_documentation }}
      embedding_sdk_components: ${{ steps.changes.outputs.embedding_sdk_components }}
      embedding_sdk_host_sample_apps: ${{ steps.changes.outputs.embedding_sdk_host_sample_apps }}
      embedding_sdk_ci: ${{ steps.changes.outputs.embedding_sdk_ci }}
      custom_viz_all: ${{ steps.changes.outputs.custom_viz_all }}
      stats: ${{ steps.compute.outputs.stats }}
      unit_tests_to_run: ${{ steps.compute.outputs.unit_tests_to_run }}
      loki_stories_to_run: ${{ steps.compute.outputs.loki_stories_to_run }}
      e2e_tests_to_run: ${{ steps.compute.outputs.e2e_tests_to_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so the node step's base..head diff resolves.
          # dorny shallow-fetches on its own and is fine either way.
          fetch-depth: 0
      - name: Test which files changed
        uses: dorny/paths-filter@0bc4621a3135347011ad047f9ecf449bf72ce2bd # v3.0.0
        id: changes
        with:
          token: ${{ github.token }}
          # comma separated list of files
          list-files: csv
          filters: .github/file-paths.yaml
      - name: Compute module-affected test selection
        id: compute
        if: ${{ github.event_name == 'pull_request' }}
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          OUTPUT=$(node .github/scripts/affected-tests-stats.js)
          echo "$OUTPUT" | jq '.stats'
          echo "stats=$(echo "$OUTPUT" | jq -c '.stats')" >> $GITHUB_OUTPUT
          echo "unit_tests_to_run=$(echo "$OUTPUT" | jq -c '.unit_tests_to_run')" >> $GITHUB_OUTPUT
          echo "loki_stories_to_run=$(echo "$OUTPUT" | jq -c '.loki_stories_to_run')" >> $GITHUB_OUTPUT
          echo "e2e_tests_to_run=$(echo "$OUTPUT" | jq -c '.e2e_tests_to_run')" >> $GITHUB_OUTPUT

  upload-test-selection-stats:
    needs: decide-what-runs
    # Only land rows for the upstream repo so forks don't pollute the table.
    if: ${{ !cancelled() && needs.decide-what-runs.result == 'success' && github.event.pull_request.head.repo.full_name == 'metabase/metabase' }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        env:
          STATS_JSON: ${{ needs.decide-what-runs.outputs.stats }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          API_KEY: ${{ secrets.STATS_API_KEY }}
        with:
          script: | # js
            const { uploadCsvToMb } = require('${{ github.workspace }}/.github/scripts/csv-to-mb.js');

            const stats = JSON.parse(process.env.STATS_JSON);
            console.log('stats', stats);

            const row = {
              'Date': new Date().toISOString(),
              'PR': Number(process.env.PR_NUMBER),
              'Head SHA': process.env.HEAD_SHA,
              'Base SHA': process.env.BASE_SHA,
              'Modules Changed': stats.modules_directly_touched,
              'Modules affected': stats.modules_affected,
              'FE Unit tests total': stats.unit_tests_total,
              'FE Unit tests run': stats.unit_tests_to_run,
              'FE Unit tests skipped': stats.unit_tests_to_skip,
              'Loki stories total': stats.loki_stories_total,
              'Loki stories run': stats.loki_stories_to_run,
              'Loki stories skipped': stats.loki_stories_to_skip,
              'E2E tests total': stats.e2e_tests_total,
              'E2E tests run': stats.e2e_tests_to_run,
              'E2E tests skipped': stats.e2e_tests_to_skip,
            };

            uploadCsvToMb({
              baseUrl: 'https://stats.metabase.com',
              tableId: 0, // TODO: replace with the real table id once provisioned in stats.metabase.com
              jsonData: [row],
              mode: 'append',
            }).then(() => {
              console.log('Data uploaded successfully');
            }).catch((error) => {
              console.error('Error uploading data:', error);
              process.exit(1);
            });

  uberjar:
    needs: [decide-what-runs]
    if: ${{ !cancelled() && !(needs.decide-what-runs.outputs.documentation == 'true' && needs.decide-what-runs.outputs.backend_all == 'false' && needs.decide-what-runs.outputs.frontend_all == 'false' && needs.decide-what-runs.outputs.e2e_all == 'false') }}
    uses: ./.github/workflows/uberjar.yml
    secrets: inherit

  backend-tests:
    if: ${{ !cancelled() && needs.decide-what-runs.result == 'success' }}
    needs: [decide-what-runs]
    uses: ./.github/workflows/backend.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.backend_all != 'true' }}

  semantic-search-tests:
    needs: decide-what-runs
    uses: ./.github/workflows/semantic-search.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.backend_all != 'true' }}

  app-db-tests:
    needs: decide-what-runs
    uses: ./.github/workflows/app-db.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.backend_all != 'true' }}

  driver-tests:
    needs: decide-what-runs
    uses: ./.github/workflows/drivers.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.backend_all != 'true' }}

  frontend-tests:
    needs: [decide-what-runs]
    if: ${{ !cancelled() && needs.decide-what-runs.result == 'success' }}
    uses: ./.github/workflows/frontend.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.frontend_all != 'true' }}
      skip-lint: ${{ needs.decide-what-runs.outputs.frontend_all != 'true' && needs.decide-what-runs.outputs.e2e_all != 'true' }}
      skip-custom-viz: ${{ needs.decide-what-runs.outputs.custom_viz_all != 'true' }}
      unit-tests-to-run: ${{ needs.decide-what-runs.outputs.unit_tests_to_run || '' }}

  e2e-tests:
    needs: [decide-what-runs, uberjar]
    # Skip e2e tests when the uberjar build failed or was cancelled — the
    # downstream tests can't fetch a missing artifact, and we don't want to
    # mask the uberjar failure with a wave of misleading e2e errors. We still
    # enter the workflow when uberjar is `skipped` (docs-only PRs), because
    # the inner `skip` input handles that path and reports the required
    # `e2e-tests-result` check as success. When the uberjar genuinely failed,
    # this whole job is skipped, the inner required checks never report, and
    # branch protection blocks the merge as pending.
    if: |
      always() && !cancelled() &&
      needs.decide-what-runs.result == 'success' &&
      needs.uberjar.result != 'failure' &&
      needs.uberjar.result != 'cancelled'
    uses: ./.github/workflows/e2e-tests.yml
    secrets: inherit
    with:
      skip: ${{ needs.decide-what-runs.outputs.e2e_all != 'true' }}
      # here we pass the list of changed files, comma separated
      # e.g. e2e/test/scenarios/onboarding/command-palette.cy.spec.js,e2e/test/scenarios/question/document-title.cy.spec.js
      # e2e_all_files includes all changes which trigger all e2e tests, if the list of changes files is included in the
      # list of changed specs files, then only specs are changed and we can run only those specs
      specs: ${{ needs.decide-what-runs.outputs.e2e_all_files == needs.decide-what-runs.outputs.e2e_specs_files && needs.decide-what-runs.outputs.e2e_specs_files || '' }}

  embedding-sdk-package:
    needs: [decide-what-runs]
    if: |
      !cancelled() &&
      (needs.decide-what-runs.outputs.embedding_sdk_components == 'true' ||
      needs.decide-what-runs.outputs.frontend_sources == 'true' ||
      needs.decide-what-runs.outputs.embedding_documentation == 'true' ||
      needs.decide-what-runs.outputs.embedding_sdk_ci == 'true' ||
      needs.decide-what-runs.outputs.embedding_sdk_host_sample_apps == 'true')
    uses: ./.github/workflows/embedding-sdk-package-build.yml
    secrets: inherit

  sdk-tests:
    needs: [uberjar, embedding-sdk-package, decide-what-runs]
    if: always() && !cancelled()
    uses: ./.github/workflows/embedding-sdk.yml
    secrets: inherit
    with:
      bundle-size-check: ${{ github.event_name == 'pull_request' && needs.uberjar.result == 'success' && needs.decide-what-runs.outputs.frontend_sources == 'true' }}
      cli-snippets-type-check: ${{ needs.decide-what-runs.outputs.frontend_sources == 'true' }}
      docs-snippets-type-check: ${{ needs.decide-what-runs.outputs.embedding_documentation == 'true' }}
      documentation-validation: ${{ needs.decide-what-runs.outputs.frontend_sources == 'true' }}
      component-tests: ${{ needs.decide-what-runs.outputs.embedding_sdk_components == 'true' }}
      host-sample-apps-tests: ${{ needs.decide-what-runs.outputs.embedding_sdk_host_sample_apps == 'true' }}
      skip: ${{ needs.embedding-sdk-package.result != 'success' || needs.uberjar.result != 'success' }}

  pr-env:
    needs: [uberjar]
    if: |
      !cancelled() &&
      contains(github.event.pull_request.labels.*.name, 'PR-Env') &&
      !contains(github.event.pull_request.labels.*.name, 'PR-Env-self-hosting') &&
      !contains(github.event.pull_request.labels.*.name, 'PR-Env-analytics-dev')
    uses: ./.github/workflows/pr-env.yml
    secrets: inherit
    with:
      self_hosting: false
      analytics_dev_mode: false

  pr-env-self-hosting:
    needs: [uberjar]
    if: |
      !cancelled() &&
      contains(github.event.pull_request.labels.*.name, 'PR-Env-self-hosting')
    uses: ./.github/workflows/pr-env.yml
    secrets: inherit
    with:
      self_hosting: true
      analytics_dev_mode: false

  pr-env-analytics-dev:
    needs: [uberjar]
    if: |
      !cancelled() &&
      contains(github.event.pull_request.labels.*.name, 'PR-Env-analytics-dev')
    uses: ./.github/workflows/pr-env.yml
    secrets: inherit
    with:
      self_hosting: false
      analytics_dev_mode: true

  containerize:
    needs: [uberjar]
    if: |
      !cancelled() &&
      needs.uberjar.result == 'success' &&
      (
        (github.event_name == 'push' && contains(fromJson('["master", "metabot-v3-main", "internal-tools"]'), github.ref_name)) ||
        (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'build-docker-uberjar'))
      )
    uses: ./.github/workflows/containerize-uberjar.yml
    secrets: inherit
