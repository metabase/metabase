name: Prepare Node + Bun environment
description: "Set up Node.js and Bun for CI jobs"
inputs:
  node-version:
    description: "The version of Node.js to use, overriding .nvmrc"
    required: false
runs:
  using: "composite"
  steps:
    - name: Prepare Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ".nvmrc"

    - name: Install bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: "1.3.7"
        token: ${{ github.token }}
