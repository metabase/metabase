# Rename metabot_conversation.summary to title now that the value is used as a
# generated conversation title.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-08T00:00:00
      author: sloansparger
      comment: Rename metabot_conversation.summary to title
      changes:
        - sql: DROP VIEW IF EXISTS v_metabot_conversations
        - renameColumn:
            tableName: metabot_conversation
            oldColumnName: summary
            newColumnName: title
            columnDataType: ${text.type}
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/metabot_conversations/v4/postgres-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/metabot_conversations/v4/mysql-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/metabot_conversations/v4/h2-metabot_conversations.sql
            relativeToChangelogFile: true
      rollback:
        - sql: DROP VIEW IF EXISTS v_metabot_conversations
        - renameColumn:
            tableName: metabot_conversation
            oldColumnName: title
            newColumnName: summary
            columnDataType: ${text.type}
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/metabot_conversations/v3/postgres-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/metabot_conversations/v3/mysql-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/metabot_conversations/v3/h2-metabot_conversations.sql
            relativeToChangelogFile: true
