## Collapse redundant table-level data_permissions rows into db-level rows.
##
## A bug in the new-table default-permissions path ("going granular") deleted a group's db-level row and
## wrote one row per table even when the db-level row was already `blocked` and every table's new value was
## `blocked`. On instances with many databases and groups this ballooned data_permissions into tens of
## millions of rows encoding no information beyond their db-level equivalents, which in turn caused
## OOMs in code paths that read a user's or the whole instance's permission rows (#76077).
##
## Two steps, both restricted to perms/view-data and semantically lossless:
##   1. For each (group_id, db_id) with no db-level view-data row whose table-level view-data rows ALL
##      carry the value 'blocked' — including rows referencing inactive tables, so collapsing never
##      discards a value a reactivated table would otherwise pick back up — and cover every active table
##      of the database: insert the equivalent db-level row.
##   2. Drop every table-level view-data row whose (group_id, db_id, perm_value) matches a db-level
##      row — such rows are redundant no matter how they came to be. Because that can be tens of millions
##      of rows, this is done by rebuilding the table with only the surviving rows rather than a row-by-row
##      DELETE (which scales super-linearly); see the second changeSet for the per-engine mechanism.
##
## Restricted to view-data / blocked because:
##   - only the least-permissive value is safe to collapse at all: table-level rows are ignored for
##     inactive tables (they read as least-permissive), while a db-level row applies to inactive tables
##     too, so collapsing any other value would silently upgrade inactive tables;
##   - the permissions graph API intentionally reports other perm types' table-level rows as granular
##     even when uniform (#73520), so collapsing them would change what the admin UI displays;
##   - the going-granular bug only ever produced view-data rows, so this still covers the explosion.
##
## Combos with partial table coverage, mixed values, or a uniform non-blocked value are intentionally
## left untouched.
##
## Lives in 060 (the oldest backported release) so the same changeSet is shared across all versions >= 60.

databaseChangeLog:
  - logicalFilePath: migrations/060_update_migrations.yaml

  - changeSet:
      id: v60.2026-07-07T00:00:00
      author: ranquild
      comment: Insert db-level data_permissions rows for uniform full-coverage blocked table-level view-data permissions (#76077)
      changes:
        - sql:
            sql: >-
              INSERT INTO data_permissions (group_id, perm_type, db_id, perm_value)
              SELECT dp.group_id, dp.perm_type, dp.db_id, MIN(dp.perm_value)
              FROM data_permissions dp
              LEFT JOIN metabase_table mt ON mt.id = dp.table_id
              JOIN (SELECT db_id, COUNT(*) AS n FROM metabase_table WHERE active = TRUE GROUP BY db_id) tc
                ON tc.db_id = dp.db_id
              WHERE dp.perm_type = 'perms/view-data'
                AND dp.table_id IS NOT NULL
                AND NOT EXISTS (
                  SELECT 1 FROM data_permissions dbp
                  WHERE dbp.group_id = dp.group_id
                    AND dbp.db_id = dp.db_id
                    AND dbp.perm_type = dp.perm_type
                    AND dbp.table_id IS NULL)
              GROUP BY dp.group_id, dp.db_id, dp.perm_type, tc.n
              HAVING COUNT(DISTINCT dp.perm_value) = 1
                 AND MIN(dp.perm_value) = 'blocked'
                 AND COUNT(DISTINCT CASE WHEN mt.active = TRUE THEN dp.table_id END) = tc.n;
      rollback: # not necessary; the collapsed representation is understood by all versions >= 49

  - changeSet:
      id: v60.2026-07-07T00:00:01
      author: ranquild
      comment: Drop table-level data_permissions rows made redundant by an equal-value db-level row, keeping only the surviving rows (#76077)
      changes:
        # The rows to keep are every data_permissions row EXCEPT the table-level view-data rows that a
        # db-level row of the same (group, db, value) has made redundant — the anti-join below. Deleting the
        # redundant rows directly scales super-linearly on a table ballooned to tens of millions of rows
        # (each delete maintains six index trees), so instead of a DELETE we retain the few thousand
        # survivors and discard the rest wholesale.
        #
        # Postgres has transactional DDL, so we rebuild the contents in place: stage the survivors, TRUNCATE,
        # reload. It all runs in the changeSet's transaction, so a failure rolls back and data_permissions is
        # never left empty. TRUNCATE keeps the id sequence, and the table (hence its indexes and FKs) is
        # never dropped.
        - sql:
            dbms: postgresql
            sql: >-
              CREATE TABLE data_permissions_collapse_keep AS
              SELECT dp.id, dp.group_id, dp.perm_type, dp.db_id, dp.schema_name, dp.table_id, dp.perm_value
              FROM data_permissions dp
              LEFT JOIN data_permissions dbp
                ON dp.perm_type = 'perms/view-data' AND dp.table_id IS NOT NULL
               AND dbp.group_id = dp.group_id AND dbp.db_id = dp.db_id
               AND dbp.perm_type = dp.perm_type AND dbp.perm_value = dp.perm_value
               AND dbp.table_id IS NULL
              WHERE dbp.id IS NULL;
        - sql:
            dbms: postgresql
            sql: TRUNCATE TABLE data_permissions;
        - sql:
            dbms: postgresql
            sql: >-
              INSERT INTO data_permissions (id, group_id, perm_type, db_id, schema_name, table_id, perm_value)
              SELECT id, group_id, perm_type, db_id, schema_name, table_id, perm_value
              FROM data_permissions_collapse_keep;
        - sql:
            dbms: postgresql
            sql: DROP TABLE data_permissions_collapse_keep;
        # MySQL/MariaDB auto-commit DDL, so an in-place TRUNCATE+reload would expose a window where
        # data_permissions is empty. Instead build a sibling table of just the survivors and swap it in with
        # an atomic RENAME, so data_permissions always resolves to a complete table. CREATE TABLE ... LIKE
        # copies the columns, primary key, indexes and AUTO_INCREMENT base but NOT foreign keys, so the three
        # FKs are recreated explicitly — dropped from the old table first to free the (schema-unique)
        # constraint names.
        - sql:
            dbms: mysql,mariadb
            sql: CREATE TABLE data_permissions_collapse_new LIKE data_permissions;
        - sql:
            dbms: mysql,mariadb
            sql: >-
              INSERT INTO data_permissions_collapse_new
                (id, group_id, perm_type, db_id, schema_name, table_id, perm_value)
              SELECT dp.id, dp.group_id, dp.perm_type, dp.db_id, dp.schema_name, dp.table_id, dp.perm_value
              FROM data_permissions dp
              LEFT JOIN data_permissions dbp
                ON dp.perm_type = 'perms/view-data' AND dp.table_id IS NOT NULL
               AND dbp.group_id = dp.group_id AND dbp.db_id = dp.db_id
               AND dbp.perm_type = dp.perm_type AND dbp.perm_value = dp.perm_value
               AND dbp.table_id IS NULL
              WHERE dbp.id IS NULL;
        - sql:
            dbms: mysql,mariadb
            sql: >-
              ALTER TABLE data_permissions
                DROP FOREIGN KEY fk_data_permissions_ref_permissions_group,
                DROP FOREIGN KEY fk_data_permissions_ref_db_id,
                DROP FOREIGN KEY fk_data_permissions_ref_table_id;
        - sql:
            dbms: mysql,mariadb
            sql: >-
              ALTER TABLE data_permissions_collapse_new
                ADD CONSTRAINT fk_data_permissions_ref_permissions_group FOREIGN KEY (group_id) REFERENCES permissions_group (id) ON DELETE CASCADE,
                ADD CONSTRAINT fk_data_permissions_ref_db_id FOREIGN KEY (db_id) REFERENCES metabase_database (id) ON DELETE CASCADE,
                ADD CONSTRAINT fk_data_permissions_ref_table_id FOREIGN KEY (table_id) REFERENCES metabase_table (id) ON DELETE CASCADE;
        - sql:
            dbms: mysql,mariadb
            sql: >-
              RENAME TABLE data_permissions TO data_permissions_collapse_old,
                           data_permissions_collapse_new TO data_permissions;
        - sql:
            dbms: mysql,mariadb
            sql: DROP TABLE data_permissions_collapse_old;
        # H2 backs only embedded, single-node instances, which never reach the sizes that make the delete
        # expensive, so keep the straightforward delete.
        - sql:
            dbms: h2
            sql: >-
              DELETE FROM data_permissions
              WHERE perm_type = 'perms/view-data'
                AND table_id IS NOT NULL
                AND EXISTS (
                  SELECT 1 FROM data_permissions dbp
                  WHERE dbp.group_id = data_permissions.group_id
                    AND dbp.db_id = data_permissions.db_id
                    AND dbp.perm_type = data_permissions.perm_type
                    AND dbp.perm_value = data_permissions.perm_value
                    AND dbp.table_id IS NULL);
      rollback: # not necessary; the collapsed representation is understood by all versions >= 49
