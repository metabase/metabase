## Add target_table_id FK to transform and table FKs on workspace input/output columns

databaseChangeLog:

  - changeSet:
      id: v61.2026-03-10T00:00:00
      author: christruter
      comment: Add target_table_id column to transform table
      preConditions:
        - onFail: MARK_RAN
        - not:
            changeSetExecuted:
              id: v60.2026-03-10T00:00:00
              author: christruter
              changeLogFile: migrations/060_update_migrations.yaml
      changes:
        - addColumn:
            tableName: transform
            columns:
              - column:
                  name: target_table_id
                  type: int
                  remarks: FK to metabase_table for the transform's target table
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: transform
            columnName: target_table_id

  - changeSet:
      id: v61.2026-03-10T00:00:10
      author: christruter
      comment: Add index on transform.target_table_id
      preConditions:
        - onFail: MARK_RAN
        - not:
            changeSetExecuted:
              id: v60.2026-03-10T00:00:10
              author: christruter
              changeLogFile: migrations/060_update_migrations.yaml
      changes:
        - createIndex:
            tableName: transform
            indexName: idx_transform_target_table_id
            columns:
              - column:
                  name: target_table_id

  - changeSet:
      id: v61.2026-03-10T00:00:20
      author: christruter
      comment: Add FK from transform.target_table_id to metabase_table with SET NULL
      preConditions:
        - onFail: MARK_RAN
        - not:
            changeSetExecuted:
              id: v60.2026-03-10T00:00:20
              author: christruter
              changeLogFile: migrations/060_update_migrations.yaml
      changes:
        - addForeignKeyConstraint:
            baseTableName: transform
            baseColumnNames: target_table_id
            constraintName: fk_transform_target_table_id
            referencedTableName: metabase_table
            referencedColumnNames: id
            onDelete: SET NULL
      rollback:
        - dropForeignKeyConstraint:
            baseTableName: transform
            constraintName: fk_transform_target_table_id

  - changeSet:
      id: v61.2026-03-10T00:00:30
      author: christruter
      comment: Backfill transform.target_table_id from target JSON column
