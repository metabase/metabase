name: Trigger Release End-to-End
run-name: Auto ${{ inputs.kind }} release for v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Major Metabase version (e.g. 45, 52, 68)"
        type: number
        required: true
      kind:
        description: "Release kind"
        type: choice
        required: true
        options:
          - patch
          - minor
      override_sha:
        description: DANGEROUSLY allow releasing from this commit sha, regardless of the state of CI (can be empty)
        type: string
        required: false
        default: ""

# This workflow only runs on dispatch. Given a major version and a kind, it
# infers the next patch or minor to cut and kicks off that release. Cron
# scheduling lives in the schedule-* trigger workflows, which decide what to
# release and when.
jobs:
  auto-release-trigger:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            release
            .github
      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts
      - name: Trigger auto-release
        uses: actions/github-script@v7
        env:
          SLACK_RELEASE_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const {
              getLatestGreenCommit,
              getNextVersion,
              hasCommitBeenReleased,
              sendAutoReleaseFailureMessage,
            } = require('${{ github.workspace }}/release/dist/index.cjs');

            async function dispatchRelease({ kind, majorVersion, overrideSha }) {
              const nextVersion = await getNextVersion({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                majorVersion,
                kind,
              });

              const releaseCommit = overrideSha || await getLatestGreenCommit({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: `release-x.${majorVersion}.x`,
              });

              const hasBeenReleased = await hasCommitBeenReleased({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: releaseCommit,
                majorVersion: Number(majorVersion),
              });

              console.log({ kind, majorVersion, nextVersion, releaseCommit, hasBeenReleased });

              if (nextVersion && releaseCommit && !hasBeenReleased) {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'tag-for-release.yml',
                  ref: 'refs/heads/master',
                  inputs: {
                    commit: releaseCommit,
                    version: nextVersion,
                  }
                }).catch(console.error);
                return;
              }

              const reason = !nextVersion
                ? 'no-next-version'
                : !releaseCommit
                  ? 'no-green-commit'
                  : 'already-released';

              console.error(`Auto-${kind} skipped for v${majorVersion}: ${reason}`);

              await sendAutoReleaseFailureMessage({
                channelName: '${{ vars.SLACK_RELEASE_CHANNEL }}',
                kind,
                majorVersion,
                reason,
                runId: '${{ github.run_id }}',
                owner: context.repo.owner,
                repo: context.repo.repo,
              }).catch(console.error);
            }

            const inputVersion = Number(context.payload.inputs.version);
            const kind = String(context.payload.inputs.kind ?? '');

            if (Number.isNaN(inputVersion)) {
              throw new Error(`Invalid version number: ${context.payload.inputs.version}`);
            }
            if (kind !== 'patch' && kind !== 'minor') {
              throw new Error(`Invalid kind: ${kind}`);
            }

            const overrideSha = String(context.payload?.inputs?.override_sha ?? '').trim();
            const isValidOverride = overrideSha.length === 40;

            if (!isValidOverride && overrideSha.length > 0) {
              throw new Error(`Invalid override SHA provided: ${overrideSha}`);
            }

            await dispatchRelease({
              kind,
              majorVersion: inputVersion,
              overrideSha: isValidOverride ? overrideSha : undefined,
            });
