## Persist Metabot message feedback
##
## One row per `(message, submitter)`. A shared Slack thread can yield multiple
## submissions on the same assistant message (each participant submits
## independently), so the table is keyed by a surrogate `id` PK with a unique
## constraint on `(message_id, user_id)`.

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml

  - changeSet:
      id: v61.2026-04-17T10:00:00
      author: sloansparger
      comment: metabot_feedback table
      changes:
        - createTable:
            tableName: metabot_feedback
            remarks: User feedback - positive/negative w/ optional reason + comment
            columns:
              - column:
                  name: id
                  type: int
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                  remarks: Surrogate PK
              - column:
                  name: message_id
                  type: int
                  constraints:
                    nullable: false
                    referencedTableName: metabot_message
                    referencedColumnNames: id
                    foreignKeyName: fk_metabot_feedback_message_id
                    deleteCascade: true
                  remarks: 'FK to metabot_message.id'
              - column:
                  name: user_id
                  type: int
                  constraints:
                    nullable: false
                  remarks: 'The Metabase user who submitted the feedback. Unconstrained int (matches metabot_message.user_id precedent) so audit rows survive user deletion.'
              - column:
                  name: positive
                  type: ${boolean.type}
                  constraints:
                    nullable: false
                  remarks: 'true = thumbs up, false = thumbs down'
              - column:
                  name: issue_type
                  type: varchar(64)
                  constraints:
                    nullable: true
                  remarks: 'Optional structured issue category (e.g. "ui-bug", "not-factual")'
              - column:
                  name: freeform_feedback
                  type: ${text.type}
                  constraints:
                    nullable: true
                  remarks: 'Optional freeform comment'
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
                  remarks: 'When the feedback was submitted'
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
                  remarks: 'When the feedback was last updated'
        - addUniqueConstraint:
            tableName: metabot_feedback
            columnNames: message_id, user_id
            constraintName: uq_metabot_feedback_message_id_user_id
