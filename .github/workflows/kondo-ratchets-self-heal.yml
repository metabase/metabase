name: Kondo Ratchets Self-Heal

# Removing an ignore doesn't require touching .clj-kondo/ratchets.edn, so PRs accumulate slack.
# This commits the lowered budgets back to the PR branch, same pattern as the OpenAPI check.
on:
  pull_request:
    paths:
      - "**.clj"
      - "**.cljc"
      - "**.cljs"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ratchet-down:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    # fork PRs don't get the automation token, so we couldn't push to them anyway
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          # METABASE_AUTOMATION_USER_TOKEN so the self-healing commit triggers CI
          # (a GITHUB_TOKEN push would not)
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - name: Lower ignore budgets to match the source tree
        run: ./bin/mage fix-kondo-ratchets
      - name: Commit to the PR branch if any budget decreased
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          if git diff --quiet .clj-kondo/ratchets.edn; then
            echo "budgets already tight"
            exit 0
          fi
          git config --global user.name "Metabase Automation"
          git config --global user.email "github-automation@metabase.com"
          git add .clj-kondo/ratchets.edn
          git commit -m "Ratchet down kondo ignore budgets" --no-verify
          git push origin "HEAD:$PR_BRANCH"
