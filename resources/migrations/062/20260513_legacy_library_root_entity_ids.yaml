## Backfill canonical entity IDs for legacy Library root collections

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml

  - changeSet:
      id: v62.2026-05-13T11:00:00
      author: andsalves
      comment: >-
        This migration has been patched to resolve a mismatch collation issue on MySQL/MariaDB, @see #75458.
        To update it without breaking the checkSum rules, we replace the original changeset ids and delete the
        original ids from databasechangelog to keep the migration history clean.
        As these migrations are idempotent, we won't have problems if we need to rollback instances.
      changes:
        - sql:
            sql: >-
              DELETE FROM ${databasechangelog.name} WHERE id IN (
                'v62.2026-05-13T11:59:58',
                'v62.2026-05-13T11:59:59',
                'v62.2026-05-13T12:00:00',
                'v62.2026-05-13T12:00:01',
                'v62.2026-05-13T12:00:02'
              );
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T11:00:01
      author: andsalves
      comment: Backfill type column value for Library collections
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET type = 'library'
              WHERE entity_id = 'librarylibrarylibrary' AND (type IS NULL OR type <> 'library');

              UPDATE collection
              SET type = 'library-data'
              WHERE entity_id = 'librarylibrarydatadat' AND (type IS NULL OR type <> 'library-data');

              UPDATE collection
              SET type = 'library-metrics'
              WHERE entity_id = 'librarylibrarymetrics' AND (type IS NULL OR type <> 'library-metrics');
      rollback:
        - empty: {}
  - changeSet:
      id: v62.2026-05-13T11:00:02
      author: andsalves
      comment: Make sure the root collection with library type and canonical entity_id is unique
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET type = NULL
              WHERE type = 'library' AND location = '/' AND entity_id != 'librarylibrarylibrary'
                AND EXISTS (
                  SELECT 1 FROM (
                    SELECT entity_id FROM collection WHERE entity_id = 'librarylibrarylibrary'
                  ) existing
                );
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T11:00:03
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library root collection
      changes:
        - sql:
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarylibrary'
              WHERE type = 'library' AND location = '/'
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T11:00:04
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library Data section
      changes:
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarydatadat'
              WHERE type = 'library-data'
                AND location IN (
                  SELECT loc FROM (
                    SELECT '/' || CAST(id AS VARCHAR) || '/' AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-data'
                      AND child.location IN (
                        SELECT '/' || CAST(lib.id AS VARCHAR) || '/'
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
        - sql:
            dbms: mysql,mariadb
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarydatadat'
              WHERE type = 'library-data'
                AND location IN (
                  SELECT loc FROM (
                    SELECT CONCAT('/', CAST(id AS CHAR), '/') COLLATE utf8mb4_unicode_ci AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-data'
                      AND child.location IN (
                        SELECT CONCAT('/', CAST(lib.id AS CHAR), '/') COLLATE utf8mb4_unicode_ci
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
      rollback:
        - empty: {}

  - changeSet:
      id: v62.2026-05-13T11:00:05
      author: andsalves
      comment: Backfill canonical entity_id for legacy Library Metrics section
      changes:
        - sql:
            dbms: postgresql,h2
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarymetrics'
              WHERE type = 'library-metrics'
                AND location IN (
                  SELECT loc FROM (
                    SELECT '/' || CAST(id AS VARCHAR) || '/' AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-metrics'
                      AND child.location IN (
                        SELECT '/' || CAST(lib.id AS VARCHAR) || '/'
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
        - sql:
            dbms: mysql,mariadb
            sql: >-
              UPDATE collection
              SET entity_id = 'librarylibrarymetrics'
              WHERE type = 'library-metrics'
                AND location IN (
                  SELECT loc FROM (
                    SELECT CONCAT('/', CAST(id AS CHAR), '/') COLLATE utf8mb4_unicode_ci AS loc
                    FROM collection
                    WHERE type = 'library' AND location = '/'
                  ) lib_loc
                )
                AND 1 = (
                  SELECT cnt FROM (
                    SELECT COUNT(*) AS cnt
                    FROM collection child
                    WHERE child.type = 'library-metrics'
                      AND child.location IN (
                        SELECT CONCAT('/', CAST(lib.id AS CHAR), '/') COLLATE utf8mb4_unicode_ci
                        FROM collection lib
                        WHERE lib.type = 'library' AND lib.location = '/'
                      )
                  ) x
                )
      rollback:
        - empty: {}
