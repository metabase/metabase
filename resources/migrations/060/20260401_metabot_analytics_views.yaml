## Create analytics views for AI/Metabot usage tracking.
## These views expose conversation, message, and usage data in the
## Internal Metabase Database for admin analytics.

databaseChangeLog:
  - logicalFilePath: migrations/060_update_migrations.yaml

  - changeSet:
      id: v60.2026-04-01T10:00:00
      author: noahmoss
      comment: Create v_metabot_conversations view for AI analytics
      changes:
        - sqlFile:
            dbms: postgresql
            path: ../instance_analytics_views/metabot_conversations/v1/postgres-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: mysql,mariadb
            path: ../instance_analytics_views/metabot_conversations/v1/mysql-metabot_conversations.sql
            relativeToChangelogFile: true
        - sqlFile:
            dbms: h2
            path: ../instance_analytics_views/metabot_conversations/v1/h2-metabot_conversations.sql
            relativeToChangelogFile: true
      rollback:
        - sql: DROP VIEW IF EXISTS v_metabot_conversations

