name: Update Product Notifications

on:
  push:
    # branches: FIXME testing
    #   - master
    paths:
      - ".github/data/notifications.json"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  upload-notifications:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    # don't run this workflow for forks
    if: ${{ github.event_name != 'push' || github.repository == 'metabase/metabase' }}
    steps:
      - uses: actions/checkout@v6
      - name: Validate notifications.json
        # Fail before touching AWS if the feed is malformed — a bad file would break the fetch on every instance.
        run: jq empty .github/data/notifications.json
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
        with:
          role-to-assume: ${{ secrets.CI_RELEASE_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Upload notifications.json to static.metabase.com
        run: |
          aws s3 cp \
          .github/data/notifications.json \
          s3://${{ vars.AWS_S3_STATIC_BUCKET }}/notifications.json \
          --content-type application/json
      - name: Create cloudfront invalidation
        run: |
          aws cloudfront create-invalidation \
          --distribution-id ${{ vars.AWS_CLOUDFRONT_STATIC_ID }} \
          --paths "/notifications.json"
