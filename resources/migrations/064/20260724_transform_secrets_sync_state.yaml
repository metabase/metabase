## Ingestion support for python transforms: `secrets` holds an encrypted JSON map of env vars
## (e.g. API tokens) injected into the python runner subprocess; `sync_state` holds the opaque
## JSON cursor blob a connector-style transform returns to resume incremental syncs.

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-24T10:00:00
      author: bronsa
      comment: Add transform.secrets
      changes:
        - addColumn:
            tableName: transform
            columns:
              - column:
                  name: secrets
                  type: ${text.type}
                  remarks: Encrypted JSON map of secret env vars passed to python transform runs
                  constraints:
                    nullable: true

  - changeSet:
      id: v64.2026-07-24T10:00:01
      author: bronsa
      comment: Add transform.sync_state
      changes:
        - addColumn:
            tableName: transform
            columns:
              - column:
                  name: sync_state
                  type: ${text.type}
                  remarks: Opaque JSON sync state returned by ingestion-style python transform runs
                  constraints:
                    nullable: true
