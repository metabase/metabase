# ClickHouse workspace.
#
# ClickHouse emits 2-part `db.table` natively (qualified-name-components is
# [:schema]). The warehouse calls its top level a "database" but the slot
# in our addressing scheme is named :schema - slot names follow AST
# positions, not warehouse vocabulary. ClickHouse's "database" lives at
# the same AST position as Postgres's "schema."
version: 1
config:
  databases:
  - name: test-data (clickhouse)
    engine: clickhouse
    details:
      host: localhost
      port: 8123
      dbname: prod_events
      user: mb__isolation_44490_1933
      password: not-a-real-password
  users:
  - first_name: Workspace
    last_name: Admin
    email: workspace@workspace.local
    password: password1
  workspace:
    name: New workspace
    databases:
      test-data (clickhouse):
        input_schemas:
        - prod_events
        output:
          schema: ws_alice
