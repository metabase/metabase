# UNVERIFIED (EMB-1518 scaffold): the `pull_request` trigger below and the
# switch from hardcoded version/dist-tag logic to reading
# enterprise/frontend/src/embedding-sdk-package/package.template.json's
# `sdkRelease` block have not been run or reviewed by the embedding team
# (Nicolo/Roman) yet - this can only really be verified by triggering a real
# release. See .github/workflows/sdk-version-bump-pr.yml for step 1 of the
# new two-step process.
#
# MIGRATION NOTE: this workflow file (with the pull_request trigger and the
# sdkRelease-reading logic) only exists on branches it's been merged/ported
# to. A release branch cut before this change has neither this trigger nor
# the sdkRelease field - merging a `sdk-release-trigger` PR there is a silent
# no-op (nothing fires) rather than an error. Releasing from such a branch
# needs this whole workflow file (plus sdk-version-bump-pr.yml) backported to
# it first, not just the package.template.json field. It also needs a
# concrete semver `version` in package.template.json before its first bump -
# branches that went gold under the pre-EMB-1518 after-gold checklist have a
# `0.N.x` placeholder there instead, which sdk-version-bump-pr.yml's bump
# step now rejects with a clear error rather than failing silently.
name: Release Metabase Embedding SDK for React
run-name: Release SDK from ${{ github.event_name == 'workflow_dispatch' && github.ref_name || github.event.pull_request.base.ref }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Not used for anything - select the actual branch/tag to release from using the 'Use workflow from' picker above this form when dispatching manually."
        type: string
        required: false
  # Step 2 of the new release process: merging a version-bump PR (opened by
  # sdk-version-bump-pr.yml, labeled `sdk-release-trigger`) triggers a release
  # of whatever branch that PR targeted. See `prepare-release` below.
  #
  # The `paths` filter keeps this from creating a run for every PR closed
  # anywhere in the repo - version-bump PRs always touch package.template.json,
  # so this is a reliable pre-filter ahead of the label/merge check below.
  pull_request:
    types: [closed]
    paths:
      - enterprise/frontend/src/embedding-sdk-package/package.template.json

concurrency:
  # We want to ensure only one job is running at a time per branch because
  # there could be a conflict when updating the readme file. The group is
  # only ever a real release-branch group for the two triggers that actually
  # run a release (workflow_dispatch, or a merged sdk-release-trigger PR) -
  # any other pull_request event gets its own unique, harmless group keyed by
  # run id, since `prepare-release`'s `if:` already no-ops the rest of the
  # jobs for it. This also stops a stray PR-closed event from cancelling an
  # in-flight release: cancel-in-progress is disabled, so two real releases
  # queued back-to-back on the same branch run one after another instead of
  # the first being killed mid-publish.
  group: >-
    ${{
      github.event_name == 'workflow_dispatch' && format('{0}-{1}', github.workflow, github.ref_name) ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'sdk-release-trigger')) && format('{0}-{1}', github.workflow, github.event.pull_request.base.ref) ||
      format('{0}-{1}', github.workflow, github.run_id)
    }}
  cancel-in-progress: false

jobs:
  # Gates the whole workflow: either a manual workflow_dispatch, or a merged
  # PR carrying the sdk-release-trigger label. Every other job depends
  # (directly or transitively) on this one, so if it's skipped the rest of
  # the run is skipped too - no separate `if:` needed on downstream jobs.
  prepare-release:
    name: Prepare release trigger
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'sdk-release-trigger'))
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      branch: ${{ steps.resolve.outputs.branch }}
    steps:
      - name: Resolve target branch
        id: resolve
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.event.pull_request.base.ref }}" >> "$GITHUB_OUTPUT"
          fi

  workflow-summary:
    name: Log inputs
    needs: prepare-release
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - name: Generate workflow summary
        env:
          BRANCH: ${{ needs.prepare-release.outputs.branch }}
        run: |
          tee -a $GITHUB_STEP_SUMMARY << EOF
          **Inputs:**

          - \`branch\`: $BRANCH
          - \`trigger\`: ${{ github.event_name }}

          triggered by: @${{ github.event.sender.login }}
          EOF

  send-slack-notification-start:
    name: "Send Slack notification: SDK release started"
    needs: read-sdk-release-metadata
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      slackMessageId: ${{ steps.send-slack-message-start.outputs.result }}
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            release
            .github

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Cache build scripts
        uses: actions/upload-artifact@v7
        with:
          name: build-scripts
          path: release/dist/index.cjs

      - name: Send build start message
        id: send-slack-message-start
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          result-encoding: string
          script: | # js
            const { mentionUserByGithubLogin, sendSlackMessage, githubRunLink } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";

            const title = `:rocket: *SDK release: ${sdkVersion}* :rocket:`
            const runLink = githubRunLink(
              `:building_construction: _CI Run_ :building_construction:`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );
            const body = `${runLink} - run by ${mentionUserByGithubLogin("${{ github.event.sender.login }}")}`
            const sendSlackMessageResponse = await sendSlackMessage({
              channelName: 'team-embedding-releases',
              message: `${title}\n${body}`,
            });

            return sendSlackMessageResponse.message.ts

  # Technically this should be placed last, since it runs after other jobs, but I want to co-locate all Slack jobs
  send-slack-notification-failure:
    name: "Send Slack notification: SDK release failed"
    needs:
      [
        "read-sdk-release-metadata",
        "send-slack-notification-start",
        "check-git-tag",
        "test",
        "build-sdk",
        "publish-npm",
        "tag-latest",
        "git-tag",
      ]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      slackMessageId: ${{ needs.send-slack-notification-start.outputs.slackMessageId }}
    if: ${{ always() && contains(needs.*.result, 'failure') }}
    steps:
      # Built fresh here (rather than downloading the `build-scripts` artifact
      # like the start/successful jobs do) because this job also has to fire
      # when read-sdk-release-metadata itself fails - e.g. a release branch
      # that predates the sdkRelease metadata block - in which case
      # send-slack-notification-start (the job that uploads that artifact)
      # never ran, so the artifact would never exist to download.
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            release
            .github

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Send build failure message
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const { githubRunLink, sendSlackReply, sendSlackMessage } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";
            // Quoted (not interpolated bare) because this is empty when
            // read-sdk-release-metadata itself failed - send-slack-notification-start
            // (which sets this) never ran in that case, so there's no thread
            // to reply to. An unquoted `messageId: ${{ env.slackMessageId }}`
            // would render as `messageId: ,` here - a JS syntax error - which
            // is exactly the scenario this failure job exists to alert on.
            const messageId = "${{ env.slackMessageId }}";

            const runLink = githubRunLink(
              `:x: ${sdkVersion} Release has failed`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );

            if (messageId) {
              sendSlackReply({
                channelName: 'team-embedding-releases',
                message: runLink,
                messageId,
                broadcast: true,
              });
            } else {
              sendSlackMessage({
                channelName: 'team-embedding-releases',
                message: runLink,
              });
            }

  send-slack-notification-successful:
    name: "Send Slack notification: SDK release successful"
    needs:
      ["read-sdk-release-metadata", "send-slack-notification-start", "publish-npm"]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    env:
      slackMessageId: ${{ needs.send-slack-notification-start.outputs.slackMessageId }}
    steps:
      - name: Retrieve build scripts
        uses: actions/download-artifact@v8
        with:
          name: build-scripts
          path: release/dist/

      - name: Send build successful message
        uses: actions/github-script@v9
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const { githubRunLink, sendSlackReply } = require('${{ github.workspace }}/release/dist/index.cjs');
            const sdkVersion = "${{ needs.read-sdk-release-metadata.outputs.sdk_version }}";

            const runLink = githubRunLink(
              `:partydeploy: ${sdkVersion} Release is complete :partydeploy:`,
              context.runId,
              context.repo.owner,
              context.repo.repo,
            );
            sendSlackReply({
              channelName: 'team-embedding-releases',
              message: runLink,
              messageId: ${{ env.slackMessageId}},
              broadcast: true
            });

  # Reads the version + release metadata straight from package.template.json
  # instead of computing them (the version and sdkRelease.distTag/tagAsLatest
  # are already correct on this branch, because sdk-version-bump-pr.yml wrote
  # them there and a human reviewed them before merging).
  read-sdk-release-metadata:
    name: Read SDK release metadata
    needs: prepare-release
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    outputs:
      sdk_version: ${{ steps.metadata.outputs.sdk_version }}
      major_version: ${{ steps.metadata.outputs.major_version }}
      dist_tag: ${{ steps.metadata.outputs.dist_tag }}
      tag_as_latest: ${{ steps.metadata.outputs.tag_as_latest }}
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Read version and sdkRelease metadata
        id: metadata
        run: |
          FILE=enterprise/frontend/src/embedding-sdk-package/package.template.json
          VERSION=$(jq -r '.version' "$FILE")
          DIST_TAG=$(jq -r '.sdkRelease.distTag // empty' "$FILE")
          TAG_AS_LATEST=$(jq -r '.sdkRelease.tagAsLatest // false' "$FILE")
          MAJOR_VERSION=$(echo "$VERSION" | cut -d. -f2)

          if [ -z "$DIST_TAG" ]; then
            echo "::error::$FILE is missing sdkRelease.distTag - this branch predates the sdkRelease metadata block (EMB-1518) and needs it added (via sdk-version-bump-pr.yml or manually) before it can be released."
            exit 1
          fi

          {
            echo "sdk_version=$VERSION"
            echo "major_version=$MAJOR_VERSION"
            echo "dist_tag=$DIST_TAG"
            echo "tag_as_latest=$TAG_AS_LATEST"
          } >> "$GITHUB_OUTPUT"

      - name: Append workflow summary
        run: |
          tee -a $GITHUB_STEP_SUMMARY << EOF
          **SDK release metadata (from package.template.json):**

          - \`version\`: "${{ steps.metadata.outputs.sdk_version }}"
          - \`major_version\`: "${{ steps.metadata.outputs.major_version }}"
          - \`distTag\`: "${{ steps.metadata.outputs.dist_tag }}"
          - \`tagAsLatest\`: "${{ steps.metadata.outputs.tag_as_latest }}"
          EOF

  check-git-tag:
    needs: [prepare-release, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    env:
      tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: check tags
        run: |
          if [ $(git tag -l | grep $tag$) ]
          then
            echo "::error::Tag '${{ env.tag }}' already exists. If you expect to run this workflow with the same tag, please remove the tag first and rerun this workflow again."
            exit 1
          else
            exit 0
          fi

  test:
    needs: [prepare-release, check-git-tag]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      - name: Run unit tests
        run: bun run embedding-sdk:test-unit

  build-sdk:
    needs: [prepare-release, test]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare front-end environment
        uses: ./.github/actions/prepare-frontend

      - name: Prepare back-end environment
        uses: ./.github/actions/prepare-backend

      # No version bump here anymore: package.template.json's version is
      # already correct on this branch (bumped by sdk-version-bump-pr.yml
      # before merge), so we build with it as-is.
      - name: Build SDK package
        run: bun run build-embedding-sdk-package

      - name: Generate SDK package.json in the build directory
        run: bun run embedding-sdk:generate-package

      - name: Upload built SDK package as artifact
        uses: actions/upload-artifact@v7
        with:
          name: metabase-sdk
          path: ./resources/embedding-sdk

  publish-npm:
    needs: [prepare-release, build-sdk, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    permissions:
      id-token: write # OIDC handshake for npm trusted publishing
      actions: read # actions/download-artifact reads the Actions API via GITHUB_TOKEN
      pull-requests: write # gh pr review --approve step uses GITHUB_TOKEN
    env:
      sdk_version: ${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
      branch: ${{ needs.prepare-release.outputs.branch }}
    steps:
      # The README references specific version numbers (e.g. download links)
      # that only matter for stable/beta release branches, not master's
      # rolling alpha channel - so this whole follow-up PR is skipped on
      # master (there's nothing left for it to update, since the version
      # bump itself already happened, and was reviewed, before this run).
      - name: Check out branch to prepare a README update PR
        if: needs.prepare-release.outputs.branch != 'master'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          ref: ${{ env.branch }}

      - name: Setup git user
        if: needs.prepare-release.outputs.branch != 'master'
        run: |
          git config --global user.email "github-automation@metabase.com"
          git config --global user.name "Metabase Automation"

      - name: Update readme
        if: needs.prepare-release.outputs.branch != 'master'
        run: |
          bash ./bin/embedding-sdk/release_utils.bash update_readme ${{ env.sdk_version }}

      - name: Create a PR updating the readme (using GitHub Metabase Automation account)
        if: needs.prepare-release.outputs.branch != 'master'
        id: readme-pr
        run: |
          # Nothing to do if the readme was already up to date (e.g. a re-run) -
          # `git commit` with no diff would otherwise fail the job and fire a
          # false "release failed" Slack alert. The `skipped` output lets the
          # follow-up steps below (which assume a PR exists on the current
          # branch) no-op too, instead of failing when they can't find one.
          if git diff --quiet; then
            echo "Readme already up to date, skipping PR."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -b update-sdk-readme-${{ env.sdk_version }}

          COMMIT_MSG="docs(sdk): Update Readme version references to ${{ env.sdk_version }}"
          PR_TITLE="docs(sdk): Update SDK readme to ${{ env.sdk_version }}"
          PR_BODY="Update Readme version references to ${{ env.sdk_version }}"

          git commit -a -m "$COMMIT_MSG"
          git push origin HEAD
          gh pr create --base "$branch" \
                       --assignee "${GITHUB_ACTOR}" \
                       --title "$PR_TITLE" \
                       --body "$PR_BODY"
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Edit PR adding useful information (using Metabase bot app)
        if: needs.prepare-release.outputs.branch != 'master' && steps.readme-pr.outputs.skipped != 'true'
        # metabase/embedding team is added automatically as code owner of updated `package.template.json` file
        run: |
          gh pr edit --add-reviewer albertoperdomo --add-label no-backport
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Auto approve PR (using GitHub Actions account)
        if: needs.prepare-release.outputs.branch != 'master' && steps.readme-pr.outputs.skipped != 'true'
        run: |
          gh pr review --approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable Pull request auto-merge (using GitHub Metabase Automation account)
        if: needs.prepare-release.outputs.branch != 'master' && steps.readme-pr.outputs.skipped != 'true'
        run: |
          gh pr merge --auto --squash
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Retrieve build SDK package artifact
        uses: actions/download-artifact@v8
        with:
          name: metabase-sdk
          path: sdk

      # Trusted publishing requires npm >= 11.5.1 and Node >= 22.14.0.
      # Node 22.x line bundles npm 10.x, so pin Node 24.x which ships npm 11.x.
      - name: Setup Node.js for npm publish with trusted publishing
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish to NPM
        working-directory: sdk
        run: |
          TAG="${{ needs.read-sdk-release-metadata.outputs.dist_tag }}"
          echo "Resolved npm tag: $TAG"
          npm publish --tag "$TAG"

  tag-latest:
    name: Tag npm release as latest
    # Driven by package.template.json's sdkRelease.tagAsLatest instead of a
    # hardcoded `if: false` that had to be hand-edited (uncommented) once a
    # branch went gold - see sdk-version-bump-pr.yml, which is where a human
    # sets this to true when appropriate.
    if: ${{ needs.read-sdk-release-metadata.outputs.tag_as_latest == 'true' }}
    needs: [publish-npm, read-sdk-release-metadata]
    uses: ./.github/workflows/embedding-sdk-tag-latest.yml
    with:
      version: ${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
    secrets: inherit

  git-tag:
    needs: [prepare-release, publish-npm, read-sdk-release-metadata]
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    env:
      tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.sdk_version }}
      stable_tag: embedding-sdk-${{ needs.read-sdk-release-metadata.outputs.major_version }}-stable
    steps:
      - name: Check out the code using the provided branch
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          ref: ${{ needs.prepare-release.outputs.branch }}

      - name: Setup git user
        run: |
          git config --global user.email "github-automation@metabase.com"
          git config --global user.name "Metabase Automation"

      - name: Create and push SDK version tag
        run: |
          git tag -a ${{ env.tag }} -m "Tagging SDK version ${{ env.tag }}"
          git push origin ${{ env.tag }}

      - name: Create and push SDK stable version tag
        if: ${{ startsWith(needs.prepare-release.outputs.branch, 'release-x.') }}
        run: |
          git tag -a -f ${{ env.stable_tag }} -m "Tagging SDK stable version ${{ env.stable_tag }}"
          git push origin -f ${{ env.stable_tag }}
