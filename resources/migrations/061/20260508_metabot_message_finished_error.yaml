## Track per-assistant-turn outcome on metabot_message: was the turn aborted (finished=false) or did it error (error text set).

databaseChangeLog:
  - logicalFilePath: migrations/061_update_migrations.yaml

  - changeSet:
      id: v61.2026-05-08T10:00:00
      author: sloansparger
      comment: Add finished column to metabot_message to flag client-aborted assistant turns
      changes:
        - addColumn:
            tableName: metabot_message
            columns:
              - column:
                  name: finished
                  type: ${boolean.type}
                  defaultValueBoolean: true
                  remarks: True for completed assistant turns; false only when the client aborted mid-stream.
                  constraints:
                    nullable: false

  - changeSet:
      id: v61.2026-05-08T10:00:01
      author: sloansparger
      comment: Add error column to metabot_message capturing the failure reason for errored assistant turns
      changes:
        - addColumn:
            tableName: metabot_message
            columns:
              - column:
                  name: error
                  type: ${text.type}
                  remarks: Error payload from the agent's error stream part.
                  constraints:
                    nullable: true
