name: Backport label guard

# Backport labels (`backport`, `single-backport`, `double-backport`, `triple-backport`) only act on PRs
# targeting master: auto-backport.yml and backport-reminder.yml are both master-scoped. On a release-branch
# PR they do nothing, so fail loudly rather than let the author assume a backport was queued. `was-backported`
# (carried by auto-created backport PRs) is deliberately not matched — `contains` is an exact element match,
# so it never fires for `was-backported` or `no-backport`.
#
# The job is gated on base != master rather than a branch filter, so a PR retargeted master<->release
# re-checks and clears any stale result; on a master PR the job just skips. GitHub runs pull_request
# workflows from the PR head, so this only fires where the file is present in head — it guards a release
# line's PRs once backported there. Keep the check non-required.
on:
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, edited]  # edited: re-check after base change

jobs:
  guard:
    if: >
      github.event.pull_request.base.ref != 'master' && (
        contains(github.event.pull_request.labels.*.name, 'backport') ||
        contains(github.event.pull_request.labels.*.name, 'single-backport') ||
        contains(github.event.pull_request.labels.*.name, 'double-backport') ||
        contains(github.event.pull_request.labels.*.name, 'triple-backport')
      )
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    steps:
      - name: Fail on a fan-out backport label
        run: |
          echo "::error::Backport labels only act on PRs targeting master; this PR targets ${{ github.base_ref }}, where they do nothing. Land the change on master and label that PR instead. (Auto-created backports carry 'was-backported', which is fine here.)"
          exit 1
