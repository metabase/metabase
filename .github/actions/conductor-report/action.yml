name: Conductor result report
description: >-
  Report a driver workflow's outcome to ci-conductor
  (conductor.metaba.be/api/config). Best-effort and non-fatal — never changes
  the job result. No-ops when no secret is configured.

inputs:
  secret:
    description: >-
      Shared ci-conductor secret, sent as the x-internal-secret header. Pass
      ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}. When empty the report no-ops.
    required: false
    default: ""
  status:
    description: The status this job ran under — skip | info | required.
    required: true
  outcome:
    description: The test outcome — success | failure | cancelled | skipped.
    required: true
  workflow-name:
    description: The conductor key for this workflow (defaults to the workflow name).
    required: false
    default: ${{ github.workflow }}
  api-url:
    description: Override the conductor API base URL (defaults to production).
    required: false
    default: ""
  dry-run:
    description: When 'true', log the payload instead of POSTing it.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Report outcome to ci-conductor
      shell: bash
      env:
        CI_CONDUCTOR_WEBHOOK_SECRET: ${{ inputs.secret }}
        CI_CONDUCTOR_WORKFLOW: ${{ inputs.workflow-name }}
        CI_CONDUCTOR_STATUS: ${{ inputs.status }}
        CI_CONDUCTOR_OUTCOME: ${{ inputs.outcome }}
        CI_CONDUCTOR_API_URL: ${{ inputs.api-url }}
        CI_CONDUCTOR_DRY_RUN: ${{ inputs.dry-run }}
        REPO_ID: ${{ github.event.repository.id }}
        COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        TARGET_BRANCH: ${{ github.event.pull_request.base.ref || github.ref_name }}
      run: bash "$GITHUB_WORKSPACE/.github/scripts/conductor/report-result.sh"
