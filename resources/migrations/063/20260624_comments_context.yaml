databaseChangeLog:
  - changeSet:
      id: v63.2026-06-24T00:00:00
      author: kevinkelleher12
      comment: Add context column to comment table for storing comment context metadata
      changes:
        - addColumn:
            tableName: comment
            columns:
              - column:
                  name: context
                  type: ${text.type}
                  remarks: Optional context metadata about the comment (e.g., active timeline for exploration comments)
                  constraints:
                    nullable: true
