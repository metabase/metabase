agent: claude

post_create:
  # Pull latest changes from origin so the worktree matches the PR commit (only if branch tracks a remote)
  - bash -c 'git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1 && git pull --ff-only || echo "No upstream branch — skipping pull"'
  # Apply bot.patch so the worktree has the bot tooling (mage tasks, etc.) even if the PR branch doesn't
  - bash -c 'MAIN=$(git rev-parse --git-common-dir | sed "s|/\\.git$||"); "$MAIN/bin/mage" -nvoxland-setup-worktree --worktree "$PWD"'
  # Write PR-env config (URL, PR#, creds) and cache a session token from the remote instance
  - ./bin/mage -bot-pr-env-setup --url {{PR_ENV_URL}} --pr {{PR_NUM}}
  # Bot hooks (workmux-status hooks.json)
  - ./bin/mage -bot-setup --bot {{BOT_NAME}}

pre_remove: []

panes:
  - command: <agent>
    focus: true

  - command: mise x -- ./bin/mage -bot-status .bot/autobot/llm-status.txt
    split: vertical
    size: 10
