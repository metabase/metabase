name: Redis Tests

on:
  workflow_call:
    inputs:
      skip:
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}-redis
  cancel-in-progress: true

jobs:
  redis-tests:
    if: ${{ !inputs.skip }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        version:
          - name: Redis 7
            junit-name: redis-tests-7
            redis-image: redis:7-alpine
        job:
          - name: Redis Tests
            build-static-viz: false
            test-args: >-
              :only '["test/metabase/mq/queue/redis_test.clj" "test/metabase/mq/backend_parity_test.clj"]'
            exclude-tag: ':mb/driver-tests'

    services:
      redis:
        image: ${{ matrix.version.redis-image }}
        ports:
          - "6379:6379"
    env:
      # The `mq-redis-*` settings default to redis://localhost:6379 with no auth, which matches
      # the service container above — no per-setting env vars needed.
      CI: 'true'
    name: "${{ matrix.version.name }} ${{ matrix.job.name }}"
    steps:
      - uses: actions/checkout@v4
      - name: Test ${{ matrix.version.name }}
        id: test-driver
        uses: ./.github/actions/test-driver
        with:
          build-static-viz: ${{ matrix.job.build-static-viz }}
          junit-name: ${{ matrix.version.junit-name }}
          test-args: >-
            ${{ matrix.job.test-args }}
            :exclude-tags '[${{ matrix.job.exclude-tag }}]'
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        with:
          input-path: ./target/junit/
          output-name: ${{ github.job }}
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.test-driver.outputs.test-outcome }}
