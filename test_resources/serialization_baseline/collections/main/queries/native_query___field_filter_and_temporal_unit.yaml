dataset_query:
  database: Sample Database
  stages:
  - native: |-
      SELECT {{created_at}} AS period, PRODUCTS.CATEGORY, COUNT(*) AS cnt
      FROM ORDERS
      JOIN PRODUCTS ON ORDERS.PRODUCT_ID = PRODUCTS.ID
      WHERE {{category_filter}}
        AND {{date_filter}}
      GROUP BY {{created_at}}, PRODUCTS.CATEGORY
