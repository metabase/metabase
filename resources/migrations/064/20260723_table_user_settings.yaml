## Adds metabase_table_user_settings, a mirror table of metabase_table that records the values a
## user has explicitly set through the UI (as opposed to values authored by sync). Follows the
## pattern of metabase_field_user_settings (v55.2025-06-23T11:29:00).

databaseChangeLog:
  - changeSet:
      id: v64.2026-07-23T10:00:00
      author: ranquild
      comment: Add metabase_table_user_settings
      changes:
        - createTable:
            tableName: metabase_table_user_settings
            remarks: Mirror table of metabase_table to keep track of user-set values (only settable fields are mirrored)
            columns:
              - column:
                  remarks: The related Table
                  name: table_id
                  type: int
                  constraints:
                    primaryKey: true
                    nullable: false
                    referencedTableName: metabase_table
                    referencedColumnNames: id
                    foreignKeyName: fk_table_user_settings_table_id
                    deleteCascade: true
              - column:
                  name: created_at
                  remarks: The timestamp of when the user setting was created
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  remarks: The timestamp of when the user setting was updated
                  type: ${timestamp_type}
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  remarks: User-set display_name for the Table
                  name: display_name
                  type: varchar(254)
              - column:
                  remarks: User-set description for the Table
                  name: description
                  type: ${text.type}
              - column:
                  remarks: User-set entity_type for the Table
                  name: entity_type
                  type: varchar(254)
              - column:
                  remarks: User-set visibility_type for the Table
                  name: visibility_type
                  type: varchar(254)
              - column:
                  remarks: User-set field_order for the Table
                  name: field_order
                  type: varchar(254)
              - column:
                  remarks: User-set caveats for the Table
                  name: caveats
                  type: ${text.type}
              - column:
                  remarks: User-set points_of_interest for the Table
                  name: points_of_interest
                  type: ${text.type}
              - column:
                  remarks: User-set show_in_getting_started for the Table
                  name: show_in_getting_started
                  type: ${boolean.type}
              - column:
                  remarks: User-set collection_id for the Table
                  name: collection_id
                  type: int
              - column:
                  remarks: User-set data_layer for the Table
                  name: data_layer
                  type: varchar(254)
              - column:
                  remarks: User-set data_authority for the Table
                  name: data_authority
                  type: varchar(20)
              - column:
                  remarks: User-set data_source for the Table
                  name: data_source
                  type: varchar(254)
              - column:
                  remarks: User-set owner_email for the Table
                  name: owner_email
                  type: ${text.type}
              - column:
                  remarks: User-set owner_user_id for the Table
                  name: owner_user_id
                  type: int

  ## The indexes are created before the FK constraints: MySQL/MariaDB require an index to back
  ## every FK and reuse an existing one, so this keeps rollback working (the FK is dropped before
  ## the index it would otherwise still need). Postgres doesn't auto-index FKs, which is what
  ## fks-are-indexed-test checks for.
  - changeSet:
      id: v64.2026-07-23T10:00:01
      author: ranquild
      comment: Index metabase_table_user_settings.collection_id
      changes:
        - createIndex:
            tableName: metabase_table_user_settings
            indexName: idx_table_user_settings_collection_id
            columns:
              - column:
                  name: collection_id

  - changeSet:
      id: v64.2026-07-23T10:00:02
      author: ranquild
      comment: Add FK constraint on metabase_table_user_settings.collection_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_table_user_settings
            baseColumnNames: collection_id
            referencedTableName: collection
            referencedColumnNames: id
            constraintName: fk_table_user_settings_collection_id
            onDelete: SET NULL

  - changeSet:
      id: v64.2026-07-23T10:00:03
      author: ranquild
      comment: Index metabase_table_user_settings.owner_user_id
      changes:
        - createIndex:
            tableName: metabase_table_user_settings
            indexName: idx_table_user_settings_owner_user_id
            columns:
              - column:
                  name: owner_user_id

  - changeSet:
      id: v64.2026-07-23T10:00:04
      author: ranquild
      comment: Add FK constraint on metabase_table_user_settings.owner_user_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: metabase_table_user_settings
            baseColumnNames: owner_user_id
            referencedTableName: core_user
            referencedColumnNames: id
            constraintName: fk_table_user_settings_owner_user_id
            onDelete: SET NULL

  ## Backfill: record existing values that are clearly user edits (nothing but a user ever writes
  ## them, or the current value provably deviates from what the system would have written):
  ##   - caveats, points_of_interest, owner_email, owner_user_id: only ever written by users.
  ##   - collection_id: set by publishing, a user action.
  ##   - field_order = 'custom': only set when a user manually reorders fields.
  ##   - data_authority <> 'unconfigured': 'unconfigured' is the insert default; anything else is a user edit.
  ##   - visibility_type <> 'cruft': sync only ever writes 'cruft'; other values come from the admin UI.
  ##   - data_layer: recorded alongside a user-set visibility_type (the two are kept in sync), or on
  ##     its own when it deviates from the defaults with no visibility_type ('internal' is the insert
  ##     default, 'hidden'/'copper' pair with hidden visibility values).
  ##   - display_name: inserts default it to the humanized table name and nothing updates it after,
  ##     so a deviation is a user rename. The SQL approximates the :simple humanization strategy
  ##     (case-insensitive, separators replaced by spaces; consecutive separators produce a rare
  ##     false positive where we record a system value as user-set, which is harmless). When the
  ##     instance uses the :none strategy, display_name defaults to the name verbatim instead.
  ## Deliberately NOT backfilled, since sync or other system processes also write them and the
  ## current value cannot be attributed: description (database comments), entity_type
  ## (classification), data_source (transforms).
  ## The audit/instance-analytics database is excluded: its display names are curated by Metabase
  ## itself. created_at/updated_at are omitted so their current_timestamp defaults apply.
  ## The three sql blocks are identical except for the reserved setting.key column, which each
  ## database quotes differently (bare on postgres, "KEY" on h2, backticks on mysql/mariadb) — same
  ## dbms-split precedent as the enable-public-sharing preconditions in 001_update_migrations.yaml.
  - changeSet:
      id: v64.2026-07-23T10:00:05
      author: ranquild
      comment: Backfill metabase_table_user_settings from clearly user-edited table values
      changes:
        - sql:
            dbms: postgresql
            sql: >-
              INSERT INTO metabase_table_user_settings
                (table_id, display_name, caveats, points_of_interest, visibility_type, data_layer,
                 collection_id, owner_email, owner_user_id, data_authority, field_order)
              SELECT
                t.id,
                CASE WHEN (SELECT count(*) FROM setting
                           WHERE setting.key = 'humanization-strategy' AND setting.value = 'none') > 0
                     THEN CASE WHEN t.display_name <> t.name THEN t.display_name END
                     ELSE CASE WHEN lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                               THEN t.display_name END
                END,
                t.caveats,
                t.points_of_interest,
                CASE WHEN t.visibility_type <> 'cruft' THEN t.visibility_type END,
                CASE WHEN (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                       OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                     THEN t.data_layer END,
                t.collection_id,
                t.owner_email,
                t.owner_user_id,
                CASE WHEN t.data_authority <> 'unconfigured' THEN t.data_authority END,
                CASE WHEN t.field_order = 'custom' THEN t.field_order END
              FROM metabase_table t
              WHERE t.db_id NOT IN (SELECT d.id FROM metabase_database d WHERE d.is_audit = TRUE)
                AND (t.caveats IS NOT NULL
                  OR t.points_of_interest IS NOT NULL
                  OR t.collection_id IS NOT NULL
                  OR t.owner_email IS NOT NULL
                  OR t.owner_user_id IS NOT NULL
                  OR t.field_order = 'custom'
                  OR (t.data_authority IS NOT NULL AND t.data_authority <> 'unconfigured')
                  OR (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                  OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                  OR (t.display_name IS NOT NULL AND
                      CASE WHEN (SELECT count(*) FROM setting
                                 WHERE setting.key = 'humanization-strategy' AND setting.value = 'none') > 0
                           THEN t.display_name <> t.name
                           ELSE lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                      END))
        - sql:
            dbms: h2
            sql: >-
              INSERT INTO metabase_table_user_settings
                (table_id, display_name, caveats, points_of_interest, visibility_type, data_layer,
                 collection_id, owner_email, owner_user_id, data_authority, field_order)
              SELECT
                t.id,
                CASE WHEN (SELECT count(*) FROM setting
                           WHERE setting."KEY" = 'humanization-strategy' AND setting."VALUE" = 'none') > 0
                     THEN CASE WHEN t.display_name <> t.name THEN t.display_name END
                     ELSE CASE WHEN lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                               THEN t.display_name END
                END,
                t.caveats,
                t.points_of_interest,
                CASE WHEN t.visibility_type <> 'cruft' THEN t.visibility_type END,
                CASE WHEN (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                       OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                     THEN t.data_layer END,
                t.collection_id,
                t.owner_email,
                t.owner_user_id,
                CASE WHEN t.data_authority <> 'unconfigured' THEN t.data_authority END,
                CASE WHEN t.field_order = 'custom' THEN t.field_order END
              FROM metabase_table t
              WHERE t.db_id NOT IN (SELECT d.id FROM metabase_database d WHERE d.is_audit = TRUE)
                AND (t.caveats IS NOT NULL
                  OR t.points_of_interest IS NOT NULL
                  OR t.collection_id IS NOT NULL
                  OR t.owner_email IS NOT NULL
                  OR t.owner_user_id IS NOT NULL
                  OR t.field_order = 'custom'
                  OR (t.data_authority IS NOT NULL AND t.data_authority <> 'unconfigured')
                  OR (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                  OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                  OR (t.display_name IS NOT NULL AND
                      CASE WHEN (SELECT count(*) FROM setting
                                 WHERE setting."KEY" = 'humanization-strategy' AND setting."VALUE" = 'none') > 0
                           THEN t.display_name <> t.name
                           ELSE lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                      END))
        - sql:
            dbms: mysql,mariadb
            sql: >-
              INSERT INTO metabase_table_user_settings
                (table_id, display_name, caveats, points_of_interest, visibility_type, data_layer,
                 collection_id, owner_email, owner_user_id, data_authority, field_order)
              SELECT
                t.id,
                CASE WHEN (SELECT count(*) FROM setting
                           WHERE setting.`key` = 'humanization-strategy' AND setting.value = 'none') > 0
                     THEN CASE WHEN t.display_name <> t.name THEN t.display_name END
                     ELSE CASE WHEN lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                               THEN t.display_name END
                END,
                t.caveats,
                t.points_of_interest,
                CASE WHEN t.visibility_type <> 'cruft' THEN t.visibility_type END,
                CASE WHEN (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                       OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                     THEN t.data_layer END,
                t.collection_id,
                t.owner_email,
                t.owner_user_id,
                CASE WHEN t.data_authority <> 'unconfigured' THEN t.data_authority END,
                CASE WHEN t.field_order = 'custom' THEN t.field_order END
              FROM metabase_table t
              WHERE t.db_id NOT IN (SELECT d.id FROM metabase_database d WHERE d.is_audit = TRUE)
                AND (t.caveats IS NOT NULL
                  OR t.points_of_interest IS NOT NULL
                  OR t.collection_id IS NOT NULL
                  OR t.owner_email IS NOT NULL
                  OR t.owner_user_id IS NOT NULL
                  OR t.field_order = 'custom'
                  OR (t.data_authority IS NOT NULL AND t.data_authority <> 'unconfigured')
                  OR (t.visibility_type IS NOT NULL AND t.visibility_type <> 'cruft')
                  OR (t.visibility_type IS NULL AND t.data_layer NOT IN ('internal', 'hidden', 'copper'))
                  OR (t.display_name IS NOT NULL AND
                      CASE WHEN (SELECT count(*) FROM setting
                                 WHERE setting.`key` = 'humanization-strategy' AND setting.value = 'none') > 0
                           THEN t.display_name <> t.name
                           ELSE lower(t.display_name) <> lower(replace(replace(t.name, '_', ' '), '-', ' '))
                      END))
      rollback: # not necessary; the table is dropped by the rollback of v64.2026-07-23T10:00:00
