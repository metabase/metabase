name: Cross-branch migration tests

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "resources/migrations/**"
  workflow_dispatch:
    inputs:
      base-ref:
        description: 'Base reference for the migration test'
        required: true
        type: string
      head-ref:
        description: 'Head reference for the migration test'
        required: true
        type: string
env:
  BASE_REF: ${{ inputs.base-ref || github.base_ref }}
  HEAD_REF: ${{ inputs.head-ref || github.head_ref }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  migrations-h2-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: h2

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-postgres-14-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: postgres
      MB_DB_PORT: 5432
      MB_DB_HOST: localhost
      MB_DB_DBNAME: mb_test
      MB_DB_USER: mb_test
    services:
      postgres:
        image: postgres:14-alpine
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: mb_test
          POSTGRES_DB: mb_test
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-postgres-latest-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: postgres
      MB_DB_PORT: 5432
      MB_DB_HOST: localhost
      MB_DB_DBNAME: mb_test
      MB_DB_USER: mb_test
    services:
      postgres:
        image: postgres:latest
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: mb_test
          POSTGRES_DB: mb_test
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-mysql-8-4-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: mb_test
      MB_DB_USER: root
    services:
      mysql:
        image: mysql:8.4
        ports:
          - "3306:3306"
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: mb_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-mysql-latest-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: mb_test
      MB_DB_USER: root
      MB_MYSQL_TEST_USER: root
    services:
      mysql:
        image: mysql:latest
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: true
          MYSQL_DATABASE: mb_test
        ports:
          - "3306:3306"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-mariadb-10-6-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: mb_test
      MB_DB_USER: root
    services:
      mariadb:
        image: metabase/mariadb:10.6 # https://github.com/metabase/metabase-mariadb-docker-image
        ports:
          - "3306:3306"
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: true
          MARIADB_DATABASE: mb_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}

  migrations-mariadb-latest-ee:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    env:
      CI: 'true'
      MB_DB_TYPE: mysql
      MB_DB_HOST: localhost
      MB_DB_PORT: 3306
      MB_DB_DBNAME: mb_test
      MB_DB_USER: root
    services:
      mariadb:
        image: mariadb:latest
        ports:
          - "3306:3306"
        env:
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: true
          MARIADB_DATABASE: mb_test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/cross-branch-migration-test
        with:
          base-ref: ${{ env.BASE_REF }}
          head-ref: ${{ env.HEAD_REF }}
