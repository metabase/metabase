# Step 1 of the SDK release process: bump the version (and the sdkRelease
# metadata that controls the npm dist-tag / `latest` promotion) in
# package.template.json, then open a PR labeled `sdk-release-trigger` for
# human review. Merging that PR is what actually triggers a release, via the
# `pull_request` trigger on release-embedding-sdk.yml.
name: SDK Version Bump PR
run-name: Bump Embedding SDK version (${{ inputs.release_type }}) on ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Bumps the version on the branch chosen in 'Use workflow from' above."
        type: choice
        required: false
        options:
          - Pick the branch in "Use workflow from" above
      release_type:
        description: |
          Which bump to make:
          • alpha — master: bump the current development version
          • preminor — master: move to the next major, right after cutting a release branch
          • beta — release branch: publish a beta
          • patch — release branch: graduate to gold, or ship a patch
          • custom — one-off branch (esbuild, data-apps): publish under its own prerelease id
        type: choice
        required: true
        options:
          - alpha
          - beta
          - preminor
          - patch
          - custom
      prerelease_id:
        description: "release_type=custom only, and only on the FIRST cut of a one-off branch (e.g. data-apps). Becomes the prerelease id in the version (0.62.5-data-apps.0) and the npm dist-tag (62-data-apps). Leave empty on later bumps - the id is reused from the current version."
        type: string
        required: false

concurrency:
  # one version-bump in flight per branch at a time, to avoid racing PRs
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump SDK version and open review PR
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    env:
      package_template: enterprise/frontend/src/embedding-sdk-package/package.template.json
    steps:
      # No explicit `ref:` - actions/checkout defaults to the ref that triggered
      # the run, which for workflow_dispatch is the ref picker's selection.
      - name: Check out the code
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Setup git user
        run: |
          git config --global user.email "github-automation@metabase.com"
          git config --global user.name "Metabase Automation"

      - name: Read current SDK version
        id: current
        run: |
          VERSION=$(jq -r .version "$package_template")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate branch / release_type combination
        env:
          BRANCH: ${{ github.ref_name }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          # Each branch class gets only the release types that make sense for it.
          # `preminor` (master -> next major's alpha) is grouped with `alpha`
          # since it only makes sense on master, same as a regular alpha bump.
          if [ "$BRANCH" = "master" ] && [ "$RELEASE_TYPE" != "alpha" ] && [ "$RELEASE_TYPE" != "preminor" ]; then
            echo "::error::Only 'alpha' or 'preminor' releases can be bumped from the 'master' branch (got release_type=$RELEASE_TYPE)."
            exit 1
          fi

          if [[ "$BRANCH" == release-x.* ]] && [ "$RELEASE_TYPE" != "beta" ] && [ "$RELEASE_TYPE" != "patch" ]; then
            echo "::error::Only 'beta' or 'patch' releases can be bumped from a release branch (got release_type=$RELEASE_TYPE, branch=$BRANCH)."
            exit 1
          fi

          # Any other branch is a one-off (esbuild, data-apps, ...) and may only
          # publish to its own <major>-<prerelease-id> dist-tag. `patch` here
          # would strip the id (0.62.5-data-apps.0 -> 0.62.5), compute distTag
          # <major>-stable, and - if the major matches vars.LATEST_MAJOR_VERSION - take
          # the npm `latest` tag, shipping a feature branch as the stable release.
          if [ "$BRANCH" != "master" ] && [[ "$BRANCH" != release-x.* ]] && [ "$RELEASE_TYPE" != "custom" ]; then
            echo "::error::'$BRANCH' is not master or a release branch - only release_type=custom is allowed here (got release_type=$RELEASE_TYPE)."
            exit 1
          fi

      - name: Bump version with semver
        id: bump
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          PRERELEASE_ID: ${{ inputs.prerelease_id }}
        run: |
          # `npm version` only operates on a file literally named package.json
          # in the current directory, and its bump logic is just a thin
          # wrapper around the `semver` package (already a dependency - see
          # package.json) - so we call `semver` directly and write the result
          # into the template with jq, no rename dance needed.
          CURRENT_VERSION=$(jq -r .version "$package_template")

          # Branches that went gold under the pre-EMB-1518 after-gold
          # checklist have a `0.N.x` placeholder version instead of a
          # concrete semver string - `semver -i` exits 1 with no output on
          # that, which is a cryptic failure. Fail clearly instead.
          if ! npx --yes semver "$CURRENT_VERSION" >/dev/null 2>&1; then
            echo "::error::'$CURRENT_VERSION' is not a valid semver version - old release branches use a '0.N.x' placeholder (pre-EMB-1518 convention); set a concrete version in $package_template first."
            exit 1
          fi

          case "$RELEASE_TYPE" in
            alpha|beta)
              NEW_VERSION=$(npx --yes semver -i prerelease --preid="$RELEASE_TYPE" "$CURRENT_VERSION")
              ;;
            custom)
              # The prerelease id this branch already carries, if any. alpha/beta
              # are the normal ids for master/release branches, not one-off ids -
              # a one-off branch cut from master sits on 0.63.0-alpha.5, and that
              # is still a first cut.
              EXISTING_PREID=$(echo "$CURRENT_VERSION" | sed -n 's/^[0-9.]*-\([a-z][a-z0-9-]*\)\(\.[0-9]*\)\{0,1\}$/\1/p')
              case "$EXISTING_PREID" in alpha|beta) EXISTING_PREID="" ;; esac

              # prerelease_id is set if and only if this is the first cut.
              if [ -n "$EXISTING_PREID" ] && [ -n "$PRERELEASE_ID" ]; then
                echo "::error::This branch already uses the prerelease id '$EXISTING_PREID' - leave prerelease_id empty to bump it. To change the id, reset the version in $package_template by hand."
                exit 1
              fi
              if [ -z "$EXISTING_PREID" ] && [ -z "$PRERELEASE_ID" ]; then
                echo "::error::prerelease_id is required when cutting a new one-off branch - it becomes the prerelease id in the version (0.62.5-<id>.0) and the npm dist-tag (<major>-<id>)."
                exit 1
              fi

              # First cut: caller supplies the id. Later bumps: no --preid, so
              # semver reuses the id already in the version and bumps its counter
              # (0.62.5-data-apps.0 -> 0.62.5-data-apps.1).
              if [ -n "$PRERELEASE_ID" ]; then
                NEW_VERSION=$(npx --yes semver -i prerelease --preid="$PRERELEASE_ID" "$CURRENT_VERSION")
              else
                NEW_VERSION=$(npx --yes semver -i prerelease "$CURRENT_VERSION")
              fi
              ;;
            preminor)
              # master -> next major's alpha (e.g. 0.63.0-alpha.5 -> 0.64.0-alpha.0);
              # `alpha|beta` above can only ever increment the existing
              # prerelease counter, never bump the minor version.
              NEW_VERSION=$(npx --yes semver -i preminor --preid=alpha "$CURRENT_VERSION")
              ;;
            patch)
              NEW_VERSION=$(npx --yes semver -i "$RELEASE_TYPE" "$CURRENT_VERSION")
              ;;
            *)
              echo "::error::Unsupported release_type: $RELEASE_TYPE"
              exit 1
              ;;
          esac

          jq --arg v "$NEW_VERSION" '.version = $v' "$package_template" > "$package_template.tmp"
          mv "$package_template.tmp" "$package_template"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major_version=$(echo "$NEW_VERSION" | cut -d. -f2)" >> "$GITHUB_OUTPUT"

      - name: Compute sensible sdkRelease defaults
        id: sdk-release
        env:
          BRANCH: ${{ github.ref_name }}
          LATEST_MAJOR_VERSION: ${{ vars.LATEST_MAJOR_VERSION }}
          RELEASE_TYPE: ${{ inputs.release_type }}
        run: |
          # These are sensible starting defaults, not a policy decision - the
          # whole point of this PR is that a human reviews/edits distTag and
          # tagAsLatest before merging.
          #
          # "<major>-stable" and "<major>-beta" ARE real, already-live npm
          # dist-tags (confirmed via `npm dist-tag ls @metabase/embedding-sdk-react`
          # - 51-stable through 62-stable, and 57-beta through 62-beta, are all
          # in active use today); plain "alpha" is also real and in use. So are
          # the one-off <major>-<id> tags (56-esbuild, 63-data-apps).
          MAJOR_VERSION="${{ steps.bump.outputs.major_version }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          case "$RELEASE_TYPE" in
            alpha|preminor)
              DIST_TAG="alpha"
              ;;
            beta)
              DIST_TAG="${MAJOR_VERSION}-beta"
              ;;
            patch)
              DIST_TAG="${MAJOR_VERSION}-stable"
              ;;
            custom)
              # The id comes from the version just computed, so it is identical on
              # the first cut and every later bump: 0.62.5-data-apps.0 -> 62-data-apps.
              PREID=$(echo "$NEW_VERSION" | sed -n 's/^[0-9.]*-\([a-z][a-z0-9-]*\)\.[0-9]*$/\1/p')
              if [ -z "$PREID" ]; then
                echo "::error::Could not read a prerelease id back from '$NEW_VERSION'."
                exit 1
              fi
              DIST_TAG="${MAJOR_VERSION}-${PREID}"
              ;;
          esac

          # tagAsLatest: only ever true for a `patch` on a real release branch
          # whose major matches `vars.LATEST_MAJOR_VERSION` (the major of the most
          # recent gold release) - the one signal this workflow has for "is this
          # the current latest major". The release-branch check is a second,
          # independent guard: nothing published from master or a one-off branch
          # can take the npm `latest` tag, whatever else goes wrong.
          # `vars.LATEST_MAJOR_VERSION` can be unset (forks, local testing) - an empty
          # value is treated as "no match", not an error.
          case "$RELEASE_TYPE" in
            patch)
              if [[ "$BRANCH" == release-x.* ]] && [ -n "$LATEST_MAJOR_VERSION" ] && [ "$MAJOR_VERSION" = "$LATEST_MAJOR_VERSION" ]; then
                TAG_AS_LATEST=true
              else
                TAG_AS_LATEST=false
              fi
              ;;
            *)
              TAG_AS_LATEST=false
              ;;
          esac

          echo "dist_tag=$DIST_TAG" >> "$GITHUB_OUTPUT"
          echo "tag_as_latest=$TAG_AS_LATEST" >> "$GITHUB_OUTPUT"

      - name: Write sdkRelease metadata block
        id: write-metadata
        run: |
          # Writes whatever tagAsLatest the "Compute sensible sdkRelease
          # defaults" step above computed (true or false) - it's never
          # forced back to false here. That step already ignores any
          # previous sdkRelease.tagAsLatest value (it derives the default
          # fresh from vars.LATEST_MAJOR_VERSION every run), so a stale `true`
          # from an earlier release can't leak forward either way; the
          # reviewer can still override the written value on the PR.
          jq --arg distTag "${{ steps.sdk-release.outputs.dist_tag }}" \
             --argjson tagAsLatest ${{ steps.sdk-release.outputs.tag_as_latest }} \
             '.sdkRelease.distTag = $distTag | .sdkRelease.tagAsLatest = $tagAsLatest' \
             "$package_template" > "$package_template.tmp"
          mv "$package_template.tmp" "$package_template"

          TAG_AS_LATEST=$(jq -r '.sdkRelease.tagAsLatest' "$package_template")
          echo "tag_as_latest=$TAG_AS_LATEST" >> "$GITHUB_OUTPUT"

      - name: Append workflow summary
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          tee -a "$GITHUB_STEP_SUMMARY" << EOF
          **SDK version bump:**

          - \`branch\`: $BRANCH
          - \`release_type\`: ${{ inputs.release_type }}
          - \`previous_version\`: ${{ steps.current.outputs.version }}
          - \`new_version\`: ${{ steps.bump.outputs.new_version }}
          - \`distTag\` (default, review before merging): ${{ steps.sdk-release.outputs.dist_tag }}
          - \`tagAsLatest\` (auto-computed from \`vars.LATEST_MAJOR_VERSION\`, review before merging): ${{ steps.write-metadata.outputs.tag_as_latest }}

          triggered by: @${{ github.event.sender.login }}
          EOF

      - name: Ensure sdk-release-trigger label exists
        run: |
          gh label create sdk-release-trigger \
            --color 5319e7 \
            --description "Merging this PR triggers an Embedding SDK release (see release-embedding-sdk.yml)" \
            || true
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Commit version bump
        run: |
          # The run id is appended so a retry after a failed/abandoned attempt
          # never collides with a still-existing branch of the same name on
          # origin (which would otherwise fail this push as non-fast-forward).
          git checkout -b sdk-version-bump-${{ steps.bump.outputs.new_version }}-${{ github.run_id }}
          git add "$package_template"
          git commit -m "chore(sdk): bump SDK version to ${{ steps.bump.outputs.new_version }} (${{ inputs.release_type }})"
          git push origin HEAD

      - name: Open version-bump PR (using GitHub Metabase Automation account)
        id: open-pr
        env:
          BRANCH: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
        run: |
          gh pr create --base "$BRANCH" \
                       --assignee "${GITHUB_ACTOR}" \
                       --reviewer metabase/embedding \
                       --label sdk-release-trigger \
                       --title "chore(sdk): bump SDK version to ${{ steps.bump.outputs.new_version }}" \
                       --body "$(cat <<'BODY'
          Bumps the Embedding SDK version from `${{ steps.current.outputs.version }}` to `${{ steps.bump.outputs.new_version }}` (`${{ inputs.release_type }}`) and updates the `sdkRelease` metadata in `package.template.json`.

          **Review before merging:**
          - `sdkRelease.distTag` currently defaults to `${{ steps.sdk-release.outputs.dist_tag }}` - override it here if this release should publish under a different npm dist-tag.
          - `sdkRelease.tagAsLatest` is auto-computed as `${{ steps.write-metadata.outputs.tag_as_latest }}` (`true` when this bump's major version matches `vars.LATEST_MAJOR_VERSION`, the current npm `latest` major - `false` otherwise) - still worth a second look here before merging, override it if this release should (or shouldn't) become the `latest` tag on npm.
          ${{ inputs.release_type == 'preminor' && format('- This is a `preminor` bump (master -> next major''s alpha). Merging this PR (with the `sdk-release-trigger` label) publishes `{0}` to npm and tags the release exactly like any other bump - remove the label first if you want to bump the version without triggering a release.', steps.bump.outputs.new_version) || '' }}

          Merging this PR (with the `sdk-release-trigger` label) triggers [release-embedding-sdk.yml](../actions/workflows/release-embedding-sdk.yml), which builds, publishes to npm, and tags the release.

          _Opened by the [SDK Version Bump PR workflow](../actions/workflows/sdk-version-bump-pr.yml), triggered by @${{ github.event.sender.login }}._
          BODY
          )"

      - name: Add no-backport label (using GitHub Actions account)
        # CODEOWNERS does NOT cover this on release branches - the embedding
        # team's CODEOWNERS entries are deliberately commented out there as
        # part of a repo-wide practice to cut auto-backport review noise
        # (unrelated to this workflow; see the embedding-release-checklist's
        # beta-prep step). EMB-1000 hit this exact gap on the old release
        # follow-up PR, which silently lost its review request the same way.
        # The fix here is an explicit `--reviewer metabase/embedding` on the
        # "Open version-bump PR" step above (using the automation PAT, which
        # - unlike GITHUB_TOKEN - has org read access to resolve the team),
        # so the bump PR always gets a review request regardless of branch.
        run: |
          gh pr edit --add-label no-backport
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
