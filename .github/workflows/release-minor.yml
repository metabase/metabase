name: Release 1c - Auto Minor
run-name: Minor Release ${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Major Metabase version (e.g. 45, 52, 68)"
        type: number
        required: true
      override_sha:
        description: DANGEROUSLY allow releasing from this commit sha, regardless of the state of CI (can be empty)
        type: string
        required: false
        default: ""
  schedule:
    - cron: "0 13 * * 2" # every Tuesday at 13:00 UTC (9am EST / 8am EDT)

jobs:
  auto-minor-trigger:
    # don't run this workflow on a cron for forks
    if: ${{ github.event_name != 'schedule' || (github.repository == 'metabase/metabase' && vars.ENABLE_AUTO_MINOR == 'true') }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: release
      - name: Install bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.7"
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare build scripts
        run: bun install --cwd release --frozen-lockfile && bun run --cwd release build
      - name: Trigger auto-minor
        uses: actions/github-script@v7
        env:
          SLACK_RELEASE_CHANNEL: ${{ vars.SLACK_RELEASE_CHANNEL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          script: | # js
            const {
              getLatestGreenCommit,
              getNextMinorVersion,
              hasCommitBeenReleased,
            } = require('${{ github.workspace }}/release/dist/index.cjs');

            const currentRelease = Number('${{ vars.CURRENT_VERSION }}');
            const lastRelease = currentRelease - 1;
            const AUTO_RELEASE_VERSIONS = [lastRelease, currentRelease];

            async function releaseMinorFor(majorVersion, overrideSha) {
              const nextMinor = await getNextMinorVersion({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                majorVersion,
              });

              const releaseCommit = overrideSha || await getLatestGreenCommit({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: `release-x.${majorVersion}.x`,
              });

              const hasBeenReleased = await hasCommitBeenReleased({
                github,
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: releaseCommit,
                majorVersion: Number(majorVersion),
              });

              console.log(
                { nextMinor, releaseCommit, hasBeenReleased }
              );

              if (nextMinor && releaseCommit && !hasBeenReleased) {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: 'build-for-release.yml',
                  ref: 'refs/heads/master',
                  inputs: {
                    commit: releaseCommit,
                    version: nextMinor,
                  }
                }).catch(console.error);
                return;
              }

              const reason = !nextMinor
                ? 'no-next-minor'
                : !releaseCommit
                  ? 'no-green-commit'
                  : 'already-released';

              console.error(`Auto-minor skipped for v${majorVersion}: ${reason}`);
              // TODO: wire up Slack notification for skip reasons (mirror sendAutoPatchFailureMessage)
            }

            if (context.eventName === 'workflow_dispatch') {
              const inputVersion = Number(context.payload.inputs.version);

              if (typeof inputVersion !== 'number') {
                console.log('Invalid version number', inputVersion);
                throw new Error(`Invalid version number: ${inputVersion}`);
              }

              // only allow overriding the commit SHA for workflow_dispatch events with a provided sha
              const overrideSha = String(context.payload?.inputs?.override_sha ?? '').trim();
              const isValidOverride = overrideSha.length === 40;

              if (!isValidOverride && overrideSha.length > 0) {
                throw new Error(`Invalid override SHA provided: ${overrideSha}`);
              }

              await releaseMinorFor(inputVersion, isValidOverride ? overrideSha : undefined);
            } else { // scheduled release of AUTO_RELEASE_VERSIONS
              await Promise.all(AUTO_RELEASE_VERSIONS.map(version => releaseMinorFor(version)));
            }
