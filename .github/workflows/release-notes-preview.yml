name: Release Notes Preview
run-name: Preview ${{ inputs.version }} release notes

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Metabase version (e.g. v0.46.3)'
        type: string
        required: true
      slackChannel:
        description: 'Optional Slack channel to upload the markdown to (e.g. writing). When unset, the markdown is only available as a workflow artifact.'
        type: string
        required: false
        default: ''

jobs:
  preview-release-notes:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
    - name: Fail early on the incorrect version format
      if: ${{ !(startsWith(inputs.version,'v0.') || startsWith(inputs.version,'v1.')) }}
      run: |
        echo "The version format is invalid!"
        echo "It must start with either 'v0.' or 'v1.'."
        echo "Please, try again."
        exit 1
    - uses: actions/checkout@v4
      with:
        sparse-checkout: |
          release
          .github
    - name: Prepare release scripts
      uses: ./.github/actions/prepare-release-scripts
    - name: Get Release Version
      uses: actions/github-script@v7
      env:
        DOCKERHUB_OWNER: test_owner
        DOCKERHUB_REPO: test_repo
        AWS_S3_DOWNLOADS_BUCKET: test_bucket
      with:
        script: | # js
          const R = require('${{ github.workspace }}/release/dist/index.cjs');
          const fs = require('fs');

          const version = '${{ inputs.version }}';

          const issues = await R.getMilestoneIssues({
            version,
            github,
            owner: context.repo.owner,
            repo: context.repo.repo,
          });

          const notes = R.getWebsiteChangelog({
            version,
            issues,
          });

          fs.writeFileSync(`release-notes-preview-${version}.md`, notes);
    - name: Upload Release Notes
      uses: actions/upload-artifact@v4
      with:
        name: release-notes-preview-${{inputs.version}}.md
        path: |
          ${{ github.workspace }}/release-notes-preview-*.md

    - name: Post release notes preview to Slack
      if: ${{ inputs.slackChannel != '' }}
      uses: actions/github-script@v7
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      with:
        script: | # js
          const fs = require('fs');
          const { uploadFileToSlack } = require('${{ github.workspace }}/release/dist/index.cjs');

          const version = '${{ inputs.version }}';
          const fileName = `release-notes-preview-${version}.md`;
          const file = fs.readFileSync(`${{ github.workspace }}/${fileName}`);

          await uploadFileToSlack({
            channelName: '${{ inputs.slackChannel }}',
            fileName,
            file,
            message: `:page_with_curl: Release notes preview for *${version}* — ready for editing.`,
          });
