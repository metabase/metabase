name: Deploy production

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          build-args: |
            MB_EDITION=oss

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          source: "deploy/docker-compose.yml,deploy/Caddyfile"
          target: "collegiate-metabase"
          strip_components: 1

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          port: ${{ secrets.PRODUCTION_SSH_PORT || 22 }}
          script: |
            set -eu
            cd ~/collegiate-metabase
            umask 077
            cat > .env <<'ENV'
            IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            DOMAIN=${{ secrets.PRODUCTION_DOMAIN }}
            ACME_EMAIL=${{ secrets.PRODUCTION_ACME_EMAIL }}
            MB_SITE_URL=https://${{ secrets.PRODUCTION_DOMAIN }}
            MB_DB_TYPE=postgres
            MB_DB_HOST=${{ secrets.MB_DB_HOST }}
            MB_DB_PORT=${{ secrets.MB_DB_PORT }}
            MB_DB_DBNAME=${{ secrets.MB_DB_DBNAME }}
            MB_DB_USER=${{ secrets.MB_DB_USER }}
            MB_DB_PASS=${{ secrets.MB_DB_PASS }}
            MB_ENCRYPTION_SECRET_KEY=${{ secrets.MB_ENCRYPTION_SECRET_KEY }}
            ENV
            echo '${{ secrets.GHCR_TOKEN }}' | docker login ghcr.io -u '${{ secrets.GHCR_USER }}' --password-stdin
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose is not installed on the server. Install the Docker Compose plugin or docker-compose."
              exit 1
            fi
            $COMPOSE pull
            $COMPOSE up -d --remove-orphans
            docker image prune -f
