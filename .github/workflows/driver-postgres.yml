# Postgres driver tests.
#
# Standalone driver workflow (split out of the old monolithic drivers.yml). The
# shape here is the template every driver-*.yml follows:
#
#   decide  - reuse mage to decide if this driver should run on this change, and
#             ask ci-conductor whether the workflow is skip | info | required.
#   test    - the actual driver test job(s); runs only when decide says so.
#   result  - the always-run gate that is this driver's required status check.
#
# See .github/scripts/conductor/README.md for the skip/info/required semantics.
name: Driver Tests - Postgres

on:
  push:
    branches:
      - "master"
      - "release-**"
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write
  checks: write
  pull-requests: read

jobs:
  decide:
    uses: ./.github/workflows/_driver-decide.yml
    with:
      driver: postgres
      workflow-name: ${{ github.workflow }}
    secrets: inherit

  test:
    needs: decide
    # Run only when the driver is selected (mage) AND conductor didn't say skip.
    if: >-
      !cancelled() &&
      needs.decide.result == 'success' &&
      needs.decide.outputs.conductor-status != 'skip' &&
      (needs.decide.outputs.should-run == 'true' || needs.decide.outputs.quarantine-conflict == 'true')
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        version:
          - name: Postgres 14.x
            junit-name: postgres-ee
            docker-image: postgres:14-alpine
            env:
              enable-ssl-tests: 'false'
              enable-aws-iam-tests: 'false'
          - name: Postgres Latest
            junit-name: postgres-latest-ee
            docker-image: postgres:latest
            env:
              enable-ssl-tests: 'true'
              enable-aws-iam-tests: 'true'
        job:
          - name: Driver Tests
            test-args: >-
              :only-tags [:mb/driver-tests]
            exclude-tag: ':mb/transforms-python-test'
          - name: Transforms Python Tests
            test-args: >-
              :only-tags [:mb/transforms-python-test]
            needs-python-runner: true
    name: "${{ matrix.version.name }} ${{ matrix.job.name }}"
    env:
      # Only run old migrations tests on pushes to master or release branches. All other branches should skip tests
      # with the tag `mb/old-migrations-test`. `__ADDITIONAL_EXCLUDED_TAG__` is not used anywhere outside of splicing
      # it in to the command below.
      __ADDITIONAL_EXCLUDED_TAG__: >-
        ${{
          (
            github.event_name == 'push' &&
            (
              github.ref_name == 'master' ||
              startsWith(github.ref_name, 'release-')
            ) &&
            ''
          ) ||
          ':mb/old-migrations-test'
        }}
      # actual serious env vars below
      CI: 'true'
      DRIVERS: postgres
      MB_DB_TYPE: postgres
      MB_DB_PORT: 5432
      MB_DB_HOST: localhost
      MB_DB_DBNAME: mb_test
      MB_DB_USER: mb_test
      MB_POSTGRESQL_TEST_USER: mb_test
      # SSL tests are only enabled for the postgres-latest job.
      MB_POSTGRES_SSL_TEST_SSL: ${{ matrix.version.env.enable-ssl-tests }}
      MB_POSTGRES_SSL_TEST_SSL_MODE: verify-full
      MB_POSTGRES_SSL_TEST_SSL_ROOT_CERT_PATH: 'test-resources/certificates/us-east-2-bundle.pem'
      MB_POSTGRES_AWS_IAM_TEST: ${{ matrix.version.env.enable-aws-iam-tests }}
      MB_POSTGRES_AWS_IAM_TEST_HOST: ${{ secrets.POSTGRES_AURORA_IAM_INSTANCE_HOST }}
      MB_POSTGRES_AWS_IAM_TEST_PORT: 5432
      MB_POSTGRES_AWS_IAM_TEST_USER: my_iam_user
      MB_POSTGRES_AWS_IAM_TEST_DBNAME: test_db
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_AURORA_IAM_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_AURORA_IAM_SECRET_ACCESS_KEY }}
    services:
      postgres:
        image: ${{ matrix.version.docker-image }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: mb_test
          POSTGRES_DB: mb_test
          POSTGRES_HOST_AUTH_METHOD: trust
    steps:
      - uses: actions/checkout@v6
      - name: Setup python-runner
        if: ${{ matrix.job.needs-python-runner == true }}
        uses: ./.github/actions/setup-python-runner
        with:
          metabase-automation-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - name: Test ${{ matrix.version.name }} (${{ matrix.job.name }})
        id: test-driver
        uses: ./.github/actions/test-driver
        with:
          junit-name: 'be-tests-${{ matrix.version.junit-name }}'
          logs-artifact-suffix: ${{ matrix.version.name }}-${{ matrix.job.name }}
          test-args: >-
            ${{ matrix.job.test-args }}
            :exclude-tags '[ ${{ matrix.job.exclude-tag }} ${{ env.__ADDITIONAL_EXCLUDED_TAG__ }}]'
      - name: Upload Test Results
        uses: ./.github/actions/upload-test-results
        if: always()
        # In conductor "info" mode, never let Trunk's verdict fail the job.
        continue-on-error: ${{ needs.decide.outputs.conductor-status == 'info' }}
        with:
          input-path: ./target/junit/
          output-name: be-tests-postgres
          bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
          role-to-assume: ${{ secrets.CI_TEST_RESULTS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}
          trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
          previous-step-outcome: ${{ steps.test-driver.outputs.test-outcome }}
      - name: Report result to conductor
        if: always()
        uses: ./.github/actions/conductor-report
        with:
          secret: ${{ secrets.CI_CONDUCTOR_WEBHOOK_SECRET }}
          status: ${{ needs.decide.outputs.conductor-status }}
          outcome: ${{ steps.test-driver.outputs.test-outcome || job.status }}
      - name: Cleanup python-runner
        if: always()
        uses: ./.github/actions/cleanup-python-runner
        with:
          upload-logs: ${{ steps.test-driver.outcome == 'failure' }}
          logs-artifact-suffix: ${{ matrix.job.name }} ${{ matrix.version.name }}

  # This job is THIS DRIVER'S required status check. It always runs, so the
  # check is always reported (success when the driver was skipped), which is
  # what branch protection needs from a conditional workflow.
  result:
    name: Postgres result
    needs: [decide, test]
    if: always() && !cancelled()
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/driver-gate
        with:
          decide-result: ${{ needs.decide.result }}
          test-results: ${{ needs.test.result }}
          conductor-status: ${{ needs.decide.outputs.conductor-status }}
