name: Publish Athena JDBC Driver

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Athena JDBC driver version to publish'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Publish Athena JDBC Driver
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Babashka
        uses: turtlequeue/setup-babashka@2d4df498c7a578b4f3e906283f9af913590bdec7 # v1.7.0
        with:
          babashka-version: 1.12.197

      - name: Set up AWS CLI
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.CI_MAVEN_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Athena JDBC driver
        run: ./bin/athena.bb "${VERSION}" --deploy
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Verify deployment
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          aws s3 ls s3://metabase-maven-downloads/com/metabase/athena-jdbc/"${VERSION}"/
          echo "Athena JDBC driver version ${VERSION} has been deployed"
