databaseChangeLog:
  - objectQuotingStrategy: QUOTE_ALL_OBJECTS

  - changeSet:
      id: v60.2026-03-07T00:00:00
      author: christruter
      comment: Delete orphaned API keys that were created for workspace service users
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: workspace
            columnName: api_key_id
      changes:
        - sql:
            sql: >-
              DELETE FROM api_key WHERE id IN (SELECT api_key_id FROM workspace WHERE api_key_id IS NOT NULL);
      rollback:

  - changeSet:
      id: v60.2026-03-07T00:00:01
      author: christruter
      comment: Drop index on workspace.api_key_id
      preConditions:
        - onFail: MARK_RAN
        - indexExists:
            tableName: workspace
            indexName: idx_workspace_api_key_id
      changes:
        - dropIndex:
            tableName: workspace
            indexName: idx_workspace_api_key_id
      rollback:

  - changeSet:
      id: v60.2026-03-07T00:00:02
      author: christruter
      comment: Drop unused api_key_id column from workspace table
      preConditions:
        - onFail: MARK_RAN
        - columnExists:
            tableName: workspace
            columnName: api_key_id
      changes:
        - dropColumn:
            tableName: workspace
            columnName: api_key_id
      rollback:

  - changeSet:
      id: v60.2026-03-07T00:00:03
      author: christruter
      comment: Add transform_target column to metabase_table
      changes:
        - addColumn:
            tableName: metabase_table
            columns:
              - column:
                  name: transform_target
                  type: ${boolean.type}
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
                  remarks: >-
                    Whether any transform is configured to target this table. Conservative: eagerly set to true
                    when a transform targets this table (never stale in this direction), cleared asynchronously
                    when no transforms reference it anymore (may have false positives, never false negatives).
      rollback:
        - dropColumn:
            tableName: metabase_table
            columnName: transform_target

  - changeSet:
      id: v60.2026-03-07T00:00:04
      author: christruter
      comment: Backfill transform target tables for existing transforms and workspace outputs
      changes:
        - customChange:
            class: metabase.app_db.custom_migrations.BackfillTransformTargetTables
      rollback:

  - changeSet:
      id: v60.2026-03-10T00:00:00
      author: christruter
      comment: Add target_table_id column to transform table
      changes:
        - addColumn:
            tableName: transform
            columns:
              - column:
                  name: target_table_id
                  type: int
                  remarks: FK to metabase_table for the transform's target table
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: transform
            columnName: target_table_id

  - changeSet:
      id: v60.2026-03-10T00:00:01
      author: christruter
      comment: Add FK from transform.target_table_id to metabase_table with RESTRICT
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_transform_target_table_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: transform
            baseColumnNames: target_table_id
            constraintName: fk_transform_target_table_id
            referencedTableName: metabase_table
            referencedColumnNames: id

  - changeSet:
      id: v60.2026-03-10T00:00:02
      author: christruter
      comment: Backfill transform.target_table_id from target JSON column
      changes:
        - customChange:
            class: metabase.app_db.custom_migrations.BackfillTransformTargetTableId
      rollback:

  - changeSet:
      id: v60.2026-03-10T00:00:03
      author: christruter
      comment: Add FK from workspace_output.global_table_id to metabase_table with RESTRICT
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_workspace_output_global_table_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_output
            baseColumnNames: global_table_id
            constraintName: fk_workspace_output_global_table_id
            referencedTableName: metabase_table
            referencedColumnNames: id

  - changeSet:
      id: v60.2026-03-10T00:00:04
      author: christruter
      comment: Add FK from workspace_output.isolated_table_id to metabase_table with RESTRICT
      preConditions:
        - onFail: MARK_RAN
        - not:
            - foreignKeyConstraintExists:
                foreignKeyName: fk_workspace_output_isolated_table_id
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_output
            baseColumnNames: isolated_table_id
            constraintName: fk_workspace_output_isolated_table_id
            referencedTableName: metabase_table
            referencedColumnNames: id

# >>>>>>>>>> DO NOT ADD NEW MIGRATIONS BELOW THIS LINE! ADD THEM ABOVE <<<<<<<<<<

########################################################################################################################
#
# ADVICE:
#
# 1) Think through some of these points when writing a migration, learn from our past mistakes:
#    - Do you really need a migration? Could the feature work without it? Prefer not to if possible.
#      Data in the wild can be vastly different from what you expect, and it's hard to get right.
#    - Make sure your migration is backward compatible: it might not be possible to add a constraint back
#      if you drop it in a migration.
#    - Postgres, MySQL and H2 have their differences. Make sure your migration works for all.
#    - Database encryption is a major issue:
#      - Fields like `metabase_database.details` or `setting.value` can be encrypted, so you need to decrypt them in
#        your migration. See #42617, #44048.
#      - Database could be partially encrypted, see https://www.notion.so/72575933ef2a446bafd16909e05a7387
#    - Custom migrations:
#      - Prefer SQL migrations when possible.
#      - Never use application code: it can change and *will* break your migration.
#      - Do not use Toucan models - refer table names directly.
#      - If it's a big change, consider using Quartz, see #42279
#      - More in `metabase.app_db.custom_migrations` namespace doc.
#    - Never delete a migration: users won't be able to downgrade. If you really need to, see #44908
#    - Migration id (`vXX.<date>`) must match its earliest released version:
#      - Do not backport `v51....` to version 50, Metabase will try to downgrade it.
#      - Instead, write a migration with an oldest target you plan to backport to in mind.
#
# 2) Migrations should go in the ###_update_migrations.yaml file for the target version.
#
# 3) Run mage lint-migrations-file to run core.spec checks against any changes you make here. Liquibase is pretty
#    forgiving and won't complain if you accidentally mix up things like deleteCascade and onDelete: CASCADE. CI runs
#    this check but it's nicer to know now instead of waiting for CI.
#
# 3) Migration IDs should follow the format
#
#    vMM.TIMESTAMP
#
#    Where
#
#    M         = major version
#    TIMESTAMP = the current timestamp with format `yyyy-MM-dd'T'HH:mm:ss`
#                To get this timestamp, evaluate this in your REPL: `(dev/migration-timestamp)`
#
#    E.g: You're adding a new migration for version 49, And it's 10:30:00AM on April 1, 2023 (UTC),
#    your migration id should be: `v49.2023-04-01T10:30:00`.
#
# PLEASE KEEP THIS MESSAGE AT THE BOTTOM OF THIS FILE!!!!! Add new migrations above the message.
#
########################################################################################################################
