name: Check Migration Versions

on:
  pull_request:
    paths:
      - 'resources/migrations/**'

concurrency:
  group: check-migration-version-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  check-migration-version:
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          filter: blob:none
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Get changed migration files
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${GH_REPO}/pulls/${PR_NUMBER}/files" \
            --paginate -q '.[] | select(.filename | startswith("resources/migrations/")) | select(.filename | endswith(".yaml")) | "\(.status)\t\(.filename)"' \
            > /tmp/changed-migrations.tsv

      - name: Check migration versions
        env:
          BASE_REF: ${{ github.base_ref }}
          CURRENT_VERSION: ${{ vars.CURRENT_VERSION }}
          CHANGED_FILES: /tmp/changed-migrations.tsv
        run: npx --package=tsx@4.21.0 --package=js-yaml@4.1.1 tsx bin/check-migration-versions.ts
