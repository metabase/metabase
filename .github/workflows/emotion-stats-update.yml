name: Emotion Stats Update

on:
  workflow_dispatch:
  schedule:
    - cron: 40 1 * * 2 # every Tuesday at 1:40

jobs:
  emotion-stats:
    if: ${{ github.event_name != 'schedule' || github.repository == 'metabase/metabase' }}
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: get Emotion file count
        id: get-emotion-file-count
        run: |
          oss=$(git grep -l -E "from ['\"]@emotion/" -- 'frontend/src/metabase/**/*.ts' 'frontend/src/metabase/**/*.tsx' 'frontend/src/metabase/**/*.js' 'frontend/src/metabase/**/*.jsx' | wc -l)
          ee=$(git grep -l -E "from ['\"]@emotion/" -- 'enterprise/frontend/src/metabase-enterprise/**/*.ts' 'enterprise/frontend/src/metabase-enterprise/**/*.tsx' 'enterprise/frontend/src/metabase-enterprise/**/*.js' 'enterprise/frontend/src/metabase-enterprise/**/*.jsx' | wc -l)

          echo "$(($oss+$ee)) files importing @emotion/*"

          echo "EMOTION_FILES=$(($oss+$ee))" >> $GITHUB_OUTPUT
      - name: Upload count to Stats
        uses: actions/github-script@v7
        env:
          EMOTION_FILES: ${{ steps.get-emotion-file-count.outputs.EMOTION_FILES }}
          API_KEY: ${{ secrets.STATS_API_KEY }}
        with:
          script: | # js
            const { uploadCsvToMb } = require('${{ github.workspace }}/.github/scripts/csv-to-mb.js');

            console.log("EMOTION_FILES", Number(process.env.EMOTION_FILES));

            const data = [
              {
                'Date': new Date().toISOString().slice(0, 10), // YYYY-MM-DD
                'Emotion Files': Number(process.env.EMOTION_FILES),
              }
            ];

            uploadCsvToMb({
              baseUrl: 'https://stats.metabase.com',
              tableId: 76283,
              jsonData: data,
              mode: 'append',
            }).then(() => {
              console.log('Data uploaded successfully');
            }).catch((error) => {
              console.error('Error uploading data:', error);
              process.exit(1);
            });
