name: PostgreSQL Driver Test

on:
  workflow_call:
    inputs:
      version:
        type: string
        required: true
        description: 'PostgreSQL version (e.g., "latest", "12")'

jobs:
  test:
    runs-on: ubuntu-22.04
    timeout-minutes: ${{ inputs.version == 'latest' && 20 || 60 }}
    env:
      CI: 'true'
      DRIVERS: postgres
      MB_DB_TYPE: postgres
      MB_DB_PORT: 5432
      MB_DB_HOST: localhost
      MB_DB_DBNAME: mb_test
      MB_DB_USER: mb_test
      MB_POSTGRESQL_TEST_USER: mb_test
      MB_POSTGRES_SSL_TEST_SSL: ${{ inputs.version == 'latest' && 'true' || 'false' }}
      MB_POSTGRES_SSL_TEST_SSL_MODE: ${{ inputs.version == 'latest' && 'verify-full' || '' }}
      MB_POSTGRES_SSL_TEST_SSL_ROOT_CERT_PATH: ${{ inputs.version == 'latest' && 'test-resources/certificates/us-east-2-bundle.pem' || '' }}
    services:
      postgres:
        image: postgres:${{ inputs.version == 'latest' && 'latest' || '12-alpine' }}
        ports:
          - "5432:5432"
        env:
          POSTGRES_USER: mb_test
          POSTGRES_DB: mb_test
          POSTGRES_HOST_AUTH_METHOD: trust
    name: PostgreSQL ${{ inputs.version }}
    steps:
    - uses: actions/checkout@v4
    - name: Test PostgreSQL ${{ inputs.version }}
      uses: ./.github/actions/test-driver
      with:
        junit-name: ${{ inputs.version == 'latest' && 'be-tests-postgres-latest-ee' || 'be-tests-postgres-12-ee' }}
        test-args: ${{ inputs.version == 'latest' && ':only-tags [:mb/driver-tests]' || ':only-tags [:mb/driver-tests] :exclude-tags [:mb/old-migrations-test]' }}
    - name: Upload Test Results
      uses: ./.github/actions/upload-test-results
      if: always()
      with:
        input-path: ./target/junit/
        output-name: postgres-${{ inputs.version }}
        bucket: ${{ vars.AWS_S3_TEST_RESULTS_BUCKET }}
        aws-access-key-id: ${{ secrets.AWS_TEST_RESULTS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_TEST_RESULTS_SECRET_ACCESS_KEY }}
        aws-region: ${{ vars.AWS_REGION }}
        trunk-api-token: ${{ secrets.TRUNK_API_TOKEN }}
