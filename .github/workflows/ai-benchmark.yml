
name: evals-dispatch
run-name: "dispatch evals · ${{ github.event_name == 'pull_request' && format('smoke PR#{0}', github.event.pull_request.number) || format('PR#{0}', inputs.pr) }}"

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr:
        description: "Metabase PR number (sets ref to the PR head)"
        required: false
        default: ""
      ref:
        description: "Metabase ref"
        required: false
        default: ""
      scope:
        description: "Scope"
        required: true
        type: choice
        options: [smoke, full, "all (EXPENSIVE)"]
        default: smoke
      sample:
        description: "Sample (0 = full suite)"
        required: false
        default: "5"
      evals_branch:
        # $ROOT/.evals_branch contents is used if input is empty
        description: "Evals ref"
        required: false
        default: ""

jobs:
  announce:
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'evals/smoke'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      comment_id: ${{ steps.post.outputs.comment_id }}
    steps:
      - name: Comment (building)
        id: post
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `🤖 **Evals smoke** — ⏳ building the image… ([logs](${runUrl}))`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data } = await github.rest.issues.createComment({ owner, repo, issue_number, body });
            core.setOutput('comment_id', String(data.id));

  uberjar:
    needs: [announce]
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'evals/smoke'
      && github.event.pull_request.head.repo.full_name == github.repository
    uses: ./.github/workflows/uberjar.yml
    secrets: inherit

  smoke:
    needs: [announce, uberjar]
    if: >-
      github.event_name == 'pull_request'
      && github.event.label.name == 'evals/smoke'
      && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      COMMENT_ID: ${{ needs.announce.outputs.comment_id }}
    steps:
      - name: Read pinned evals branch
        uses: actions/checkout@v4
        with:
          sparse-checkout: .evals_branch
          sparse-checkout-cone-mode: false
      - name: Resolve evals branch
        id: branch
        run: echo "value=$(cat .evals_branch)" >> "$GITHUB_OUTPUT"
      - name: Dispatch smoke eval-run
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          EVALS_BRANCH: ${{ steps.branch.outputs.value }}
        run: |
          gh api repos/metabase/evals/actions/workflows/eval-run.yml/dispatches \
            -f ref="$EVALS_BRANCH" \
            -f "inputs[pr]=$PR" \
            -f "inputs[scope]=smoke" \
            -f "inputs[sample]=5" \
            -f "inputs[evals_branch]=$EVALS_BRANCH" \
            -f "inputs[comment_id]=$COMMENT_ID"

      - name: Locate the dispatched eval-run
        id: evalrun
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          url=""
          for _ in $(seq 1 20); do
            url=$(gh api "repos/metabase/evals/actions/workflows/eval-run.yml/runs?event=workflow_dispatch&per_page=20" \
              --jq "[.workflow_runs[] | select(.display_title | contains(\"PR#$PR\"))] | sort_by(.created_at) | last | .html_url" \
              2>/dev/null || true)
            [ -n "$url" ] && [ "$url" != "null" ] && break
            sleep 5
          done
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment (running evals)
        uses: actions/github-script@v9
        env:
          EVALS_RUN_URL: ${{ steps.evalrun.outputs.url }}
        with:
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          script: |
            // Fall back to the workflow's runs page if polling didn't catch the run in time.
            const evalsUrl = process.env.EVALS_RUN_URL || 'https://github.com/metabase/evals/actions/workflows/eval-run.yml';
            const body = `🤖 **Evals smoke** — ⏳ running evals… ([logs](${evalsUrl}), internal to metabase/evals)`;
            await github.rest.issues.updateComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: Number(process.env.COMMENT_ID), body });

  dispatch:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read pinned evals branch
        uses: actions/checkout@v4
        with:
          sparse-checkout: .evals_branch
          sparse-checkout-cone-mode: false
      - name: Resolve evals branch
        id: branch
        env:
          INPUT_BRANCH: ${{ inputs.evals_branch }}
        run: echo "value=${INPUT_BRANCH:-$(cat .evals_branch)}" >> "$GITHUB_OUTPUT"
      - name: Dispatch eval-run
        env:
          GH_TOKEN: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          EVALS_BRANCH: ${{ steps.branch.outputs.value }}
          PR: ${{ inputs.pr }}
          REF: ${{ inputs.ref }}
          SCOPE: ${{ inputs.scope }}
          SAMPLE: ${{ inputs.sample }}
        run: |
          gh api repos/metabase/evals/actions/workflows/eval-run.yml/dispatches \
            -f ref="$EVALS_BRANCH" \
            -f "inputs[pr]=$PR" \
            -f "inputs[ref]=$REF" \
            -f "inputs[scope]=$SCOPE" \
            -f "inputs[sample]=$SAMPLE" \
            -f "inputs[evals_branch]=$EVALS_BRANCH"
