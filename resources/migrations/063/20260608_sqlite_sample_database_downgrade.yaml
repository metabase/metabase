## On downgrade from a SQLite-sample-database version to an H2-sample-database version, remove the
## SQLite sample database and the content left dangling by it, then restore the H2 sample database and
## its bundled Example content. Does nothing on rollforward; the H2 -> SQLite upgrade replacement is
## handled at startup in metabase.sample-data.impl.

databaseChangeLog:
  - changeSet:
      id: v63.2026-06-08T00:00:00
      author: bgrabow
      comment: Restore the H2 sample database (and its Example content) on downgrade to an H2 version
      validCheckSum: ANY
      changes:
        - customChange:
            class: "metabase.sample_data.downgrade.RestoreH2SampleDatabaseOnDowngrade"
