name: Auto-backport
run-name: Auto Backport ${{ github.event.pull_request.title }}
on:
  pull_request:
    types: [closed, labeled]

jobs:
  # --- Primary path: backport to every supported release line --------------
  # Triggered by the plain `backport` label. `contains(array, 'backport')` is an
  # exact element match, so this never fires for `double-backport`/`triple-backport`
  # — those are handled by the legacy escape hatch at the end of this file.
  prepare:
    if:
      | # the PR must carry the `backport` label at merge, or be labeled `backport` after merge
      github.event.pull_request.merged == true && (
        github.event.action == 'closed' && contains(github.event.pull_request.labels.*.name, 'backport') ||
        github.event.action == 'labeled' && github.event.label.name == 'backport'
      )
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    outputs:
      commit: ${{ steps.find_commit.outputs.commit }}
      targets: ${{ steps.targets.outputs.result }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - uses: ./.github/actions/find-squashed-commit
        name: Find commit
        id: find_commit
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}

      - name: Prepare release scripts
        uses: ./.github/actions/prepare-release-scripts

      - name: Compute supported backport targets
        id: targets
        uses: actions/github-script@v9
        env:
          AWS_S3_STATIC_BUCKET: ${{ vars.AWS_S3_STATIC_BUCKET }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        with:
          script: | # js
            // Backport targets are the supported major lines from version-info.json:
            // a line is in support — and a backport target — if and only if its EoL is
            // today or later. `getSupportedMajors` encapsulates that rule (and ignores
            // the display-only `lts` flag); it is shared with the auto-minor scheduler.
            const { getSupportedMajors } = require('${{ github.workspace }}/release/dist/index.cjs');

            const targets = await getSupportedMajors();
            console.log('supported backport targets', targets);

            return targets;

  backport:
    needs: prepare
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    strategy:
      fail-fast: false # one conflicting branch must not block the others
      matrix:
        target: ${{ fromJson(needs.prepare.outputs.targets) }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}

      - name: Backport to v${{ matrix.target }}
        uses: ./.github/actions/create-backport
        with:
          target-version: ${{ matrix.target }}
          backport-commit: ${{ needs.prepare.outputs.commit }}
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          github-token-2: ${{ secrets.GITHUB_TOKEN }}

  # --- Legacy escape hatch: explicit depth backports -----------------------
  # `single-backport`/`double-backport`/`triple-backport` keep their original behavior —
  # backport to CURRENT_VERSION and the 0–2 lines below it — independent of
  # `major_version_support`. `single-backport` is a fallback for when the primary path
  # can't be used and only CURRENT_VERSION is wanted. Kept for the short term for one-off
  # manual depth control. If a branch from the primary path above already exists,
  # create-backport simply errors on the duplicate.
  legacy-backport:
    if:
      | # triggered only by the legacy depth labels, at merge or when added afterwards
      github.event.pull_request.merged == true && (
        github.event.action == 'closed' && (
          contains(github.event.pull_request.labels.*.name, 'single-backport') ||
          contains(github.event.pull_request.labels.*.name, 'double-backport') ||
          contains(github.event.pull_request.labels.*.name, 'triple-backport')
        ) ||
        github.event.action == 'labeled' && (
          github.event.label.name == 'single-backport' ||
          github.event.label.name == 'double-backport' ||
          github.event.label.name == 'triple-backport'
        )
      )
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - uses: ./.github/actions/find-squashed-commit
        name: Find commit
        id: find_commit
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          base-ref: ${{ github.event.pull_request.base.ref }}

      - name: how many backports?
        id: how-many-backports
        uses: actions/github-script@v9
        with:
          script: | # js
            const labels = [
              ...${{ toJson(github.event.pull_request.labels) }},
              { name:"${{ github.event.label.name }}" }
            ];

            const backportLabelNames = labels.filter(label => label.name.includes('backport')).map(label => label.name);

            let result = 1;

            if (backportLabelNames.includes("triple-backport")) {
              result = 3;
            } else if (backportLabelNames.includes("double-backport")) {
              result = 2;
            }

            console.log("backports", result);
            return result;

      - name: get release versions
        id: get-latest-release-version
        uses: actions/github-script@v9
        with:
          script: | # js
            const currentVersion = Number(${{ vars.CURRENT_VERSION }});

            const result =  {
              latest: currentVersion,
              secondLatest: currentVersion - 1,
              thirdLatest: currentVersion - 2,
            };

            console.log(result);

            return result;

      - name: Single Backport
        uses: ./.github/actions/create-backport
        with:
          target-version: ${{ fromJson(steps.get-latest-release-version.outputs.result).latest }}
          backport-commit: ${{ steps.find_commit.outputs.commit }}
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          github-token-2: ${{ secrets.GITHUB_TOKEN }}

      - name: Double Backport
        if: ${{ always() && fromJson(steps.how-many-backports.outputs.result) >= 2 }}
        uses: ./.github/actions/create-backport
        with:
          target-version: ${{ fromJson(steps.get-latest-release-version.outputs.result).secondLatest }}
          backport-commit: ${{ steps.find_commit.outputs.commit }}
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          github-token-2: ${{ secrets.GITHUB_TOKEN }}

      - name: Triple Backport
        if: ${{ always() && fromJson(steps.how-many-backports.outputs.result) >= 3 }}
        uses: ./.github/actions/create-backport
        with:
          target-version: ${{ fromJson(steps.get-latest-release-version.outputs.result).thirdLatest }}
          backport-commit: ${{ steps.find_commit.outputs.commit }}
          github-token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
          github-token-2: ${{ secrets.GITHUB_TOKEN }}
