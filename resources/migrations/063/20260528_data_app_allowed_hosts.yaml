## Adds data_app.allowed_hosts — a JSON array of origins the app's sandboxed
## bundle may fetch/XHR (NULL/empty means none).
##
## Split into its own file rather than appended to 20260528_data_app.yaml: an
## instance already ran the earlier branch state, so we keep the released table
## migration untouched. The changeset id and `logicalFilePath` are unchanged, so
## Liquibase recognizes this as the same, already-applied changeset on that
## instance (no re-run) and applies it normally on fresh installs.

databaseChangeLog:
  - logicalFilePath: migrations/062_update_migrations.yaml
  - changeSet:
      id: v63.2026-05-28T00:00:03
      author: timofei
      comment: >-
        Add data_app.allowed_hosts. A JSON array of origins the app's sandboxed
        bundle may fetch/XHR; NULL/empty means none. Guarded so pre-existing
        tables pick it up while fresh installs that already created it skip it.
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: data_app
                columnName: allowed_hosts
      changes:
        - addColumn:
            tableName: data_app
            columns:
              - column:
                  name: allowed_hosts
                  type: ${text.type}
                  remarks: JSON array of origins the sandboxed bundle may fetch/XHR. NULL when none configured.
                  constraints:
                    nullable: true
      rollback: []
