name: Kondo Ratchets Update

# Merges may leave .clj-kondo/ratchets.edn with budgets above the actual ignore counts (removing
# ignores never requires touching the file). This lowers them back down on master after each merge.
on:
  push:
    branches:
      - master
    paths:
      - "**.clj"
      - "**.cljc"
      - "**.cljs"

concurrency:
  group: ${{ github.workflow }}

jobs:
  ratchet-down:
    if: github.repository == 'metabase/metabase'
    runs-on: ${{ vars.DEFAULT_RUNNER_KEY }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          # METABASE_AUTOMATION_USER_TOKEN so the commit triggers CI (a GITHUB_TOKEN push would not)
          token: ${{ secrets.METABASE_AUTOMATION_USER_TOKEN }}
      - name: Lower ignore budgets to match the source tree
        run: ./bin/mage fix-kondo-ratchets
      - name: Commit to master if any budget decreased
        run: |
          if git diff --quiet .clj-kondo/ratchets.edn; then
            echo "budgets already tight"
            exit 0
          fi
          git config --global user.name "Metabase Automation"
          git config --global user.email "github-automation@metabase.com"
          git add .clj-kondo/ratchets.edn
          git commit -m "Ratchet down kondo ignore budgets" --no-verify
          # another merge may have landed while this ran; a rebase drops our commit if it became redundant
          git pull --rebase origin master
          git push origin master
