## Registry of connected child Metabase instances managed from the workspaces UI.
## The parent stores each child's URL and an API key created on the child, and uses
## them to push a workspace's config.yml to the child's unsafe-init endpoint.

databaseChangeLog:
  - logicalFilePath: migrations/064_update_migrations.yaml

  - changeSet:
      id: v64.2026-07-08T00:00:00
      author: alesnenko
      comment: Create workspace_instance table
      changes:
        - createTable:
            tableName: workspace_instance
            remarks: Connected child Metabase instance a workspace can be deployed to
            columns:
              - column:
                  name: id
                  type: int
                  remarks: Unique ID
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(254)
                  remarks: Display name of the instance
                  constraints:
                    nullable: false
              - column:
                  name: url
                  type: varchar(2048)
                  remarks: Base URL of the child Metabase instance
                  constraints:
                    nullable: false
              - column:
                  name: details
                  type: ${text.type}
                  remarks: Encrypted JSON credentials for calling the child instance (API key)
                  constraints:
                    nullable: false
              - column:
                  name: workspace_id
                  type: int
                  remarks: The workspace deployed to this instance, if any
                  constraints:
                    nullable: true
              - column:
                  name: initialized_at
                  type: ${timestamp_type}
                  remarks: When a workspace config was last successfully pushed to this instance
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: ${timestamp_type}
                  remarks: When this row was created
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: ${timestamp_type}
                  remarks: When this row was last updated
                  defaultValueComputed: current_timestamp
                  constraints:
                    nullable: false

  - changeSet:
      id: v64.2026-07-08T00:00:01
      author: alesnenko
      comment: Unique constraint on workspace_instance.workspace_id (an instance hosts at most one workspace, and vice versa)
      changes:
        - addUniqueConstraint:
            tableName: workspace_instance
            constraintName: idx_unique_workspace_instance_workspace_id
            columnNames: workspace_id

  - changeSet:
      id: v64.2026-07-08T00:00:02
      author: alesnenko
      comment: FK workspace_instance.workspace_id -> workspace.id (set null on delete so deleting a workspace frees the instance)
      changes:
        - addForeignKeyConstraint:
            baseTableName: workspace_instance
            baseColumnNames: workspace_id
            referencedTableName: workspace
            referencedColumnNames: id
            constraintName: fk_workspace_instance_workspace_id
            onDelete: SET NULL
