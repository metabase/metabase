## On downgrade from a SQLite-sample-database version to an H2-sample-database version, remove the
## SQLite sample database and the content left dangling by it, then restore an H2 sample database in
## its place so the downgraded version boots with a working sample database. Does nothing on
## rollforward; the H2 -> SQLite upgrade replacement is handled at startup in metabase.sample-data.impl.

databaseChangeLog:
  - changeSet:
      id: v63.2026-06-08T00:00:00
      author: bgrabow
      comment: Replace the SQLite sample database with an H2 one (and prune content it leaves empty) on downgrade to an H2 version
      validCheckSum: ANY
      changes:
        - customChange:
            class: "metabase.app_db.custom_migrations.MigrateAwayFromSqliteSampleDatabaseOnDowngrade"
