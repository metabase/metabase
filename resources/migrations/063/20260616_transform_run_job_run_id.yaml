## Add job_run_id to transform_run to link each transform execution to its parent job run

databaseChangeLog:

  - changeSet:
      id: v63.2026-06-16T00:00:00
      author: bronsa
      comment: Add job_run_id to transform_run to link each transform execution to its parent job run
      preConditions:
        - onFail: MARK_RAN
        - not:
            - columnExists:
                tableName: transform_run
                columnName: job_run_id
      changes:
        - addColumn:
            tableName: transform_run
            columns:
              - column:
                  name: job_run_id
                  type: bigint
                  remarks: FK to transform_job_run; links each transform execution to its parent job run
                  constraints:
                    nullable: true
      rollback:
        - dropColumn:
            tableName: transform_run
            columnName: job_run_id

  - changeSet:
      id: v63.2026-06-16T00:00:01
      author: bronsa
      comment: Index transform_run on job_run_id for efficient drill-down queries
      preConditions:
        - onFail: MARK_RAN
        - not:
            - indexExists:
                tableName: transform_run
                indexName: idx_transform_run_job_run_id
      changes:
        - createIndex:
            tableName: transform_run
            indexName: idx_transform_run_job_run_id
            columns:
              - column:
                  name: job_run_id
      rollback:
        - dropIndex:
            tableName: transform_run
            indexName: idx_transform_run_job_run_id

  - changeSet:
      id: v63.2026-06-16T00:00:02
      author: bronsa
      comment: >-
        Backfill job_run_id on transform_run by matching each run to the job run whose time window fully contains it.
        This is best-effort for historical data. Going forward job_run_id is set directly at execution time.
      changes:
        - sql:
            sql: >-
              WITH matches AS (
                SELECT DISTINCT ON (tr.id)
                  tr.id AS transform_run_id,
                  tjr.id AS job_run_id
                FROM transform_run tr
                INNER JOIN transform_transform_tag ttt ON ttt.transform_id = tr.transform_id
                INNER JOIN transform_job_transform_tag tjtt ON tjtt.tag_id = ttt.tag_id
                INNER JOIN transform_job_run tjr ON tjr.job_id = tjtt.job_id
                WHERE tr.job_run_id IS NULL
                  AND tjr.start_time <= tr.start_time
                  AND (tjr.end_time IS NULL OR tjr.end_time >= COALESCE(tr.end_time, tr.start_time))
                ORDER BY tr.id, tjr.start_time DESC
              )
              UPDATE transform_run
              SET job_run_id = matches.job_run_id
              FROM matches
              WHERE transform_run.id = matches.transform_run_id
      rollback:
        - sql:
            sql: UPDATE transform_run SET job_run_id = NULL
